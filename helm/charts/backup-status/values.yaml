collector:
  enabled: true
  schedule: "*/5 * * * *"
  stale_threshold_minutes: 15
  adapter_timeout_ms: 10000
  adapters:
    postgresql:
      enabled: true
      strategy: "auto"
    mongodb:
      enabled: false
    s3:
      enabled: false
    keycloak:
      enabled: false
    kafka:
      enabled: false

api:
  enabled: true
  stale_threshold_ms: 900000

env:
  DB_URL: ""
  KAFKA_BROKERS: ""
  KEYCLOAK_JWKS_URL: ""
  K8S_NAMESPACE: "default"
  DEPLOYMENT_PROFILE_SLUG: "default"

operations:
  enabled: true
  allow_tenant_owner_backup: false
  dispatcher_timeout_seconds: 300
  restore_timeout_seconds: 600
  max_active_operations_per_instance: 1
  kafka_topic: "platform.backup.operation.events"

audit:
  enabled: true
  kafka_topic: "platform.backup.audit.events"
  alert_topic: "platform.audit.alerts"
  fallback:
    retry_interval_seconds: 60
    max_attempts: 5
    base_backoff_ms: 60000
  query:
    max_range_days: 90
    default_limit: 50
    max_limit: 200
  detail:
    max_bytes: 4096

secret:
  name: backup-status-credentials
