apiVersion: v1
kind: ConfigMap
metadata:
  name: mongo-cdc-bridge
data:
  MONGO_CDC_CACHE_TTL_SECONDS: "30"
  MONGO_CDC_MAX_RECONNECT_ATTEMPTS: "10"
  MONGO_CDC_MAX_MESSAGE_BYTES: "900000"
  MONGO_CDC_MAX_EVENTS_PER_SECOND: "1000"
  MONGO_CAPTURE_DEFAULT_WORKSPACE_QUOTA: "10"
  MONGO_CAPTURE_DEFAULT_TENANT_QUOTA: "50"
  MONGO_CAPTURE_KAFKA_TOPIC_LIFECYCLE: console.mongo-capture.lifecycle
  MONGO_CDC_KAFKA_CLIENT_ID: mongo-cdc-bridge
  MONGO_CDC_HEALTH_PORT: "8080"
