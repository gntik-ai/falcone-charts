apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg-cdc-bridge
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: pg-cdc-bridge
  template:
    metadata:
      labels:
        app: pg-cdc-bridge
    spec:
      containers:
        - name: pg-cdc-bridge
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: pg-cdc-bridge
          env:
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: pg-cdc-bridge-secrets, key: DATABASE_URL } }
            - name: PG_CDC_KAFKA_BROKERS
              valueFrom: { secretKeyRef: { name: pg-cdc-bridge-secrets, key: PG_CDC_KAFKA_BROKERS } }
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources: {{- toYaml .Values.resources | nindent 12 }}
