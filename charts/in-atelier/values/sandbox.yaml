global:
  namespace: in-atelier-sandbox
  environment: sandbox
publicSurface:
  hostnames:
    api: api.sandbox.in-atelier.example.com
    console: console.sandbox.in-atelier.example.com
    identity: iam.sandbox.in-atelier.example.com
    realtime: realtime.sandbox.in-atelier.example.com
  optionalWorkspaceSubdomains:
    enabled: true
  certificates:
    wildcardSecretName: in-atelier-sandbox-wildcard-tls
    surfaces:
      api: in-atelier-sandbox-api-tls
      console: in-atelier-sandbox-console-tls
      identity: in-atelier-sandbox-identity-tls
      realtime: in-atelier-sandbox-realtime-tls
environmentProfile:
  id: sandbox
  diagnostics:
    logLevel: info
    debugEndpoints: false
    passthroughHeaders: false
  demoData:
    enabled: true
  limitsProfile: preview
config:
  secretRefs:
    gatewayTls:
      existingSecret: in-atelier-sandbox-api-tls
      keys:
      - tls.crt
      - tls.key
deployment:
  topology:
    clusterRef: cluster-sandbox-shared
controlPlane:
  replicas: 2
webConsole:
  replicas: 2
gatewayPolicy:
  passthrough:
    mode: limited
  cors:
    allowOrigins:
    - https://console.sandbox.in-atelier.example.com
  oidc:
    issuerUrl: https://iam.sandbox.in-atelier.example.com/auth/realms/in-atelier-platform
    discoveryUrl: https://iam.sandbox.in-atelier.example.com/auth/realms/in-atelier-platform/.well-known/openid-configuration
