platform:
  target: openshift
  network:
    exposureKind: Route
  securityProfile: restricted-v2
  openshift:
    enabled: true
  routeAnnotations:
    haproxy.router.openshift.io/timeout: 30s

publicSurface:
  route:
    annotations:
      haproxy.router.openshift.io/timeout: 30s

apisix:
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

controlPlane:
  podSecurityContext: {}

webConsole:
  podSecurityContext: {}
