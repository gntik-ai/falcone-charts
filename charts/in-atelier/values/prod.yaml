global:
  namespace: in-atelier
  environment: prod
publicSurface:
  hostnames:
    api: api.in-atelier.example.com
    console: console.in-atelier.example.com
    identity: iam.in-atelier.example.com
    realtime: realtime.in-atelier.example.com
  certificates:
    wildcardSecretName: in-atelier-prod-wildcard-tls
    surfaces:
      api: in-atelier-prod-api-tls
      console: in-atelier-prod-console-tls
      identity: in-atelier-prod-identity-tls
      realtime: in-atelier-prod-realtime-tls
environmentProfile:
  id: prod
  diagnostics:
    logLevel: warn
    debugEndpoints: false
    passthroughHeaders: false
  demoData:
    enabled: false
  limitsProfile: strict
config:
  secretRefs:
    gatewayTls:
      existingSecret: in-atelier-prod-api-tls
      keys:
      - tls.crt
      - tls.key
deployment:
  topology:
    clusterRef: cluster-prod-shared
apisix:
  replicas: 4
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi
postgresql:
  persistence:
    size: 100Gi
mongodb:
  persistence:
    size: 100Gi
kafka:
  persistence:
    size: 200Gi
storage:
  persistence:
    size: 500Gi
controlPlane:
  replicas: 3
webConsole:
  replicas: 3
gatewayPolicy:
  passthrough:
    mode: disabled
  cors:
    allowOrigins:
    - https://console.in-atelier.example.com
  oidc:
    issuerUrl: https://iam.in-atelier.example.com/auth/realms/in-atelier-platform
    discoveryUrl: https://iam.in-atelier.example.com/auth/realms/in-atelier-platform/.well-known/openid-configuration
