{{- if and .Values.enabled .Values.config.inline }}
{{- if gt (len .Values.config.inline) 0 }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "component-wrapper.generatedConfigMapName" . }}
  labels:
    {{- include "component-wrapper.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config.inline }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- end }}
