{{- if .Values.enabled }}
{{- $workloadKind := .Values.wrapper.workload.kind | default "Deployment" -}}
{{- $podSecurityContext := mergeOverwrite (deepCopy (default (dict) .Values.global.podSecurity)) (default (dict) .Values.podSecurityContext) -}}
{{- $imagePullSecrets := concat (default (list) .Values.global.imagePullSecrets) (default (list) .Values.global.privateRegistry.pullSecretNames) -}}
apiVersion: apps/v1
kind: {{ $workloadKind }}
metadata:
  name: {{ include "component-wrapper.fullname" . }}
  labels:
    {{- include "component-wrapper.labels" . | nindent 4 }}
spec:
  {{- if eq $workloadKind "StatefulSet" }}
  serviceName: {{ include "component-wrapper.fullname" . }}
  {{- end }}
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "component-wrapper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "component-wrapper.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "component-wrapper.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountToken | default false }}
      enableServiceLinks: false
      {{- if gt (len $imagePullSecrets) 0 }}
      imagePullSecrets:
        {{- range $imagePullSecrets }}
        - name: {{ .name | default . }}
        {{- end }}
      {{- end }}
      {{- if gt (len $podSecurityContext) 0 }}
      securityContext:
        {{- toYaml $podSecurityContext | nindent 8 }}
      {{- end }}
      {{- if or (and .Values.persistence.enabled .Values.volumePermissions.enabled) (gt (len .Values.initContainers) 0) }}
      initContainers:
        {{- if and .Values.persistence.enabled .Values.volumePermissions.enabled }}
        - name: volume-permissions
          image: {{ include "component-wrapper.renderImage" (dict "Values" .Values "image" .Values.volumePermissions.image "name" (printf "%s volumePermissions" (include "component-wrapper.name" .))) | quote }}
          imagePullPolicy: {{ .Values.volumePermissions.image.pullPolicy | default "IfNotPresent" }}
          command:
            {{- toYaml (.Values.volumePermissions.command | default (list "sh" "-ec" (printf "mkdir -p %s && chmod -R g+rwX %s" .Values.persistence.mountPath .Values.persistence.mountPath))) | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          securityContext:
            {{- toYaml .Values.volumePermissions.securityContext | nindent 12 }}
        {{- end }}
        {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ include "component-wrapper.name" . }}
          image: {{ include "component-wrapper.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.ports }}
          ports:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or (gt (len .Values.envFromSecrets) 0) (gt (len .Values.envFromConfigMaps) 0) (and .Values.config.inline (gt (len .Values.config.inline) 0)) }}
          envFrom:
            {{- if and .Values.config.inline (gt (len .Values.config.inline) 0) }}
            - configMapRef:
                name: {{ include "component-wrapper.generatedConfigMapName" . }}
            {{- end }}
            {{- range .Values.envFromConfigMaps }}
            - configMapRef:
                name: {{ . }}
            {{- end }}
            {{- range .Values.envFromSecrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.persistence.enabled (gt (len .Values.extraVolumeMounts) 0) }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if or .Values.persistence.enabled (gt (len .Values.extraVolumes) 0) }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "component-wrapper.persistenceClaimName" . }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
