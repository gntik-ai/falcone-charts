global:
  nameOverride: in-atelier
  namespace: in-atelier-dev
  environment: dev
  createNamespace: true
  imageRegistry: ""
  imagePullSecrets:
    - name: ghcr-reader
  airgap:
    enabled: false
  privateRegistry:
    enabled: false
    registry: ""
    pullSecretNames: []
    caBundleConfigMap: ""
  defaultStorageClass: ""
  podSecurity:
    runAsNonRoot: true
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

publicSurface:
  routePrefixes:
    controlPlane: /control-plane
    identity: /auth
    realtime: /realtime
    console: /
  optionalWorkspaceSubdomains:
    enabled: false
    hostTemplate: '{workspaceSlug}.apps.{environment}.in-atelier.example.com'
  hostnames:
    api: api.dev.in-atelier.example.com
    console: console.dev.in-atelier.example.com
    identity: iam.dev.in-atelier.example.com
    realtime: realtime.dev.in-atelier.example.com
  certificates:
    wildcardSecretName: in-atelier-dev-wildcard-tls
    surfaces:
      api: in-atelier-dev-api-tls
      console: in-atelier-dev-console-tls
      identity: in-atelier-dev-identity-tls
      realtime: in-atelier-dev-realtime-tls
  bindings:
    api:
      component: apisix
      serviceName: ""
      servicePort: http
      path: /control-plane
    identity:
      component: keycloak
      serviceName: ""
      servicePort: http
      path: /auth
    realtime:
      component: apisix
      serviceName: ""
      servicePort: http
      path: /realtime
    console:
      component: webConsole
      serviceName: ""
      servicePort: http
      path: /
  ingress:
    className: nginx
    annotations: {}
  route:
    annotations: {}

environmentProfile:
  id: dev
  diagnostics:
    logLevel: debug
    debugEndpoints: true
    passthroughHeaders: true
  demoData:
    enabled: true
  limitsProfile: relaxed

deployment:
  topology:
    mode: single_cluster
    region: eu-west-1
    clusterRef: cluster-dev-shared
    futureScaleVector:
      - multi_cluster
      - multi_region
  valuesLayers:
    common: values.yaml
    environment: values/dev.yaml
    customer: values/customer-reference.yaml
    platform: values/platform-kubernetes.yaml
    airgap: values/airgap.yaml
    localOverride: values/local.example.yaml

platform:
  target: kubernetes
  network:
    exposureKind: Ingress
  securityProfile: restricted
  openshift:
    enabled: false
  routeAnnotations:
    kubernetes.io/ingress.class: nginx
  podSecurity:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

config:
  inheritanceOrder:
    - common
    - environment
    - customer
    - platform
    - airgap
    - localOverride
    - secretRefs
  configMapNames:
    gateway: in-atelier-gateway-config
    controlPlane: in-atelier-control-plane-config
    webConsole: in-atelier-web-console-config
  secretRefs:
    gatewayTls:
      existingSecret: in-atelier-dev-api-tls
      keys:
        - tls.crt
        - tls.key
    identityClient:
      existingSecret: in-atelier-identity-client
      keys:
        - client-id
        - client-secret
    postgresCredentials:
      existingSecret: in-atelier-postgresql
      keys:
        - username
        - password
        - database
    mongoCredentials:
      existingSecret: in-atelier-mongodb
      keys:
        - username
        - password
        - database
    kafkaCredentials:
      existingSecret: in-atelier-kafka
      keys:
        - username
        - password
    objectStorageCredentials:
      existingSecret: in-atelier-storage
      keys:
        - access-key
        - secret-key

apisix:
  enabled: true
  wrapper:
    componentId: apisix
    workload:
      kind: Deployment
  image:
    repository: docker.io/apache/apisix
    tag: 3.10.0
    pullPolicy: IfNotPresent
  replicas: 2
  serviceAccount:
    create: true
    name: ""
  service:
    enabled: true
    type: ClusterIP
    port: 9080
    targetPort: 9080
    portName: http
    annotations: {}
  ports:
    - name: http
      containerPort: 9080
      protocol: TCP
    - name: admin
      containerPort: 9180
      protocol: TCP
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  env:
    - name: APISIX_STAND_ALONE
      value: "true"
  envFromSecrets: []
  envFromConfigMaps:
    - in-atelier-gateway-config
  persistence:
    enabled: false
    existingClaim: ""
    size: ""
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    mountPath: /usr/local/apisix/conf
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraVolumes: []
  extraVolumeMounts: []
  config:
    inline:
      APISIX_STAND_ALONE: "true"

keycloak:
  enabled: true
  wrapper:
    componentId: keycloak
    workload:
      kind: Deployment
  image:
    repository: quay.io/keycloak/keycloak
    tag: 26.1.0
    pullPolicy: IfNotPresent
  command:
    - /opt/keycloak/bin/kc.sh
  args:
    - start
    - --http-enabled=true
    - --hostname-strict=false
  replicas: 1
  serviceAccount:
    create: true
    name: ""
  service:
    enabled: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
    portName: http
    annotations: {}
  ports:
    - name: http
      containerPort: 8080
      protocol: TCP
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi
  env:
    - name: KC_PROXY_HEADERS
      value: xforwarded
    - name: KC_HEALTH_ENABLED
      value: "true"
  envFromSecrets:
    - in-atelier-identity-client
  envFromConfigMaps: []
  persistence:
    enabled: false
    existingClaim: ""
    size: ""
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    mountPath: /opt/keycloak/data
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraVolumes: []
  extraVolumeMounts: []
  config:
    inline:
      publicPath: /auth

postgresql:
  enabled: true
  wrapper:
    componentId: postgresql
    workload:
      kind: StatefulSet
  image:
    repository: docker.io/bitnami/postgresql
    tag: 17.2.0
    pullPolicy: IfNotPresent
  replicas: 1
  serviceAccount:
    create: true
    name: ""
  service:
    enabled: true
    type: ClusterIP
    port: 5432
    targetPort: 5432
    portName: tcp-postgresql
    annotations: {}
  ports:
    - name: tcp-postgresql
      containerPort: 5432
      protocol: TCP
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 2Gi
  env:
    - name: POSTGRESQL_DATABASE
      value: in_atelier
  envFromSecrets:
    - in-atelier-postgresql
  envFromConfigMaps: []
  persistence:
    enabled: true
    existingClaim: ""
    size: 20Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    mountPath: /bitnami/postgresql
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    fsGroup: 1001
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraVolumes: []
  extraVolumeMounts: []
  config:
    inline:
      tenantIsolationMode: schema-per-tenant

