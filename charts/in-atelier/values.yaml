    targetPort: 27017
    portName: tcp-mongodb
    annotations: {}
  ports:
    - name: tcp-mongodb
      containerPort: 27017
      protocol: TCP
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 2Gi
  env:
    - name: MONGODB_DATABASE
      value: in_atelier
  envFromSecrets:
    - in-atelier-mongodb
  envFromConfigMaps: []
  persistence:
    enabled: true
    existingClaim: ""
    size: 20Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    mountPath: /bitnami/mongodb
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    fsGroup: 1001
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraVolumes: []
  extraVolumeMounts: []
  config:
    inline:
      tenantPartitionKey: tenantId

kafka:
  enabled: true
  wrapper:
    componentId: kafka
    workload:
      kind: StatefulSet
  image:
    repository: docker.io/bitnami/kafka
    tag: 3.9.0
    pullPolicy: IfNotPresent
  replicas: 3
  serviceAccount:
    create: true
    name: ""
  service:
    enabled: true
    type: ClusterIP
    port: 9092
    targetPort: 9092
    portName: tcp-kafka
    annotations: {}
  ports:
    - name: tcp-kafka
      containerPort: 9092
      protocol: TCP
  resources:
    requests:
      cpu: 300m
      memory: 768Mi
    limits:
      cpu: 1
      memory: 2Gi
  env:
    - name: KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE
      value: "false"
  envFromSecrets:
    - in-atelier-kafka
  envFromConfigMaps: []
  persistence:
    enabled: true
    existingClaim: ""
    size: 50Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    mountPath: /bitnami/kafka
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    fsGroup: 1001
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraVolumes: []
  extraVolumeMounts: []
  config:
    inline:
      deliverySemantics: at-least-once

openwhisk:
  enabled: true
  wrapper:
    componentId: openwhisk
    workload:
      kind: Deployment
  image:
    repository: docker.io/apache/openwhisk-controller
    tag: 2.0.0
    pullPolicy: IfNotPresent
  replicas: 2
  serviceAccount:
    create: true
    name: ""
  service:
    enabled: true
