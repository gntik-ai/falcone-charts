global:
  nameOverride: in-atelier
  namespace: in-atelier

controlPlane:
  enabled: true
  image:
    repository: ghcr.io/example/in-atelier-control-plane
    tag: 0.1.0
  service:
    port: 8080

webConsole:
  enabled: true
  image:
    repository: ghcr.io/example/in-atelier-web-console
    tag: 0.1.0
  service:
    port: 3000

platform:
  openshift:
    enabled: true
