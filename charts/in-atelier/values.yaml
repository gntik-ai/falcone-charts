    componentId: control-plane
    workload:
      kind: Deployment
  image:
    repository: ghcr.io/example/in-atelier-control-plane
    tag: 0.1.0
    pullPolicy: IfNotPresent
  replicas: 2
  serviceAccount:
    create: true
    name: ""
  service:
    enabled: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
    portName: http
    annotations: {}
  ports:
    - name: http
      containerPort: 8080
      protocol: TCP
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  env:
    - name: NODE_ENV
      value: production
    - name: DEPLOYMENT_PROFILE
      value: dev
  envFromSecrets: []
  envFromConfigMaps:
    - in-atelier-control-plane-config
  persistence:
    enabled: false
    existingClaim: ""
    size: ""
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    mountPath: /srv/control-plane
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraVolumes: []
  extraVolumeMounts: []
  config:
