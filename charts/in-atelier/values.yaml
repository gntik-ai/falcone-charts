storage:
  enabled: true
  wrapper:
    componentId: storage
    workload:
      kind: StatefulSet
  image:
    repository: docker.io/minio/minio
    tag: 2026.3.23
    pullPolicy: IfNotPresent
  command:
    - /usr/bin/docker-entrypoint.sh
  args:
    - minio
    - server
    - /data
    - --console-address=:9001
  replicas: 1
  serviceAccount:
    create: true
    name: ""
  service:
    enabled: true
    type: ClusterIP
    port: 9000
    targetPort: 9000
    portName: http
    annotations: {}
  ports:
    - name: http
      containerPort: 9000
      protocol: TCP
    - name: console
      containerPort: 9001
      protocol: TCP
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 2Gi
  env:
    - name: MINIO_BROWSER_REDIRECT_URL
      value: https://console.dev.in-atelier.example.com
  envFromSecrets:
    - in-atelier-storage
  envFromConfigMaps: []
  persistence:
    enabled: true
    existingClaim: ""
    size: 100Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    mountPath: /data
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    fsGroup: 1001
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraVolumes: []
  extraVolumeMounts: []
  config:
