          gateway.in-atelier.io/plan-capabilities: observability.metrics.basic
          gateway.in-atelier.io/audit-required: 'false'
        plugins: *id003
        upstream:
          component: controlPlane
          port: 8080
      - routeId: '2011'
        name: public-api-websockets
        uri: /v1/websockets/*
        methods: *id002
        priority: 229
        enableWebsocket: true
        labels:
          gateway.in-atelier.io/route-kind: product_api
          gateway.in-atelier.io/family: websockets
          gateway.in-atelier.io/tenant-binding: required
          gateway.in-atelier.io/workspace-binding: required
