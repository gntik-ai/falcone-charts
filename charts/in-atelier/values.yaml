global:
  nameOverride: in-atelier
  namespace: in-atelier-dev
  environment: dev
  createNamespace: true
  imageRegistry: ''
  imagePullSecrets:
  - name: ghcr-reader
  airgap:
    enabled: false
  privateRegistry:
    enabled: false
    registry: ''
    pullSecretNames: []
    caBundleConfigMap: ''
  defaultStorageClass: ''
  podSecurity:
    runAsNonRoot: true
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault
    fsGroupChangePolicy: OnRootMismatch
publicSurface:
  routePrefixes:
    controlPlane: /control-plane
    identity: /auth
    realtime: /realtime
    console: /
  optionalWorkspaceSubdomains:
    enabled: false
    hostTemplate: '{workspaceSlug}.apps.{environment}.in-atelier.example.com'
  hostnames:
    api: api.dev.in-atelier.example.com
    console: console.dev.in-atelier.example.com
    identity: iam.dev.in-atelier.example.com
    realtime: realtime.dev.in-atelier.example.com
  certificates:
    wildcardSecretName: in-atelier-dev-wildcard-tls
    surfaces:
      api: in-atelier-dev-api-tls
      console: in-atelier-dev-console-tls
      identity: in-atelier-dev-identity-tls
      realtime: in-atelier-dev-realtime-tls
  bindings:
    api:
      component: apisix
      serviceName: ''
      servicePort: http
      path: /control-plane
    identity:
      component: keycloak
      serviceName: ''
      servicePort: http
      path: /auth
    realtime:
      component: apisix
      serviceName: ''
      servicePort: http
      path: /realtime
    console:
      component: webConsole
      serviceName: ''
      servicePort: http
      path: /
  ingress:
    className: nginx
    annotations: {}
  route:
    annotations: {}
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  tls:
    mode: clusterManaged
  loadBalancer:
    annotations: {}
    className: ''
    ports:
      api: 443
      console: 443
      identity: 443
      realtime: 443
    sourceRanges: []
    externalTrafficPolicy: Cluster
    ipFamilyPolicy: ''
    ipFamilies: []
    allocateLoadBalancerNodePorts: true
environmentProfile:
  id: dev
  diagnostics:
    logLevel: debug
    debugEndpoints: true
    passthroughHeaders: true
  demoData:
    enabled: true
  limitsProfile: relaxed
deployment:
  topology:
    mode: single_cluster
    region: eu-west-1
    clusterRef: cluster-dev-shared
    futureScaleVector:
    - multi_cluster
    - multi_region
  valuesLayers:
    common: values.yaml
    environment: values/dev.yaml
    customer: values/customer-reference.yaml
    platform: values/platform-kubernetes.yaml
    airgap: values/airgap.yaml
    localOverride: values/local.example.yaml
  profile: standard
  recommendedProfiles:
    default: standard
    pathPattern: values/profiles/{profile}.yaml
    supported:
    - all-in-one
    - standard
    - ha
  upgrade:
    allowInPlace: true
    currentVersion: ''
    supportedPreviousVersions:
    - 0.2.0
    allowDowngrade: false
    strategy: rolling
platform:
  target: kubernetes
  network:
    exposureKind: Ingress
  securityProfile: restricted
  openshift:
    enabled: false
  routeAnnotations:
    kubernetes.io/ingress.class: nginx
  podSecurity:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
config:
  inheritanceOrder:
  - common
  - environment
  - customer
  - platform
  - airgap
  - localOverride
  - secretRefs
  configMapNames:
    gateway: in-atelier-gateway-config
    controlPlane: in-atelier-control-plane-config
    webConsole: in-atelier-web-console-config
  secretRefs:
    gatewayTls:
      existingSecret: in-atelier-dev-api-tls
      keys:
      - tls.crt
      - tls.key
    identityClient:
      existingSecret: in-atelier-identity-client
      keys:
      - client-id
      - client-secret
    postgresCredentials:
      existingSecret: in-atelier-postgresql
      keys:
      - username
      - password
      - database
    mongoCredentials:
      existingSecret: in-atelier-mongodb
      keys:
      - username
      - password
      - database
    kafkaCredentials:
      existingSecret: in-atelier-kafka
      keys:
      - username
      - password
    objectStorageCredentials:
      existingSecret: in-atelier-storage
      keys:
      - access-key
      - secret-key
bootstrap:
  enabled: true
  serviceAccount:
    create: true
    name: ''
  job:
    image:
      repository: docker.io/bitnami/kubectl
      tag: 1.32.2
      pullPolicy: IfNotPresent
    backoffLimit: 1
    activeDeadlineSeconds: 900
    ttlSecondsAfterFinished: 86400
    annotations: {}
    podAnnotations: {}
    podLabels: {}
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      capabilities:
        drop:
        - ALL
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    nodeSelector: {}
    tolerations: []
    affinity: {}
    extraEnv: []
  lock:
    name: in-atelier-bootstrap-lock
    breakGlassExistingLock: false
  markers:
    name: in-atelier-bootstrap-state
  secretResolution:
    supportedStrategies:
    - kubernetesSecret
    - env
    - externalRef
    sources:
      keycloakAdminUsername:
        strategy: kubernetesSecret
        envVarName: BOOTSTRAP_KEYCLOAK_ADMIN_USERNAME
        existingSecret:
          name: in-atelier-keycloak-admin
          key: username
      keycloakAdminPassword:
        strategy: kubernetesSecret
        envVarName: BOOTSTRAP_KEYCLOAK_ADMIN_PASSWORD
        existingSecret:
          name: in-atelier-keycloak-admin
          key: password
      superadminPassword:
        strategy: kubernetesSecret
        envVarName: BOOTSTRAP_SUPERADMIN_PASSWORD
        existingSecret:
          name: in-atelier-superadmin
          key: password
      apisixAdminKey:
        strategy: kubernetesSecret
        envVarName: BOOTSTRAP_APISIX_ADMIN_KEY
        existingSecret:
          name: in-atelier-apisix-admin
          key: admin-key
  oneShot:
    keycloak:
      realm:
        realm: in-atelier-platform
        displayName: In Atelier Platform
        enabled: true
      superadmin:
        username: superadmin
        email: platform-admin@in-atelier.example.com
        firstName: Platform
        lastName: Admin
        realmRoles:
        - superadmin
    governanceCatalog:
      plans:
      - planId: pln_01starter
        slug: starter
        displayName: Starter
        planFamily: starter
        planStatus: active
        deploymentProfileId: dpf_01sharedstarter
        quotaPolicyId: qta_01starter
        billingInterval: monthly
        capabilityKeys:
        - identity.sso.oidc
        - data.postgresql.shared
        - data.storage.bucket
        - observability.metrics.basic
      - planId: pln_01growth
        slug: growth
        displayName: Growth
        planFamily: growth
        planStatus: active
        deploymentProfileId: dpf_01sharedgrowth
        quotaPolicyId: qta_01growth
        billingInterval: monthly
        capabilityKeys:
        - identity.sso.oidc
        - data.postgresql.shared
        - data.storage.bucket
        - data.kafka.topics
        - data.openwhisk.actions
        - observability.metrics.basic
        - observability.logs.extended
      - planId: pln_01regulated
        slug: regulated
        displayName: Regulated
        planFamily: regulated
        planStatus: active
        deploymentProfileId: dpf_01regulateddedicated
        quotaPolicyId: qta_01regulated
        billingInterval: annual
        capabilityKeys:
        - identity.sso.oidc
        - data.postgresql.dedicated
        - data.storage.bucket
        - data.kafka.topics
        - observability.metrics.basic
        - observability.audit.export
      - planId: pln_01enterprise
        slug: enterprise
        displayName: Enterprise
        planFamily: enterprise
        planStatus: active
        deploymentProfileId: dpf_01enterprisefederated
        quotaPolicyId: qta_01enterprise
        billingInterval: annual
        capabilityKeys:
        - identity.sso.oidc
        - data.postgresql.dedicated
        - data.storage.bucket
        - data.kafka.topics
        - data.openwhisk.actions
        - control.federated_clusters
        - observability.metrics.basic
        - observability.logs.extended
        - observability.traces.long_retention
        - observability.audit.export
      quotaPolicies:
      - quotaPolicyId: qta_01starter
        slug: starter-default
        displayName: Starter default quota policy
        quotaScope: tenant_and_workspace
        enforcementMode: hard_stop
        warningThresholdPercent: 80
        defaultLimits:
        - metricKey: tenant.workspaces.max
          scope: tenant
          unit: count
          limit: 1
        - metricKey: tenant.members.max
          scope: tenant
          unit: count
          limit: 10
        - metricKey: workspace.managed_resources.max
          scope: workspace
          unit: count
          limit: 8
        - metricKey: workspace.kafka_topics.max
          scope: workspace
          unit: count
          limit: 0
        - metricKey: workspace.monthly_function_invocations.max
          scope: workspace
          unit: count
          limit: 100000
        - metricKey: tenant.audit_retention_days.max
          scope: tenant
          unit: days
          limit: 30
      - quotaPolicyId: qta_01growth
        slug: growth-default
        displayName: Growth default quota policy
        quotaScope: tenant_and_workspace
        enforcementMode: hard_stop
        warningThresholdPercent: 85
        defaultLimits:
        - metricKey: tenant.workspaces.max
          scope: tenant
          unit: count
          limit: 3
        - metricKey: tenant.members.max
          scope: tenant
          unit: count
          limit: 50
        - metricKey: workspace.managed_resources.max
          scope: workspace
          unit: count
          limit: 24
        - metricKey: workspace.kafka_topics.max
          scope: workspace
          unit: count
          limit: 20
        - metricKey: workspace.monthly_function_invocations.max
          scope: workspace
          unit: count
          limit: 1000000
        - metricKey: tenant.audit_retention_days.max
          scope: tenant
          unit: days
          limit: 90
      - quotaPolicyId: qta_01regulated
        slug: regulated-default
        displayName: Regulated default quota policy
        quotaScope: tenant_and_workspace
        enforcementMode: hard_stop
        warningThresholdPercent: 90
        defaultLimits:
        - metricKey: tenant.workspaces.max
          scope: tenant
          unit: count
          limit: 5
        - metricKey: tenant.members.max
          scope: tenant
          unit: count
          limit: 100
        - metricKey: workspace.managed_resources.max
          scope: workspace
          unit: count
          limit: 40
        - metricKey: workspace.kafka_topics.max
          scope: workspace
          unit: count
          limit: 40
        - metricKey: workspace.monthly_function_invocations.max
          scope: workspace
          unit: count
          limit: 500000
        - metricKey: tenant.audit_retention_days.max
          scope: tenant
          unit: days
          limit: 365
      - quotaPolicyId: qta_01enterprise
        slug: enterprise-default
        displayName: Enterprise default quota policy
        quotaScope: tenant_and_workspace
        enforcementMode: hard_stop
        warningThresholdPercent: 90
        defaultLimits:
        - metricKey: tenant.workspaces.max
          scope: tenant
          unit: count
          limit: 10
        - metricKey: tenant.members.max
          scope: tenant
          unit: count
          limit: 250
        - metricKey: workspace.managed_resources.max
          scope: workspace
          unit: count
          limit: 100
        - metricKey: workspace.kafka_topics.max
          scope: workspace
          unit: count
          limit: 200
        - metricKey: workspace.monthly_function_invocations.max
          scope: workspace
          unit: count
          limit: 5000000
        - metricKey: tenant.audit_retention_days.max
          scope: tenant
          unit: days
          limit: 730
      deploymentProfiles:
      - deploymentProfileId: dpf_01sharedstarter
        slug: shared-starter
        displayName: Shared starter profile
        profileClass: shared
        supportedEnvironments:
        - dev
        - sandbox
        planeBindings:
          control: shared-control-plane
          data: shared-schema
          identity: shared-keycloak-realm
          observability: shared-30d-retention
        providerCapabilityIds:
        - pvc_01keycloakoidc
        - pvc_01pgshared
        - pvc_01storagebucket
        - pvc_01metricsbasic
      - deploymentProfileId: dpf_01sharedgrowth
        slug: shared-growth
        displayName: Shared growth profile
        profileClass: shared
        supportedEnvironments:
        - dev
        - sandbox
        - staging
        - prod
        planeBindings:
          control: shared-control-plane
          data: shared-schema-plus-streams
          identity: shared-keycloak-realm
          observability: shared-90d-retention
        providerCapabilityIds:
        - pvc_01keycloakoidc
        - pvc_01pgshared
        - pvc_01storagebucket
        - pvc_01kafkatopics
        - pvc_01openwhiskactions
        - pvc_01metricsbasic
        - pvc_01logsextended
      - deploymentProfileId: dpf_01regulateddedicated
        slug: regulated-dedicated
        displayName: Regulated dedicated profile
        profileClass: dedicated
        supportedEnvironments:
        - staging
        - prod
        planeBindings:
          control: dedicated-control-plane-policy-set
          data: dedicated-database
          identity: dedicated-keycloak-realm
          observability: regulated-365d-retention
        providerCapabilityIds:
        - pvc_01keycloakoidc
        - pvc_01pgdedicated
        - pvc_01storagebucket
        - pvc_01kafkatopics
        - pvc_01metricsbasic
        - pvc_01auditexport
      - deploymentProfileId: dpf_01enterprisefederated
        slug: enterprise-federated
        displayName: Enterprise federated profile
        profileClass: federated
        supportedEnvironments:
        - dev
        - sandbox
        - staging
        - prod
        planeBindings:
          control: federated-control-plane
          data: dedicated-data-plane
          identity: federated-identity-plane
          observability: enterprise-730d-retention
        providerCapabilityIds:
        - pvc_01keycloakoidc
        - pvc_01pgdedicated
        - pvc_01storagebucket
        - pvc_01kafkatopics
        - pvc_01openwhiskactions
        - pvc_01metricsbasic
        - pvc_01logsextended
        - pvc_01tracesretention
        - pvc_01federatedclusters
        - pvc_01auditexport
    internalNamespaces:
      openwhisk:
      - namespace: platform-system
        description: Shared control-plane automation namespace
        packages:
        - provisioning
        - observability
      - namespace: platform-audit
        description: Audit evidence and export workflows
        packages:
        - evidence
      storage:
        buckets:
        - name: platform-audit
          prefixes:
          - evidence/
          - exports/
        - name: platform-artifacts
          prefixes:
          - packages/
          - bundles/
  reconcile:
    apisix:
      adminService:
        enabled: true
        port: 9180
        targetPort: 9180
        portName: admin
        annotations: {}
      routes:
      - routeId: '1001'
        name: control-plane
        uri: /control-plane/*
        priority: 100
        upstream:
          component: controlPlane
          port: 8080
      - routeId: '1002'
        name: identity
        uri: /auth/*
        priority: 90
        upstream:
          component: keycloak
          port: 8080
      - routeId: '1003'
        name: realtime
        uri: /realtime/*
        priority: 80
        enableWebsocket: true
        upstream:
          component: controlPlane
          port: 8080
      - routeId: '1004'
        name: console
        uri: /*
        priority: 10
        upstream:
          component: webConsole
          port: 3000
      - routeId: '1010'
        name: health
        uri: /health
        methods:
        - GET
        priority: 300
        labels:
          gateway.in-atelier.io/route-kind: public
          gateway.in-atelier.io/audit-required: 'false'
        plugins:
          cors: &id001
            allow_origins: https://console.dev.in-atelier.example.com
            allow_methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
            allow_headers: Authorization,Content-Type,Idempotency-Key,X-API-Version,X-Correlation-Id,X-Requested-With,X-Auth-Subject,X-Actor-Username,X-Tenant-Id,X-Workspace-Id,X-Plan-Id,X-Auth-Scopes,X-Actor-Roles
            expose_headers: X-Correlation-Id,X-RateLimit-Limit,X-RateLimit-Remaining,X-RateLimit-Reset
            allow_credential: true
            max_age: 3600
        upstream:
          component: controlPlane
          port: 8080
      - routeId: '2001'
        name: public-api-platform
        uri: /v1/platform/*
        methods: &id002
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        priority: 239
        labels:
          gateway.in-atelier.io/route-kind: product_api
          gateway.in-atelier.io/family: platform
          gateway.in-atelier.io/tenant-binding: none
          gateway.in-atelier.io/workspace-binding: none
          gateway.in-atelier.io/plan-capabilities: ''
          gateway.in-atelier.io/audit-required: 'false'
        plugins: &id003
          openid-connect: &id004
            bearer_only: true
            client_id: in-atelier-gateway
            discovery: https://iam.dev.in-atelier.example.com/auth/realms/in-atelier-platform/.well-known/openid-configuration
            realm: in-atelier-platform
            set_access_token_header: false
            set_id_token_header: false
            set_userinfo_header: false
            ssl_verify: true
            timeout: 3
          cors: *id001
          limit-count:
            count: 240
            time_window: 60
            rejected_code: 429
            key_type: var
            key: $consumer_name
            allow_degradation: false
          client-control:
            max_body_size: 262144
          request-validation: &id005
            header_schema:
              type: object
              required:
              - X-API-Version
              - X-Correlation-Id
              properties:
                X-API-Version:
                  type: string
                X-Correlation-Id:
                  type: string
                Idempotency-Key:
                  type: string
                X-Auth-Subject:
                  type: string
                  maxLength: 0
                X-Actor-Username:
                  type: string
                  maxLength: 0
                X-Tenant-Id:
                  type: string
                  maxLength: 0
                X-Workspace-Id:
                  type: string
                  maxLength: 0
                X-Plan-Id:
                  type: string
                  maxLength: 0
                X-Auth-Scopes:
                  type: string
                  maxLength: 0
                X-Actor-Roles:
                  type: string
                  maxLength: 0
          proxy-rewrite:
            headers: &id006
              X-Gateway-Managed-Route: 'true'
              X-Correlation-Id: $http_x_correlation_id
              X-Request-Id: $request_id
              X-Internal-Request-Mode: validated_attestation
              X-Internal-Request-Timestamp: $time_iso8601
              Idempotency-Key: $http_idempotency_key
              X-Auth-Subject: $jwt_claim_sub
              X-Actor-Username: $jwt_claim_preferred_username
              X-Tenant-Id: $jwt_claim_tenant_id
              X-Workspace-Id: $jwt_claim_workspace_id
              X-Plan-Id: $jwt_claim_plan_id
              X-Auth-Scopes: $jwt_claim_scope
              X-Actor-Roles: $jwt_claim_realm_access_roles
        upstream:
          component: controlPlane
          port: 8080
      - routeId: '2002'
        name: public-api-tenants
        uri: /v1/tenants/*
        methods: *id002
        priority: 238
        labels:
          gateway.in-atelier.io/route-kind: product_api
          gateway.in-atelier.io/family: tenants
          gateway.in-atelier.io/tenant-binding: required
          gateway.in-atelier.io/workspace-binding: none
          gateway.in-atelier.io/plan-capabilities: ''
          gateway.in-atelier.io/audit-required: 'false'
        plugins: *id003
        upstream:
          component: controlPlane
          port: 8080
      - routeId: '2003'
        name: public-api-workspaces
        uri: /v1/workspaces/*
        methods: *id002
        priority: 237
        labels:
          gateway.in-atelier.io/route-kind: product_api
          gateway.in-atelier.io/family: workspaces
          gateway.in-atelier.io/tenant-binding: required
          gateway.in-atelier.io/workspace-binding: optional
          gateway.in-atelier.io/plan-capabilities: ''
          gateway.in-atelier.io/audit-required: 'false'
        plugins: *id003
        upstream:
          component: controlPlane
          port: 8080
      - routeId: '2004'
        name: public-api-auth
        uri: /v1/auth/*
        methods: *id002
        priority: 236
        labels:
          gateway.in-atelier.io/route-kind: product_api
          gateway.in-atelier.io/family: auth
          gateway.in-atelier.io/tenant-binding: required
          gateway.in-atelier.io/workspace-binding: required
          gateway.in-atelier.io/plan-capabilities: ''
          gateway.in-atelier.io/audit-required: 'false'
        plugins: *id003
        upstream:
          component: controlPlane
          port: 8080
      - routeId: '2005'
        name: public-api-postgres
        uri: /v1/postgres/*
        methods: *id002
        priority: 235
        labels:
          gateway.in-atelier.io/route-kind: product_api
          gateway.in-atelier.io/family: postgres
          gateway.in-atelier.io/tenant-binding: required
          gateway.in-atelier.io/workspace-binding: required
          gateway.in-atelier.io/plan-capabilities: data.postgresql.shared,data.postgresql.dedicated
          gateway.in-atelier.io/audit-required: 'false'
        plugins: *id003
        upstream:
          component: controlPlane
          port: 8080
      - routeId: '2006'
        name: public-api-mongo
        uri: /v1/mongo/*
        methods: *id002
        priority: 234
        labels:
          gateway.in-atelier.io/route-kind: product_api
          gateway.in-atelier.io/family: mongo
          gateway.in-atelier.io/tenant-binding: required
          gateway.in-atelier.io/workspace-binding: required
          gateway.in-atelier.io/plan-capabilities: ''
          gateway.in-atelier.io/audit-required: 'false'
        plugins: *id003
        upstream:
          component: controlPlane
          port: 8080
      - routeId: '2007'
        name: public-api-events
        uri: /v1/events/*
        methods: *id002
        priority: 233
        labels:
          gateway.in-atelier.io/route-kind: product_api
          gateway.in-atelier.io/family: events
          gateway.in-atelier.io/tenant-binding: required
          gateway.in-atelier.io/workspace-binding: required
          gateway.in-atelier.io/plan-capabilities: data.kafka.topics
          gateway.in-atelier.io/audit-required: 'false'
        plugins: *id003
        upstream:
          component: controlPlane
          port: 8080
      - routeId: '2008'
        name: public-api-functions
        uri: /v1/functions/*
        methods: *id002
        priority: 232
        labels:
          gateway.in-atelier.io/route-kind: product_api
          gateway.in-atelier.io/family: functions
          gateway.in-atelier.io/tenant-binding: required
          gateway.in-atelier.io/workspace-binding: required
          gateway.in-atelier.io/plan-capabilities: data.openwhisk.actions
          gateway.in-atelier.io/audit-required: 'false'
        plugins: *id003
        upstream:
          component: controlPlane
          port: 8080
      - routeId: '2009'
        name: public-api-storage
        uri: /v1/storage/*
        methods: *id002
        priority: 231
        labels:
          gateway.in-atelier.io/route-kind: product_api
          gateway.in-atelier.io/family: storage
          gateway.in-atelier.io/tenant-binding: required
          gateway.in-atelier.io/workspace-binding: required
          gateway.in-atelier.io/plan-capabilities: data.storage.bucket
          gateway.in-atelier.io/audit-required: 'false'
        plugins: *id003
        upstream:
          component: controlPlane
          port: 8080
      - routeId: '2010'
        name: public-api-metrics
        uri: /v1/metrics/*
        methods: *id002
        priority: 230
        labels:
          gateway.in-atelier.io/route-kind: product_api
