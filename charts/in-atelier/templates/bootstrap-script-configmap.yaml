{{- if .Values.bootstrap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "in-atelier.bootstrapScriptConfigMapName" . }}
  labels:
    {{- include "in-atelier.labels" . | nindent 4 }}
    in-atelier.io/bootstrap-phase: controller
    in-atelier.io/component: bootstrap
    in-atelier.io/managed-lifecycle: reconcile
  annotations:
    in-atelier.io/bootstrap-one-shot-hash: {{ include "in-atelier.bootstrapOneShotHash" . | quote }}
data:
  bootstrap.sh: |
    #!/bin/bash
    set -euo pipefail

    NAMESPACE="{{ .Release.Namespace }}"
    LOCK_NAME="{{ .Values.bootstrap.lock.name }}"
    MARKER_NAME="{{ .Values.bootstrap.markers.name }}"
    GOVERNANCE_CONFIGMAP="{{ include "in-atelier.bootstrapGovernanceCatalogName" . }}"
    INTERNAL_NAMESPACES_CONFIGMAP="{{ include "in-atelier.bootstrapInternalNamespacesName" . }}"
    PAYLOAD_DIR="/bootstrap/payload"
    ONE_SHOT_HASH="{{ include "in-atelier.bootstrapOneShotHash" . }}"
    RELEASE_REVISION="{{ .Release.Revision }}"
    BREAK_GLASS_EXISTING_LOCK="{{ .Values.bootstrap.lock.breakGlassExistingLock }}"
    KEYCLOAK_REALM_ID="{{ .Values.bootstrap.oneShot.keycloak.realm.realm }}"
    KEYCLOAK_REALM_DISPLAY_NAME="{{ .Values.bootstrap.oneShot.keycloak.realm.displayName }}"
    KEYCLOAK_SUPERADMIN_USERNAME="{{ .Values.bootstrap.oneShot.keycloak.superadmin.username }}"
    APISIX_ADMIN_URL="http://{{ include "in-atelier.apisixAdminServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.bootstrap.reconcile.apisix.adminService.port }}"
    KEYCLOAK_BASE_URL="http://{{ include "in-atelier.componentServiceNameByAlias" (dict "root" . "component" "keycloak") }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.keycloak.service.port }}"

    log() {
      echo "[bootstrap] $*"
    }

    require_env() {
      local name="$1"
      if [ -z "${!name:-}" ]; then
        echo "[bootstrap] required environment variable $name is not set" >&2
        exit 1
      fi
    }

    release_lock() {
      kubectl -n "$NAMESPACE" delete configmap "$LOCK_NAME" --ignore-not-found >/dev/null 2>&1 || true
    }

    acquire_lock() {
      if kubectl -n "$NAMESPACE" get configmap "$LOCK_NAME" >/dev/null 2>&1; then
        if [ "$BREAK_GLASS_EXISTING_LOCK" = "true" ]; then
          log "break-glass enabled; deleting existing bootstrap lock $LOCK_NAME"
          kubectl -n "$NAMESPACE" delete configmap "$LOCK_NAME" --ignore-not-found >/dev/null
        else
          log "bootstrap lock $LOCK_NAME already exists; refusing concurrent execution"
          exit 1
        fi
      fi

      kubectl -n "$NAMESPACE" create configmap "$LOCK_NAME" \
        --from-literal=holder="${HOSTNAME:-bootstrap-job}" \
        --from-literal=startedAt="$(date -u +%FT%TZ)" >/dev/null
      trap release_lock EXIT
    }

    current_marker_hash() {
      kubectl -n "$NAMESPACE" get configmap "$MARKER_NAME" -o jsonpath='{.data.oneShotHash}' 2>/dev/null || true
    }

    write_marker() {
      kubectl -n "$NAMESPACE" create configmap "$MARKER_NAME" \
        --from-literal=oneShotHash="$ONE_SHOT_HASH" \
        --from-literal=completedAt="$(date -u +%FT%TZ)" \
        --from-literal=releaseRevision="$RELEASE_REVISION" \
        --from-literal=mode="apply-missing-and-reconcile" \
        --dry-run=client -o yaml | kubectl -n "$NAMESPACE" apply -f - >/dev/null
    }

    ensure_missing_configmap() {
      local configmap_name="$1"
      shift
      if kubectl -n "$NAMESPACE" get configmap "$configmap_name" >/dev/null 2>&1; then
        log "one-shot configmap $configmap_name already exists; leaving it untouched"
        return 0
      fi

      kubectl -n "$NAMESPACE" create configmap "$configmap_name" "$@" >/dev/null
      kubectl -n "$NAMESPACE" label configmap "$configmap_name" \
        in-atelier.io/bootstrap-phase=one-shot \
        in-atelier.io/managed-lifecycle=create-only \
        --overwrite >/dev/null
      kubectl -n "$NAMESPACE" annotate configmap "$configmap_name" \
        in-atelier.io/bootstrap-one-shot-hash="$ONE_SHOT_HASH" \
        in-atelier.io/bootstrap-created-at="$(date -u +%FT%TZ)" \
        --overwrite >/dev/null
      log "created one-shot configmap $configmap_name"
    }

    get_keycloak_token() {
      local response
      response="$(curl -fsS --retry 6 --retry-delay 5 \
        -H 'Content-Type: application/x-www-form-urlencoded' \
        --data-urlencode 'client_id=admin-cli' \
        --data-urlencode "username=${BOOTSTRAP_KEYCLOAK_ADMIN_USERNAME}" \
        --data-urlencode "password=${BOOTSTRAP_KEYCLOAK_ADMIN_PASSWORD}" \
        --data-urlencode 'grant_type=password' \
        "$KEYCLOAK_BASE_URL/realms/master/protocol/openid-connect/token")"
      echo "$response" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p'
    }

    require_keycloak_token() {
      local token
      token="$(get_keycloak_token)"
      if [ -z "$token" ]; then
        echo '[bootstrap] failed to obtain Keycloak admin token' >&2
        exit 1
      fi
      printf '%s' "$token"
    }

    ensure_keycloak_realm() {
      local token="$1"
      local status
      status="$(curl -sS -o /tmp/keycloak-realm-check -w '%{http_code}' \
        -H "Authorization: Bearer $token" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID")"

      if [ "$status" = "200" ]; then
        log "Keycloak realm $KEYCLOAK_REALM_ID already exists"
        return 0
      fi

      if [ "$status" != "404" ]; then
        cat /tmp/keycloak-realm-check >&2 || true
        echo "[bootstrap] unexpected status while checking realm: $status" >&2
        exit 1
      fi

      status="$(curl -sS -o /tmp/keycloak-realm-create -w '%{http_code}' \
        -X POST \
        -H "Authorization: Bearer $token" \
        -H 'Content-Type: application/json' \
        --data @"$PAYLOAD_DIR/realm.json" \
        "$KEYCLOAK_BASE_URL/admin/realms")"

      if [ "$status" != "201" ] && [ "$status" != "409" ]; then
        cat /tmp/keycloak-realm-create >&2 || true
        echo "[bootstrap] failed to create Keycloak realm; status=$status" >&2
        exit 1
      fi

      log "ensured Keycloak realm $KEYCLOAK_REALM_DISPLAY_NAME"
    }

    ensure_keycloak_role_from_file() {
      local token="$1"
      local role_name="$2"
      local role_file="$3"
      local status
      status="$(curl -sS -o /tmp/keycloak-role-check -w '%{http_code}' \
        -H "Authorization: Bearer $token" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/roles/$role_name")"

      if [ "$status" = "200" ]; then
        log "Keycloak role $role_name already exists"
        return 0
      fi

      if [ "$status" != "404" ]; then
        cat /tmp/keycloak-role-check >&2 || true
        echo "[bootstrap] unexpected status while checking Keycloak role $role_name: $status" >&2
        exit 1
      fi

      status="$(curl -sS -o /tmp/keycloak-role-create -w '%{http_code}' \
        -X POST \
        -H "Authorization: Bearer $token" \
        -H 'Content-Type: application/json' \
        --data @"$role_file" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/roles")"

      if [ "$status" != "201" ] && [ "$status" != "204" ] && [ "$status" != "409" ]; then
        cat /tmp/keycloak-role-create >&2 || true
        echo "[bootstrap] failed to create Keycloak role $role_name; status=$status" >&2
        exit 1
      fi

      log "ensured Keycloak role $role_name"
    }

    ensure_keycloak_client_scope() {
      local token="$1"
      local scope_name="$2"
      local scope_file="$3"
      local response
      local status

      response="$(curl -fsS \
        -H "Authorization: Bearer $token" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/client-scopes")"

      if echo "$response" | grep -q '"name":"'$scope_name'"'; then
        log "Keycloak client scope $scope_name already exists"
        return 0
      fi

      status="$(curl -sS -o /tmp/keycloak-client-scope-create -w '%{http_code}' \
        -X POST \
        -H "Authorization: Bearer $token" \
        -H 'Content-Type: application/json' \
        --data @"$scope_file" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/client-scopes")"

      if [ "$status" != "201" ] && [ "$status" != "409" ]; then
        cat /tmp/keycloak-client-scope-create >&2 || true
        echo "[bootstrap] failed to create Keycloak client scope $scope_name; status=$status" >&2
        exit 1
      fi

      log "ensured Keycloak client scope $scope_name"
    }

    ensure_keycloak_client() {
      local token="$1"
      local client_id="$2"
      local client_file="$3"
      local response
      local status

      response="$(curl -fsS \
        -H "Authorization: Bearer $token" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/clients?clientId=$client_id")"

      if echo "$response" | grep -q '"clientId":"'$client_id'"'; then
        log "Keycloak client $client_id already exists"
        return 0
      fi

      status="$(curl -sS -o /tmp/keycloak-client-create -w '%{http_code}' \
        -X POST \
        -H "Authorization: Bearer $token" \
        -H 'Content-Type: application/json' \
        --data @"$client_file" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/clients")"

      if [ "$status" != "201" ] && [ "$status" != "409" ]; then
        cat /tmp/keycloak-client-create >&2 || true
        echo "[bootstrap] failed to create Keycloak client $client_id; status=$status" >&2
        exit 1
      fi

      log "ensured Keycloak client $client_id"
    }

    lookup_keycloak_user_id() {
      local token="$1"
      local response
      response="$(curl -fsS \
        -H "Authorization: Bearer $token" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/users?username=$KEYCLOAK_SUPERADMIN_USERNAME&exact=true")"
      if ! echo "$response" | grep -q '"username":"'$KEYCLOAK_SUPERADMIN_USERNAME'"'; then
        return 0
      fi
      echo "$response" | sed -n 's/.*"id":"\([^"]*\)","username":"'$KEYCLOAK_SUPERADMIN_USERNAME'".*/\1/p'
    }

    create_keycloak_superadmin() {
      local token="$1"
      local status
      status="$(curl -sS -o /tmp/keycloak-superadmin-create -w '%{http_code}' \
        -X POST \
        -H "Authorization: Bearer $token" \
        -H 'Content-Type: application/json' \
        --data @"$PAYLOAD_DIR/superadmin.json" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/users")"

      if [ "$status" != "201" ] && [ "$status" != "409" ]; then
        cat /tmp/keycloak-superadmin-create >&2 || true
        echo "[bootstrap] failed to create Keycloak superadmin; status=$status" >&2
        exit 1
      fi
    }

    ensure_keycloak_superadmin() {
      local token="$1"
      local user_id
      local role_response
      local role_id
      local mapping_status

      user_id="$(lookup_keycloak_user_id "$token")"
      if [ -z "$user_id" ]; then
        create_keycloak_superadmin "$token"
        user_id="$(lookup_keycloak_user_id "$token")"
      fi

      if [ -z "$user_id" ]; then
        echo '[bootstrap] unable to resolve Keycloak superadmin user id after creation' >&2
        exit 1
      fi

      curl -fsS \
        -X PUT \
        -H "Authorization: Bearer $token" \
        -H 'Content-Type: application/json' \
        --data '{"type":"password","temporary":false,"value":"'"${BOOTSTRAP_SUPERADMIN_PASSWORD}"'"}' \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/users/$user_id/reset-password" >/dev/null

      role_response="$(curl -fsS \
        -H "Authorization: Bearer $token" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/roles/superadmin")"
      role_id="$(echo "$role_response" | sed -n 's/.*"id":"\([^"]*\)".*/\1/p')"
      if [ -z "$role_id" ]; then
        echo '[bootstrap] unable to resolve Keycloak superadmin role id' >&2
        exit 1
      fi

      mapping_status="$(curl -sS -o /tmp/keycloak-superadmin-role-map -w '%{http_code}' \
        -X POST \
        -H "Authorization: Bearer $token" \
        -H 'Content-Type: application/json' \
        --data '[{"id":"'"$role_id"'","name":"superadmin"}]' \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/users/$user_id/role-mappings/realm")"

      if [ "$mapping_status" != "204" ] && [ "$mapping_status" != "409" ]; then
        cat /tmp/keycloak-superadmin-role-map >&2 || true
        echo "[bootstrap] failed to assign Keycloak superadmin role; status=$mapping_status" >&2
        exit 1
      fi

      log "ensured Keycloak superadmin $KEYCLOAK_SUPERADMIN_USERNAME"
    }

    ensure_apisix_route() {
      local route_id="$1"
      local route_file="$2"
      local status
      status="$(curl -sS -o /tmp/apisix-route-response -w '%{http_code}' \
        -X PUT \
        -H 'Content-Type: application/json' \
        -H "X-API-KEY: ${BOOTSTRAP_APISIX_ADMIN_KEY}" \
        --data @"$route_file" \
        "$APISIX_ADMIN_URL/apisix/admin/routes/$route_id")"

      if [ "$status" != "200" ] && [ "$status" != "201" ]; then
        cat /tmp/apisix-route-response >&2 || true
        echo "[bootstrap] failed to reconcile APISIX route $route_id; status=$status" >&2
        exit 1
      fi

      log "reconciled APISIX route $route_id"
    }

    run_one_shot_bootstrap() {
      local token
      token="$(require_keycloak_token)"

      ensure_missing_configmap "$GOVERNANCE_CONFIGMAP" \
        --from-file=plans.json="$PAYLOAD_DIR/governance-plans.json" \
        --from-file=quota-policies.json="$PAYLOAD_DIR/governance-quota-policies.json" \
        --from-file=deployment-profiles.json="$PAYLOAD_DIR/governance-deployment-profiles.json"

      ensure_missing_configmap "$INTERNAL_NAMESPACES_CONFIGMAP" \
        --from-file=internal-namespaces.json="$PAYLOAD_DIR/internal-namespaces.json"

      ensure_keycloak_realm "$token"

      for role_file in "$PAYLOAD_DIR"/role-*.json; do
        [ -e "$role_file" ] || continue
        local role_name
        role_name="$(basename "$role_file" .json)"
        role_name="${role_name#role-}"
        ensure_keycloak_role_from_file "$token" "$role_name" "$role_file"
      done

      for scope_file in "$PAYLOAD_DIR"/client-scope-*.json; do
        [ -e "$scope_file" ] || continue
        local scope_name
        scope_name="$(basename "$scope_file" .json)"
        scope_name="${scope_name#client-scope-}"
        ensure_keycloak_client_scope "$token" "$scope_name" "$scope_file"
      done

      for client_file in "$PAYLOAD_DIR"/client-*.json; do
        [ -e "$client_file" ] || continue
        local client_id
        client_id="$(basename "$client_file" .json)"
        client_id="${client_id#client-}"
        ensure_keycloak_client "$token" "$client_id" "$client_file"
      done

      ensure_keycloak_superadmin "$token"
    }

    run_upgrade_reconciliation() {
{{- $mode := .Values.gatewayPolicy.passthrough.mode }}
{{- range .Values.bootstrap.reconcile.apisix.routes }}
{{- if or (not (hasKey . "enabledInModes")) (has $mode .enabledInModes) }}
      ensure_apisix_route "{{ .routeId }}" "$PAYLOAD_DIR/route-{{ .routeId }}.json"
{{- end }}
{{- end }}
    }

    main() {
      acquire_lock
      require_env BOOTSTRAP_KEYCLOAK_ADMIN_USERNAME
      require_env BOOTSTRAP_KEYCLOAK_ADMIN_PASSWORD
      require_env BOOTSTRAP_SUPERADMIN_PASSWORD
      require_env BOOTSTRAP_APISIX_ADMIN_KEY

      local marker_hash
      marker_hash="$(current_marker_hash)"
      if [ "$marker_hash" = "$ONE_SHOT_HASH" ]; then
        log "bootstrap marker already matches the current one-shot payload; skipping create-only phase"
      else
        log "running create-only bootstrap phase"
        run_one_shot_bootstrap
      fi

      log "running upgrade reconciliation phase"
      run_upgrade_reconciliation
      write_marker
      log "bootstrap completed successfully"
    }

    main "$@"
{{- end }}
