{{- if .Values.bootstrap.enabled }}
{{- if .Values.bootstrap.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "in-atelier.bootstrapServiceAccountName" . }}
  labels:
    {{- include "in-atelier.labels" . | nindent 4 }}
    in-atelier.io/component: bootstrap
    in-atelier.io/managed-lifecycle: reconcile
---
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "in-atelier.fullname" . }}-bootstrap
  labels:
    {{- include "in-atelier.labels" . | nindent 4 }}
    in-atelier.io/component: bootstrap
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "in-atelier.fullname" . }}-bootstrap
  labels:
    {{- include "in-atelier.labels" . | nindent 4 }}
    in-atelier.io/component: bootstrap
subjects:
  - kind: ServiceAccount
    name: {{ include "in-atelier.bootstrapServiceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "in-atelier.fullname" . }}-bootstrap
{{- end }}
