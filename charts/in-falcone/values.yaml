# Temporal DSL interpreter worker (change: add-flows-dsl-interpreter-worker / #359).
# Hosts the generic DslInterpreterWorkflow + harness activities; polls the Temporal
# task queue and makes ONLY outbound gRPC calls to the Temporal frontend (no inbound
# business traffic — the HTTP port serves probes only). Disabled by default; rollback is
# re-setting workflowWorker.enabled: false.
#
# LABEL CONTRACT: the pod MUST carry app.kubernetes.io/component: flows-worker so the
# Temporal frontend NetworkPolicy (templates/temporal/networkpolicy.yaml) admits it on
# port 7233. That label is injected here via podLabels.
workflowWorker:
  enabled: false
  wrapper:
    componentId: workflow-worker
    workload:
      kind: Deployment
  image:
    repository: ghcr.io/gntik-ai/in-falcone-workflow-worker
    tag: 0.1.0
    pullPolicy: IfNotPresent
  replicas: 2
  serviceAccount:
    create: true
    name: ""
    automountToken: false
  service:
    enabled: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
    portName: http
    annotations: {}
  ports:
    - name: http
      containerPort: 8080
  # NetworkPolicy label contract — admits this pod to the Temporal frontend on 7233.
  podLabels:
    app.kubernetes.io/component: flows-worker
  # Connection env is environment-specific (release-prefixed Temporal frontend DNS);
  # set it in the overlay, e.g.:
  #   env:
  #     - { name: TEMPORAL_ADDRESS, value: <release>-temporal-frontend:7233 }
  #     - { name: TEMPORAL_NAMESPACE, value: falcone-flows }
  #     - { name: TEMPORAL_TASK_QUEUE, value: flows-main }
  env:
    - name: TEMPORAL_NAMESPACE
      value: falcone-flows
    - name: TEMPORAL_TASK_QUEUE
      value: flows-main
    - name: WORKER_HEALTH_PORT
      value: "8080"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Stateless worker: no inbound traffic, no durable local state (all state lives in
  # Temporal history). Persistence stays disabled; declared in full so the umbrella
  # values.schema.json (#/definitions/component) validates this stanza strictly.
  persistence:
    enabled: false
    existingClaim: ""
    size: ""
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    mountPath: /var/lib/workflow-worker
    annotations: {}
  # Probes hit the worker's HTTP health server (src/worker.ts): /readyz flips to 200
  # once the Temporal worker is polling; /livez is always 200 while the process is up.
  readinessProbe:
    httpGet:
      path: /readyz
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: /livez
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 15
  # Graceful shutdown: SIGTERM drains in-flight activity polls before exit (worker.ts).
  terminationGracePeriodSeconds: 30
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL

gatewayPolicy:
  version: 2026-03-24
  oidc:
    enabled: true
    provider: keycloak
    realm: in-falcone-platform
    issuerUrl: https://iam.dev.in-falcone.example.com/auth/realms/in-falcone-platform
    discoveryUrl: https://iam.dev.in-falcone.example.com/auth/realms/in-falcone-platform/.well-known/openid-configuration
    clientId: in-falcone-gateway
    bearerOnly: true
    sslVerify: true
    unauthenticatedPreflight: true
    clientIdSecretRef:
      name: in-falcone-identity-client
      key: client-id
  claimsPropagation:
    stripIncomingHeaders: true
    requiredRequestHeaders:
      - X-API-Version
      - X-Correlation-Id
    trustedClaimMappings:
      subject: sub
      username: preferred_username
      tenantId: tenant_id
      workspaceId: workspace_id
      planId: plan_id
      scopes: scope
      roles: realm_access.roles
    headers:
      subject: X-Auth-Subject
      username: X-Actor-Username
      tenantId: X-Tenant-Id
      workspaceId: X-Workspace-Id
      planId: X-Plan-Id
      scopes: X-Auth-Scopes
      roles: X-Actor-Roles
  cors:
    enabled: true
    allowOrigins:
      - https://console.dev.in-falcone.example.com
    allowMethods: *a2
    allowHeaders:
      - Authorization
      - Content-Type
      - Idempotency-Key
      - X-API-Version
      - X-Correlation-Id
      - X-Requested-With
    exposeHeaders:
      - X-Correlation-Id
      - X-Idempotency-Replayed
      - X-RateLimit-Limit
      - X-RateLimit-Remaining
      - X-RateLimit-Reset
    allowCredentials: true
    maxAgeSeconds: 3600
  errorEnvelope:
    schema: ErrorResponse
    correlationResponseHeader: X-Correlation-Id
    requiredFields:
      - status
      - code
      - message
      - detail
      - requestId
      - correlationId
      - timestamp
      - resource
    retryableStatuses:
      - 429
      - 502
      - 503
      - 504
  idempotency:
    headerName: Idempotency-Key
    replayResponseHeader: X-Idempotency-Replayed
    ttlSeconds: 86400
    hashRequestBody: true
    supportedMethods:
      - POST
      - PUT
      - PATCH
      - DELETE
    keyPattern: ^[A-Za-z0-9._:-]{8,128}$
  correlation:
    headerName: X-Correlation-Id
    requestIdHeader: X-Request-Id
    internalTimestampHeader: X-Internal-Request-Timestamp
    internalModeHeader: X-Internal-Request-Mode
    generateWhenMissing: true
    responseHeader: X-Correlation-Id
    tokenPattern: ^[A-Za-z0-9._:-]{8,128}$
  requestValidation:
    spoofedHeaders:
      - X-Auth-Subject
      - X-Actor-Username
      - X-Tenant-Id
      - X-Workspace-Id
      - X-Plan-Id
      - X-Auth-Scopes
      - X-Actor-Roles
    profiles:
      platform_control:
        allowedContentTypes:
          - application/json
        maxBodyBytes: 262144
        requireIdempotencyHeaderOnMutations: true
        rejectSpoofedContextHeaders: true
      tenant_control:
        allowedContentTypes:
          - application/json
        maxBodyBytes: 262144
        requireIdempotencyHeaderOnMutations: true
        rejectSpoofedContextHeaders: true
      workspace_control:
        allowedContentTypes:
          - application/json
        maxBodyBytes: 262144
        requireIdempotencyHeaderOnMutations: true
        rejectSpoofedContextHeaders: true
      auth_control:
        allowedContentTypes:
          - application/json
        maxBodyBytes: 131072
        requireIdempotencyHeaderOnMutations: true
        rejectSpoofedContextHeaders: true
      provisioning:
        allowedContentTypes:
          - application/json
        maxBodyBytes: 1048576
        requireIdempotencyHeaderOnMutations: true
        rejectSpoofedContextHeaders: true
      observability:
        allowedContentTypes: []
        maxBodyBytes: 65536
        requireIdempotencyHeaderOnMutations: false
        rejectSpoofedContextHeaders: true
      event_gateway:
        allowedContentTypes:
          - application/json
          - application/cloudevents+json
        maxBodyBytes: 262144
        requireIdempotencyHeaderOnMutations: true
        rejectSpoofedContextHeaders: true
      realtime:
        allowedContentTypes:
          - application/json
        maxBodyBytes: 131072
        requireIdempotencyHeaderOnMutations: true
        rejectSpoofedContextHeaders: true
      native_admin:
        allowedContentTypes:
          - application/json
        maxBodyBytes: 524288
        requireIdempotencyHeaderOnMutations: false
        rejectSpoofedContextHeaders: true
  # APISIX limit-count storage policy for ALL gateway rate limits.
  #   local (default): per-gateway-node counters — with N replicas the effective limit is ~N×.
  #   redis: counters shared across replicas → globally EXACT limits. Set redis.host to an
  #   in-cluster Redis (e.g. <release>-redis-master); no-auth redis (password isn't supported
  #   here to keep credentials out of the route config).
  rateLimit:
    policy: local
    redis:
      host: ""
      port: 6379
      database: 0
      timeoutMs: 1000
  qos:
    responseHeaders:
      - X-RateLimit-Limit
      - X-RateLimit-Remaining
      - X-RateLimit-Reset
    profiles:
      platform_control:
        rateLimitClass: control-write
        requestsPerMinute: 240
        burst: 60
        timeoutProfile: control_plane
        retryProfile: mutations
        limitKey: X-Tenant-Id
        limitKeyType: var
        limitKeyVar: $http_x_tenant_id
        planQuotaSource: resolveTenantEffectiveCapabilities
        limitCeiling: max_of_plan_and_static
      tenant_control:
        rateLimitClass: control-write
        requestsPerMinute: 240
        burst: 60
        timeoutProfile: control_plane
        retryProfile: mutations
        limitKey: X-Tenant-Id
        limitKeyType: var
        limitKeyVar: $http_x_tenant_id
        planQuotaSource: resolveTenantEffectiveCapabilities
        limitCeiling: max_of_plan_and_static
      workspace_control:
        rateLimitClass: control-write
        requestsPerMinute: 240
        burst: 60
        timeoutProfile: control_plane
        retryProfile: mutations
        limitKey: X-Tenant-Id
        limitKeyType: var
        limitKeyVar: $http_x_tenant_id
        planQuotaSource: resolveTenantEffectiveCapabilities
        limitCeiling: max_of_plan_and_static
      auth_control:
        rateLimitClass: catalog
        requestsPerMinute: 180
        burst: 40
        timeoutProfile: control_plane
        retryProfile: mutations
        limitKey: X-Tenant-Id
        limitKeyType: var
        limitKeyVar: $http_x_tenant_id
        planQuotaSource: resolveTenantEffectiveCapabilities
        limitCeiling: max_of_plan_and_static
      provisioning:
        rateLimitClass: data-control
        requestsPerMinute: 120
        burst: 30
        timeoutProfile: provisioning
        retryProfile: mutations
        limitKey: X-Tenant-Id:X-Workspace-Id
        limitKeyType: var_combination
        limitKeyVar: $http_x_tenant_id $http_x_workspace_id
        planQuotaSource: resolveTenantEffectiveCapabilities
        limitCeiling: max_of_plan_and_static
      observability:
        rateLimitClass: observability
        requestsPerMinute: 300
        burst: 80
        timeoutProfile: observability
        retryProfile: safe_reads
        limitKey: X-Tenant-Id
        limitKeyType: var
        limitKeyVar: $http_x_tenant_id
        planQuotaSource: resolveTenantEffectiveCapabilities
        limitCeiling: max_of_plan_and_static
      event_gateway:
        rateLimitClass: event-gateway-publish
        requestsPerMinute: 180
        burst: 60
        timeoutProfile: event_gateway
        retryProfile: mutations
        limitKey: X-Tenant-Id:X-Workspace-Id
        limitKeyType: var_combination
        limitKeyVar: $http_x_tenant_id $http_x_workspace_id
        planQuotaSource: resolveTenantEffectiveCapabilities
        limitCeiling: max_of_plan_and_static
      realtime:
        rateLimitClass: event-gateway-stream
        requestsPerMinute: 180
        burst: 80
        timeoutProfile: realtime
        retryProfile: mutations
        limitKey: X-Tenant-Id:X-Workspace-Id
        limitKeyType: var_combination
        limitKeyVar: $http_x_tenant_id $http_x_workspace_id
        planQuotaSource: resolveTenantEffectiveCapabilities
        limitCeiling: max_of_plan_and_static
      native_admin:
        rateLimitClass: native-admin
        requestsPerMinute: 30
        burst: 10
        timeoutProfile: native_admin
        retryProfile: native_admin
        limitKey: X-Tenant-Id
        limitKeyType: var
        limitKeyVar: $http_x_tenant_id
        planQuotaSource: resolveTenantEffectiveCapabilities
        limitCeiling: max_of_plan_and_static
    timeoutProfiles:
      control_plane:
        connectSeconds: 3
        sendSeconds: 15
        readSeconds: 20
      provisioning:
        connectSeconds: 3
        sendSeconds: 20
        readSeconds: 30
      observability:
        connectSeconds: 3
        sendSeconds: 10
        readSeconds: 15
      event_gateway:
        connectSeconds: 3
        sendSeconds: 15
        readSeconds: 75
      realtime:
        connectSeconds: 3
        sendSeconds: 15
        readSeconds: 75
      native_admin:
        connectSeconds: 3
        sendSeconds: 15
        readSeconds: 25
    retryProfiles:
      safe_reads:
        retries: 1
        retryTimeoutSeconds: 2
        retryOnStatuses:
          - 502
          - 503
          - 504
      mutations:
        retries: 0
        retryTimeoutSeconds: 0
        retryOnStatuses: []
      native_admin:
        retries: 0
        retryTimeoutSeconds: 0
        retryOnStatuses: []
  observability:
    gatewayMetrics:
      enabled: true
      plugin: prometheus
      metricsPath: /apisix/prometheus/metrics
      seriesPrefix: in_falcone_event_gateway_
      requiredSeries:
        - apisix_http_status
        - apisix_nginx_http_current_connections
        - in_falcone_event_gateway_active_ws_connections
        - in_falcone_event_gateway_active_sse_streams
        - in_falcone_event_gateway_publish_total
        - in_falcone_event_gateway_backpressure_rejections_total
        - in_falcone_event_gateway_rate_limit_rejections_total
      # Per-tenant rate-limit partitioning is observable: the rate-limit rejection
      # series is labelled by tenant_id (and workspace_id for workspace-bound
      # families) so per-tenant 429 rates can be alerted on independently.
      rateLimitMetric:
        series: in_falcone_event_gateway_rate_limit_rejections_total
        labels:
          - tenant_id
          - workspace_id
          - qos_profile
      scrapeTarget:
        component: apisix
        portName: http
  publicRoutes:
    allowAnonymousOptions: true
    routes:
      - id: health
        path: /health
        methods:
          - GET
        authMode: none
        upstreamComponent: controlPlane
  passthrough:
    mode: enabled
    audit:
      required: true
      plugin: http-logger
      endpoint: /control-plane/internal/audit/gateway-passthrough
      includeRequestBody: false
      requiredHeaders:
        - X-Correlation-Id
        - X-Auth-Subject
        - X-Auth-Scopes
    routes:
      - id: keycloak_admin
        title: Keycloak admin passthrough
        enabledInModes:
          - enabled
          - limited
        pathPrefix: /_native/keycloak/admin/*
        qosProfile: native_admin
        requestValidationProfile: native_admin
        requiredScopes:
          - gateway.native.keycloak.admin
        requiredRoles:
          - superadmin
        auditAction: keycloak_admin_passthrough
  internalRequests:
    mode: validated_attestation
    requiredHeaders:
      - X-Gateway-Managed-Route
      - X-Correlation-Id
      - X-Request-Id
      - X-Internal-Request-Mode
      - X-Internal-Request-Timestamp
    injectedHeaders:
      correlationId: X-Correlation-Id
      requestId: X-Request-Id
      mode: X-Internal-Request-Mode
      timestamp: X-Internal-Request-Timestamp
  familyPolicies:
    platform:
      tenantBinding: none
      workspaceBinding: none
      qosProfile: platform_control
      requestValidationProfile: platform_control
      planCapabilityAnyOf: []
    tenants:
      tenantBinding: required
      workspaceBinding: none
      qosProfile: tenant_control
      requestValidationProfile: tenant_control
      planCapabilityAnyOf: []
    workspaces:
      tenantBinding: required
      workspaceBinding: optional
      qosProfile: workspace_control
      requestValidationProfile: workspace_control
      planCapabilityAnyOf: []
    auth:
      tenantBinding: none
      workspaceBinding: none
      qosProfile: auth_control
      requestValidationProfile: auth_control
      planCapabilityAnyOf: []
    iam:
      tenantBinding: required
      workspaceBinding: optional
      qosProfile: tenant_control
      requestValidationProfile: tenant_control
      planCapabilityAnyOf:
        - identity.sso.oidc
    postgres:
      tenantBinding: required
      workspaceBinding: required
      qosProfile: provisioning
      requestValidationProfile: provisioning
      planCapabilityAnyOf:
        - data.postgresql.shared
        - data.postgresql.dedicated
    mongo:
      tenantBinding: required
      workspaceBinding: required
      qosProfile: provisioning
      requestValidationProfile: provisioning
      planCapabilityAnyOf: []
    events:
      tenantBinding: required
      workspaceBinding: required
      qosProfile: event_gateway
      requestValidationProfile: event_gateway
      planCapabilityAnyOf:
        - data.kafka.topics
    functions:
      tenantBinding: required
      workspaceBinding: required
      qosProfile: provisioning
      requestValidationProfile: provisioning
      planCapabilityAnyOf:
        - data.openwhisk.actions
    storage:
      tenantBinding: required
      workspaceBinding: required
      qosProfile: provisioning
      requestValidationProfile: provisioning
      planCapabilityAnyOf:
        - data.storage.bucket
    metrics:
      tenantBinding: required
      workspaceBinding: required
      qosProfile: observability
      requestValidationProfile: observability
      planCapabilityAnyOf:
        - observability.metrics.basic
    websockets:
      tenantBinding: required
      workspaceBinding: required
      qosProfile: realtime
      requestValidationProfile: realtime
      planCapabilityAnyOf:
        - data.kafka.topics
  accessMatrix:
    personas:
      - id: workspace_owner
        audiences:
          - workspace_owner
        roles:
          - workspace_owner
        scopes:
          - openid
          - profile
          - gateway.product.read
          - gateway.product.write
        planId: pln_01enterprise
      - id: workspace_admin
        audiences:
          - workspace_admin
        roles:
          - workspace_admin
        scopes:
          - openid
          - profile
          - tenant.admin
        planId: pln_01growth
      - id: workspace_developer
        audiences:
          - workspace_developer
        roles:
          - workspace_developer
        scopes:
          - openid
          - profile
          - gateway.product.read
          - gateway.product.write
        planId: pln_01growth
      - id: workspace_viewer
        audiences:
          - workspace_viewer
        roles:
          - workspace_viewer
        scopes:
          - openid
          - profile
          - gateway.product.read
        planId: pln_01enterprise
      - id: workspace_service_account
        audiences:
          - workspace_service_account
        roles:
          - workspace_service_account
        scopes:
          - gateway.product.read
          - gateway.product.write
        planId: pln_01growth
      - id: tenant_admin
        audiences:
          - tenant_owner
          - tenant_admin
        roles:
          - tenant_owner
          - tenant_admin
        scopes:
          - openid
          - profile
          - tenant.admin
        planId: pln_01regulated
      - id: tenant_developer
        audiences:
          - tenant_developer
        roles:
          - tenant_developer
        scopes:
          - openid
          - profile
          - gateway.product.read
        planId: pln_01growth
      - id: tenant_viewer
