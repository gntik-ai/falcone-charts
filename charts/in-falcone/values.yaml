      planCapabilityAnyOf:
        - identity.sso.oidc
    postgres:
      tenantBinding: required
      workspaceBinding: required
      qosProfile: provisioning
      requestValidationProfile: provisioning
      planCapabilityAnyOf:
        - data.postgresql.shared
        - data.postgresql.dedicated
    mongo:
      tenantBinding: required
      workspaceBinding: required
      qosProfile: provisioning
      requestValidationProfile: provisioning
      planCapabilityAnyOf: []
    events:
      tenantBinding: required
      workspaceBinding: required
      qosProfile: event_gateway
      requestValidationProfile: event_gateway
      planCapabilityAnyOf:
        - data.kafka.topics
    functions:
      tenantBinding: required
      workspaceBinding: required
      qosProfile: provisioning
      requestValidationProfile: provisioning
      planCapabilityAnyOf:
        - data.openwhisk.actions
    storage:
      tenantBinding: required
      workspaceBinding: required
      qosProfile: provisioning
      requestValidationProfile: provisioning
      planCapabilityAnyOf:
        - data.storage.bucket
    metrics:
      tenantBinding: required
      workspaceBinding: required
      qosProfile: observability
      requestValidationProfile: observability
      planCapabilityAnyOf:
        - observability.metrics.basic
    websockets:
      tenantBinding: required
      workspaceBinding: required
      qosProfile: realtime
      requestValidationProfile: realtime
      planCapabilityAnyOf:
        - data.kafka.topics
  accessMatrix:
    personas:
      - id: workspace_owner
        audiences:
          - workspace_owner
        roles:
          - workspace_owner
        scopes:
          - openid
          - profile
          - gateway.product.read
          - gateway.product.write
        planId: pln_01enterprise
      - id: workspace_admin
        audiences:
          - workspace_admin
        roles:
          - workspace_admin
        scopes:
          - openid
          - profile
          - tenant.admin
        planId: pln_01growth
      - id: workspace_developer
        audiences:
          - workspace_developer
        roles:
          - workspace_developer
        scopes:
          - openid
          - profile
          - gateway.product.read
          - gateway.product.write
        planId: pln_01growth
      - id: workspace_viewer
        audiences:
          - workspace_viewer
        roles:
          - workspace_viewer
