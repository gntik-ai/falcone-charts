# Control-plane EXECUTOR: the runnable data control-plane (apps/control-plane) that
# EXECUTES the adapter plans against the workspace backends (Postgres/Mongo/Kafka +
# Functions). OPT-IN (disabled by default): when enabled, the data-plane APISIX routes
# (upstream.dataPlane:true — /v1/postgres|mongo|events|functions/*) are sent here instead
# of the default control-plane (see templates/bootstrap-payload-configmap.yaml). The data
# connection env (PG*/MONGO_*/KAFKA_BROKERS via secretKeyRef) is environment-specific and
# set in the overlay. The executor serves the data-plane + DDL slice and TRANSPARENTLY
# PROXIES every other path under those prefixes (browse/inventory/management routes) to the
# legacy control-plane via CONTROL_PLANE_UPSTREAM — so enabling the executor keeps the full
# product API working. Set CONTROL_PLANE_UPSTREAM in the overlay (required when enabling);
# if it is unset the executor 404s the non-data-plane routes.
controlPlaneExecutor:
  enabled: false
  wrapper:
    componentId: control-plane-executor
    workload:
      kind: Deployment
  image:
    repository: ghcr.io/gntik-ai/in-falcone-control-plane-executor
    tag: 0.9.0
    pullPolicy: IfNotPresent
  replicas: 2
  serviceAccount:
    create: true
    name: ""
    automountToken: false
  service:
    enabled: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
    portName: http
    annotations: {}
  ports:
    - name: http
      containerPort: 8080
  # Data connection env is environment-specific (release-prefixed DNS + external secrets);
  # set it in the overlay, e.g.:
  #   env:
  #     # REQUIRED: where to proxy non-data-plane (browse/inventory/management) routes.
  #     - { name: CONTROL_PLANE_UPSTREAM, value: http://<release>-control-plane:8080 }
  #     - { name: PGHOST, value: <release>-postgresql }
  #     - { name: PGUSER, value: falcone }
  #     - { name: PGPASSWORD, valueFrom: { secretKeyRef: { name: in-falcone-postgresql, key: POSTGRESQL_PASSWORD } } }
  #     - { name: MONGO_HOST, value: <release>-ferretdb:27017 }
  #     - { name: MONGO_USER, value: falcone }
  #     - { name: MONGO_PASSWORD, valueFrom: { secretKeyRef: { name: in-falcone-documentdb, key: POSTGRES_PASSWORD } } }
  #     - { name: KAFKA_BROKERS, value: <release>-kafka:9092 }
  #     # Optional: verify Bearer JWTs in the executor (Keycloak/OIDC). Enables admin/user
  #     # auth WITHOUT the gateway injecting x-tenant-id (e.g. API-key issuance via an
  #     # OIDC-less gateway). Unset → the executor trusts gateway-injected identity headers.
  #     - { name: KEYCLOAK_JWKS_URL, value: "http://<release>-keycloak:8080/realms/in-falcone-platform/protocol/openid-connect/certs" }
  #     # - { name: KEYCLOAK_ISSUER, value: "https://iam.<env>.in-falcone.example.com/realms/in-falcone-platform" }
  #     # - { name: KEYCLOAK_AUDIENCE, value: in-falcone-console }
  env: []
  readinessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 3
    periodSeconds: 5
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL

