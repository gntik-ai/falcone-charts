documentdb:
  enabled: true
  wrapper:
    componentId: documentdb
    workload:
      kind: StatefulSet
  # Pinned by tag AND digest (digest wins in component-wrapper.renderImage) so the
  # GUC surface is reproducible (ADR-14). PostgreSQL 17.6; bundled extensions:
  # documentdb 0.107-0, documentdb_core 0.107-0, pg_cron 1.6, postgis 3.6.0,
  # rum 1.3, vector 0.8.1, tsm_system_rows.
  image:
    repository: ghcr.io/ferretdb/postgres-documentdb
    tag: 17-0.107.0-ferretdb-2.7.0
    digest: sha256:2386795ec2aa7ae559304361979f1dc5708d383ee9020ae63dadc2940dfe58f7
    pullPolicy: IfNotPresent
  replicas: 1
  # SERVER-START GUCs on the postgres command line. The engine image does NOT honor the conf.d
  # ConfigMap (documentdb-configmap.yaml): its postgresql.conf has `include_dir` commented out, so a
  # mounted conf.d file is silently ignored (confirmed on a live kind engine — the GUC source stayed
  # `default`). GUCs that must be active at postmaster start are therefore passed here as `postgres
  # -c` args; the image ENTRYPOINT (docker-entrypoint.sh) runs initdb then forwards these to postgres.
  # The image also writes shared_preload_libraries/cron.database_name into postgresql.conf, but
  # declaring them here is explicit and matches the validated tests/env compose. wal_level=logical is
  # REQUIRED for the realtime SSE + CDC logical replication slots (add-ferretdb-realtime-cdc-
  # remediation #460); without it pg_create_logical_replication_slot fails.
  args:
    - postgres
    - -c
    - shared_preload_libraries=pg_cron,pg_documentdb_core,pg_documentdb
    - -c
    - cron.database_name=postgres
    - -c
    - wal_level=logical
  serviceAccount:
    create: true
    name: ""
    automountToken: false
  service:
    enabled: true
    type: ClusterIP
    port: 5432
    targetPort: 5432
    portName: tcp-documentdb
    annotations: {}
  ports:
    - name: tcp-documentdb
      containerPort: 5432
      protocol: TCP
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 2Gi
  env:
    - name: POSTGRES_DB
      value: in_falcone
    # Keep PGDATA in a sub-directory of the mounted PVC so the official postgres
    # entrypoint does not trip over a non-empty volume root (e.g. lost+found).
    - name: PGDATA
      value: /var/lib/postgresql/data/pgdata
  # POSTGRES_USER / POSTGRES_PASSWORD admin credentials are provided out-of-band
  # via the `in-falcone-documentdb` Secret (mirrors in-falcone-postgresql /
  # in-falcone-mongodb). Per-tenant roles are a separate change
  # (add-ferretdb-tenant-isolation-credentials).
  envFromSecrets:
    - in-falcone-documentdb
  envFromConfigMaps: []
  persistence:
    enabled: true
    existingClaim: ""
    size: 20Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    mountPath: /var/lib/postgresql/data
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    fsGroup: 1001
    fsGroupChangePolicy: OnRootMismatch
    # Unlike the bitnami siblings (image USER 1001, already non-root), this is the
    # OFFICIAL postgres image (USER root + gosu drop), so runAsNonRoot:true alone
    # would be rejected on vanilla k8s. Pin the postgres uid (999) here; the
    # OpenShift overlay nulls it so the SCC injects a namespace-range uid instead.
    runAsUser: 999
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # SERVER-START GUCs are delivered as a conf.d include FILE (not the wrapper's
  # config.inline, which renders an env-var ConfigMap). The ConfigMap is
  # templates/documentdb-configmap.yaml; its name MUST equal confConfigMapName.
  confConfigMapName: in-falcone-documentdb-conf
  extraVolumes:
    - name: documentdb-conf
      configMap:
        name: in-falcone-documentdb-conf
        items:
          - key: custom.conf
            path: custom.conf
  extraVolumeMounts:
    - name: documentdb-conf
      mountPath: /etc/postgresql/conf.d/custom.conf
      subPath: custom.conf
      readOnly: true
  config:
    inline: {}
  initContainers: []
  volumePermissions:
    enabled: false
    image:
      repository: docker.io/library/busybox
      tag: 1.36.1
      pullPolicy: IfNotPresent
    command: []
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
  # Logical replication provisioning for realtime SSE + CDC (add-ferretdb-realtime-cdc-
  # remediation #460). FerretDB v2 has no change streams, so the realtime executor and the Kafka
  # CDC bridge consume a pgoutput logical replication slot on this engine. When enabled, the init
  # Job creates a REPLICATION-privileged role (distinct from falcone_app and the per-tenant roles),
  # the schema-scoped publication, REPLICA IDENTITY FULL on existing documents_* tables, and an
  # event trigger that keeps RI FULL applied to tables created later (new collections). The
  # consumers (realtime executor / CDC bridge) connect with this role via REALTIME_DOCUMENTDB_URL /
  # MONGO_CDC_DOCUMENTDB_URL; the password is provided out-of-band in the named Secret (mirrors the
  # admin-creds pattern). wal_level=logical is set in templates/documentdb-configmap.yaml.
  logicalReplication:
    enabled: true
    publicationName: falcone_cdc_pub
    role:
      name: falcone_cdc_repl
      # Secret + key holding the replication role password. MUST exist before install (like the
      # admin in-falcone-documentdb Secret); the same value backs the consumers' connection URLs.
      passwordSecretName: in-falcone-documentdb-replication
      passwordSecretKey: password
  # Post-install/post-upgrade hook Job that creates the `documentdb` extension in
  # the target DB once the engine is ready (templates/documentdb-init-job.yaml).
  initJob:
    enabled: true
    backoffLimit: 5
    activeDeadlineSeconds: 600
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 999
      fsGroup: 1001
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 999
      capabilities:
        drop:
          - ALL
# FerretDB gateway — stateless MongoDB-wire-protocol proxy that translates to SQL
# against the documentdb engine. Rendered by the component-wrapper sub-chart (alias
# `ferretdb` in Chart.yaml) as a Deployment (no PVC, >=2 replicas, HPA-ready).
# OFF by default; deploy alongside mongodb during the MongoDB -> FerretDB cutover
# (add-ferretdb-gateway). Tenants never reach this Service; only the control-plane /
# CDC bridge consume it via MONGO_URI (repoint deferred to add-ferretdb-data-access-cutover).
#
# VERSION COUPLING: the gateway image tag 2.7.0 is paired with the documentdb engine
# 0.107.0-ferretdb-2.7.0 (MongoDB wire protocol 7.0, maxWireVersion 21, buildInfo
# 7.0.77). Pinned by tag AND digest so registry drift is caught at pull time. UPGRADE
# ORDER: upgrade the documentdb engine FIRST, then bump this tag+digest to the matching
# FerretDB release. STARTUP ORDER: the engine must have `CREATE EXTENSION documentdb`
# applied (documentdb_api schema present) before the gateway connects — enforced by the
# engine-gate initContainer below + the readiness probe.
ferretdb:
  enabled: true
  wrapper:
    componentId: ferretdb
    workload:
      kind: Deployment
  image:
    repository: ghcr.io/ferretdb/ferretdb
    tag: 2.7.0
    digest: sha256:5706414241eb84f0515512c37b46db0f1b1eac9e5ceb7e4c2523211c184b1985
    pullPolicy: IfNotPresent
  replicas: 2
  serviceAccount:
    create: true
    name: ""
    automountToken: false
  service:
    enabled: true
    type: ClusterIP
    port: 27017
    targetPort: 27017
    portName: tcp-mongo
    annotations: {}
  ports:
    - name: tcp-mongo
      containerPort: 27017
      protocol: TCP
    - name: http-debug
      containerPort: 8088
      protocol: TCP
  # HPA-ready: modest requests, headroom in limits. The gateway is CPU-bound on
  # wire<->SQL translation; no local state.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1
      memory: 512Mi
  env:
    # Backend DSN sourced from a Secret (never hardcoded). The Secret carries the full
    # postgres://USER:PASS@in-falcone-documentdb:5432/postgres?sslmode=require URL using the
    # documentdb bootstrap/superuser role (so FerretDB can manage the schema). The database
    # is `postgres` — that is where the documentdb extension + documentdb_api schema live
    # (pg_cron is bound to cron.database_name='postgres'). Provisioned out-of-band
    # (ESO/Vault/bootstrap), like in-falcone-postgresql/-mongodb.
    - name: FERRETDB_POSTGRESQL_URL
      valueFrom:
        secretKeyRef:
          name: in-falcone-ferretdb
          key: postgresql-url
    # Bind the debug/health server on all interfaces (default is 127.0.0.1, which the
    # kubelet probe cannot reach) so the liveness/readiness HTTP probes work.
    - name: FERRETDB_DEBUG_ADDR
      value: ":8088"
    - name: FERRETDB_LISTEN_ADDR
      value: ":27017"
  envFromSecrets: []
  envFromConfigMaps: []
  persistence:
    enabled: false
    existingClaim: ""
    size: ""
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    mountPath: /var/lib/ferretdb
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  # Stateless gateway: inherits global.podSecurity (runAsNonRoot, seccomp, fsGroup 1001).
  # fsGroup is harmless here (no volumes); the OpenShift overlay nulls it for SCC.
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    # The FerretDB image declares a NON-NUMERIC user (`ferretdb`); kubelet cannot verify
    # runAsNonRoot without a numeric uid (CreateContainerConfigError), so pin it. FerretDB
    # v2 runs as uid 1000 and is a stateless proxy (no uid-specific local writes). The
    # OpenShift overlay nulls this so the SCC injects a namespace-range uid. (Surfaced by
    # the kind live run — corrects design D5's "no runAsUser needed" assumption.)
    runAsUser: 1000
  # FerretDB v2.7.0 debug endpoints (live-verified, add-ferretdb-data-access-cutover #459):
  # /debug/livez (liveness) and /debug/readyz (readiness — 200 only once the DocumentDB
  # backend connection is established). NOT /debug/healthz (that path only 200s via the
  # /debug/ prefix index, so it would NOT gate readiness on backend connectivity). The
  # debug server binds all interfaces via FERRETDB_DEBUG_ADDR=:8088.
  livenessProbe:
    httpGet:
      path: /debug/livez
      port: 8088
    initialDelaySeconds: 15
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /debug/readyz
      port: 8088
    initialDelaySeconds: 5
    periodSeconds: 5
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraVolumes: []
  extraVolumeMounts: []
  config:
    inline: {}
  # Engine-first hard gate (add-ferretdb-gateway task 7.3): block the gateway container
  # until the documentdb engine accepts connections AND the documentdb_api schema exists
  # (loaded by the engine's CREATE EXTENSION init Job). Uses the engine image (psql +
  # version-coupled). AIRGAP NOTE: initContainer images are NOT auto-rewritten by
  # global.imageRegistry; mirror/override this image alongside the engine image.
  initContainers:
    - name: wait-for-documentdb
      image: ghcr.io/ferretdb/postgres-documentdb:17-0.107.0-ferretdb-2.7.0@sha256:2386795ec2aa7ae559304361979f1dc5708d383ee9020ae63dadc2940dfe58f7
      imagePullPolicy: IfNotPresent
      command:
        - /bin/bash
        - -ec
        - |
          export PGUSER="${POSTGRES_USER:-postgres}" PGPASSWORD="${POSTGRES_PASSWORD:-}"
          echo "Waiting for documentdb engine ${PGHOST}:${PGPORT} ..."
          until pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}" -d "${PGDATABASE}"; do
            echo "  engine not ready; retry in 2s"; sleep 2
          done
          echo "Engine up. Waiting for documentdb_api schema (CREATE EXTENSION done) ..."
          until [ "$(psql -h "${PGHOST}" -p "${PGPORT}" -d "${PGDATABASE}" -tAc \
            "SELECT 1 FROM information_schema.schemata WHERE schema_name = 'documentdb_api'")" = "1" ]; do
            echo "  documentdb_api absent; retry in 2s"; sleep 2
          done
          echo "documentdb_api present — gateway may start."
      env:
        - name: PGHOST
          value: in-falcone-documentdb
        - name: PGPORT
          value: "5432"
        # The documentdb extension + documentdb_api schema live in the `postgres`
        # database: pg_documentdb cascades pg_cron, and pg_cron is bound to
        # cron.database_name='postgres' (engine custom.conf), so CREATE EXTENSION only
        # succeeds in `postgres`. FerretDB connects to `postgres`; per-tenant Mongo
        # "databases" are logical namespaces inside it. (Surfaced by the kind live run;
        # the add-ferretdb-documentdb-engine init-Job must likewise target `postgres`.)
        - name: PGDATABASE
          value: postgres
        - name: HOME
          value: /tmp
      envFrom:
        - secretRef:
            name: in-falcone-documentdb
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 999
        capabilities:
          drop:
            - ALL
  volumePermissions:
    enabled: false
    image:
      repository: docker.io/library/busybox
      tag: 1.36.1
      pullPolicy: IfNotPresent
    command: []
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
  # In-cluster MongoDB-protocol TLS (gateway -> client) is deferred to a follow-on
  # mTLS/service-mesh change; the ClusterIP-only boundary makes plaintext acceptable
  # initially. Backend (gateway -> postgres) TLS is enforced via sslmode=require in the
  # FERRETDB_POSTGRESQL_URL secret value. (add-ferretdb-gateway task 4.2 / design D6.)
  tls:
    enabled: false
  # Internal-only NetworkPolicy (templates/ferretdb-networkpolicy.yaml), gated by
  # ferretdb.enabled AND ferretdb.networkPolicy.enabled. Allows ingress to 27017 only
  # from the listed Falcone app components (control-plane / executor / workflow worker
  # — the MONGO_URI + CDC consumers); denies all other ingress. Honored only under a
  # policy-enforcing CNI (kindnet does NOT enforce it). Default ON when enabled.
  networkPolicy:
    enabled: true
    # Must match the rendered app.kubernetes.io/name pod labels (KEBAB-case componentId).
    allowedAppComponents:
      - control-plane
      - control-plane-executor
      - workflow-worker
kafka:
  enabled: true
  wrapper:
    componentId: kafka
    workload:
      kind: StatefulSet
  image:
