        # ---- Anon/service API-key data-plane routes (Supabase-style) — OPT-IN ----
        # Frontend apps authenticate with an `apikey: flc_anon_...|flc_service_...` header
        # instead of a Keycloak JWT. These routes are selected by the apikey header (vars),
        # carry NO openid-connect, and forward straight to the executor, which verifies the
        # key and derives tenant/workspace FROM the key — the key is authoritative over any
        # client-supplied x-* identity header (no spoofing). Priority is higher than the
        # matching JWT route so a key request wins; without the header the request falls
        # through to the JWT route. requiresExecutor:true → these render only when the
        # executor is enabled (only it can verify keys).
        - routeId: "2005-key"
          name: public-api-postgres-apikey
          uri: /v1/postgres/*
          methods: *a2
          priority: 335
          vars:
            - ["http_apikey", "~~", "^flc_"]
          labels:
            gateway.in-falcone.io/route-kind: product_api_apikey
            gateway.in-falcone.io/family: postgres
            gateway.in-falcone.io/tenant-binding: api-key
            gateway.in-falcone.io/workspace-binding: api-key
            gateway.in-falcone.io/plan-capabilities: data.postgresql.shared,data.postgresql.dedicated
            gateway.in-falcone.io/audit-required: "false"
          plugins:
            cors: *a1
            # Per-key rate limit for the public anon/service surface (noisy-neighbor guard).
            # Keyed by the apikey header (no JWT/x-tenant-id here); count is the floor.
            limit-count:
              count: 120
              time_window: 60
              rejected_code: 429
              key_type: var_combination
              key: $http_apikey
              allow_degradation: false
          upstream:
            component: controlPlane
            port: 8080
            dataPlane: true
            requiresExecutor: true
