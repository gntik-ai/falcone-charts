            gateway.in-falcone.io/tenant-binding: required
            gateway.in-falcone.io/workspace-binding: required
            gateway.in-falcone.io/plan-capabilities: ""
            gateway.in-falcone.io/audit-required: "true"
          plugins: *a3
          upstream:
            component: controlPlane
            port: 8080
            dataPlane: true
            requiresExecutor: true
