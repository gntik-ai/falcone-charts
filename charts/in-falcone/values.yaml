            gateway.in-falcone.io/workspace-binding: api-key
            gateway.in-falcone.io/plan-capabilities: data.kafka.topics
            gateway.in-falcone.io/audit-required: "false"
          plugins:
            cors: *a1
            # Per-key rate limit for the public anon/service surface (noisy-neighbor guard).
            # Keyed by the apikey header (no JWT/x-tenant-id here); count is the floor.
            limit-count:
              count: 120
              time_window: 60
              rejected_code: 429
              key_type: var_combination
              key: $http_apikey
              allow_degradation: false
          upstream:
            component: controlPlane
            port: 8080
            dataPlane: true
            requiresExecutor: true
        - routeId: "2008-key"
          name: public-api-functions-apikey
          uri: /v1/functions/*
          methods: *a2
          priority: 332
          vars:
            - ["http_apikey", "~~", "^flc_"]
          labels:
            gateway.in-falcone.io/route-kind: product_api_apikey
            gateway.in-falcone.io/family: functions
            gateway.in-falcone.io/tenant-binding: api-key
            gateway.in-falcone.io/workspace-binding: api-key
            gateway.in-falcone.io/plan-capabilities: data.openwhisk.actions
            gateway.in-falcone.io/audit-required: "false"
          plugins:
            cors: *a1
            # Per-key rate limit for the public anon/service surface (noisy-neighbor guard).
            # Keyed by the apikey header (no JWT/x-tenant-id here); count is the floor.
            limit-count:
              count: 120
              time_window: 60
              rejected_code: 429
              key_type: var_combination
              key: $http_apikey
              allow_degradation: false
          upstream:
            component: controlPlane
            port: 8080
            dataPlane: true
            requiresExecutor: true
        # ---- Realtime change stream (SSE) → executor (OPT-IN). Read-only; a browser
        #      EventSource cannot set headers, so the anon key arrives as ?apikey= and the
        #      executor verifies it. Long upstream timeout (upstream.sse) keeps the stream open. ----
        - routeId: "2016-rt"
          name: public-api-realtime-changes
          uri: /v1/realtime/*
          methods: ["GET", "OPTIONS"]
          priority: 340
          vars:
            # matches both Mongo (collections/{c}/changes) and Postgres (tables/{t}/changes)
            - ["uri", "~~", "/changes$"]
          labels:
            gateway.in-falcone.io/route-kind: product_api_apikey
            gateway.in-falcone.io/family: realtime
            gateway.in-falcone.io/tenant-binding: api-key
            gateway.in-falcone.io/workspace-binding: api-key
            gateway.in-falcone.io/plan-capabilities: ""
            gateway.in-falcone.io/audit-required: "false"
          plugins:
            cors: *a1
            # Per-key rate limit (anon key may be header or ?apikey=).
            limit-count:
              count: 120
              time_window: 60
              rejected_code: 429
              key_type: var_combination
              key: $http_apikey$arg_apikey
              allow_degradation: false
          upstream:
            component: controlPlane
            port: 8080
            dataPlane: true
            requiresExecutor: true
            sse: true
        # ---- API-key issuance/management → executor (OPT-IN). Admin (JWT) identity only;
        #      the executor rejects key-managed-by-key (403). Matches just the api-keys
        #      subpath at higher priority than the generic /v1/workspaces/* route. ----
        - routeId: "2003-keys"
          name: public-api-workspace-api-keys
