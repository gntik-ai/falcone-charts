          - tenant_viewer
        scopes:
          - openid
          - profile
          - gateway.product.read
        planId: pln_01enterprise
      - id: mixed_tenant_viewer_workspace_developer
        audiences:
          - tenant_viewer
          - workspace_developer
        roles:
          - tenant_viewer
          - workspace_developer
        scopes:
          - openid
          - profile
          - gateway.product.read
          - gateway.product.write
        planId: pln_01growth
      - id: mixed_tenant_developer_workspace_viewer
