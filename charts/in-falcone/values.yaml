        - routeId: "3001"
          name: native-keycloak-admin
          uri: /_native/keycloak/admin/*
          methods: *a2
          priority: 330
          enabledInModes:
            - enabled
            - limited
          labels:
            gateway.in-falcone.io/route-kind: passthrough
            gateway.in-falcone.io/passthrough-id: keycloak_admin
            gateway.in-falcone.io/audit-required: "true"
          plugins:
            openid-connect: *a4
            cors: *a1
            limit-count:
              count: 30
              time_window: 60
              rejected_code: 429
              key_type: var
              key: $consumer_name
              allow_degradation: false
            client-control:
              max_body_size: 524288
            request-validation: *a5
            proxy-rewrite:
              headers: *a6
              regex_uri:
                - ^/_native/keycloak/admin/(.*)
                - /auth/admin/$1
            authz-keycloak:
              discovery: https://iam.dev.in-falcone.example.com/auth/realms/in-falcone-platform/.well-known/openid-configuration
              client_id: in-falcone-gateway
              policy_enforcement_mode: ENFORCING
              permissions:
                - gateway.native.keycloak.admin
            http-logger:
              uri: http://control-plane.{{ .Release.Namespace
                }}.svc.cluster.local:8080/control-plane/internal/audit/gateway-passthrough
              include_req_body: false
              max_retry_count: 1
              buffer_duration: 1
          upstream:
