            port: 8080
apisix:
  enabled: true
  wrapper:
    componentId: apisix
    workload:
      kind: Deployment
  image:
    repository: docker.io/apache/apisix
    tag: 3.10.0
    pullPolicy: IfNotPresent
  replicas: 2
  serviceAccount:
    create: true
    name: ""
    automountToken: false
  service:
    enabled: true
    type: ClusterIP
    port: 9080
    targetPort: 9080
    portName: http
    annotations: {}
  ports:
    - name: http
      containerPort: 9080
      protocol: TCP
    - name: admin
      containerPort: 9180
      protocol: TCP
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  env:
    - name: APISIX_STAND_ALONE
      value: "true"
  envFromSecrets: []
  envFromConfigMaps:
    - in-falcone-gateway-config
  persistence:
    enabled: false
    existingClaim: ""
    size: ""
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    mountPath: /usr/local/apisix/conf
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraVolumes: []
  extraVolumeMounts: []
  config:
    inline:
      APISIX_STAND_ALONE: "true"
  initContainers: []
  volumePermissions:
    enabled: false
    image:
      repository: docker.io/library/busybox
      tag: 1.36.1
      pullPolicy: IfNotPresent
    command: []
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
keycloak:
  enabled: true
  wrapper:
    componentId: keycloak
    workload:
      kind: Deployment
  image:
    repository: quay.io/keycloak/keycloak
    tag: 26.1.0
