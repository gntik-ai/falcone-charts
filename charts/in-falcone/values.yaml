global:
  nameOverride: in-falcone
  namespace: in-falcone-dev
  environment: dev
  createNamespace: true
  imageRegistry: ""
  imagePullSecrets:
    - name: ghcr-reader
  airgap:
    enabled: false
  privateRegistry:
    enabled: false
    registry: ""
    pullSecretNames: []
    caBundleConfigMap: ""
  defaultStorageClass: ""
  podSecurity:
    runAsNonRoot: true
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault
    fsGroupChangePolicy: OnRootMismatch
  # In-transit encryption to the datastores (change harden-datastore-transport-tls / #645).
  # OFF by default — the dev/kind profile stays plaintext and chart renders are unchanged.
  # Turn on via a production overlay (deploy/kind/values-production.yaml): the `env` list below
  # is appended to every component with `transportSecurityClient: true` (control-plane, executor,
  # workflow-worker), and when `caSecretName` is set its CA bundle is mounted read-only into those
  # pods at `caMountPath`. The application honors PGSSLMODE/MONGO_TLS/KAFKA_SSL from that env.
  transportSecurity:
    enabled: false
    # Secret (release namespace) holding the CA bundle that verifies the datastore server certs.
    caSecretName: ""
    # Directory the CA secret is mounted at; point the *_CA_FILE/PGSSLROOTCERT env at a file under it.
    caMountPath: /etc/falcone/tls
    # Env appended to opted-in components (e.g. PGSSLMODE, MONGO_TLS, KAFKA_SSL, NODE_EXTRA_CA_CERTS).
    env: []
publicSurface:
  routePrefixes:
    controlPlane: /control-plane
    identity: /auth
    realtime: /realtime
    console: /
  optionalWorkspaceSubdomains:
    enabled: false
    hostTemplate: "{workspaceSlug}.apps.{environment}.in-falcone.example.com"
  hostnames:
    api: api.dev.in-falcone.example.com
    console: console.dev.in-falcone.example.com
    identity: iam.dev.in-falcone.example.com
    realtime: realtime.dev.in-falcone.example.com
  certificates:
    wildcardSecretName: in-falcone-dev-wildcard-tls
    surfaces:
      api: in-falcone-dev-api-tls
      console: in-falcone-dev-console-tls
      identity: in-falcone-dev-identity-tls
      realtime: in-falcone-dev-realtime-tls
  bindings:
    api:
      component: apisix
      serviceName: ""
      servicePort: http
      path: /control-plane
    identity:
      component: keycloak
      serviceName: ""
      servicePort: http
      path: /auth
    realtime:
      component: apisix
      serviceName: ""
      servicePort: http
      path: /realtime
    console:
      component: webConsole
      serviceName: ""
      servicePort: http
      path: /
  ingress:
    className: nginx
    annotations: {}
  route:
    annotations: {}
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  tls:
    mode: clusterManaged
  loadBalancer:
    annotations: {}
    className: ""
    ports:
      api: 443
      console: 443
      identity: 443
      realtime: 443
    sourceRanges: []
    externalTrafficPolicy: Cluster
    ipFamilyPolicy: ""
    ipFamilies: []
    allocateLoadBalancerNodePorts: true
environmentProfile:
  id: dev
  diagnostics:
    logLevel: debug
    debugEndpoints: true
    passthroughHeaders: true
  demoData:
    enabled: true
  limitsProfile: relaxed
deployment:
  topology:
    mode: single_cluster
    region: eu-west-1
    clusterRef: cluster-dev-shared
    futureScaleVector:
      - multi_cluster
      - multi_region
  valuesLayers:
    common: values.yaml
    environment: values/dev.yaml
    customer: values/customer-reference.yaml
    platform: values/platform-kubernetes.yaml
    airgap: values/airgap.yaml
    localOverride: values/local.example.yaml
  profile: standard
  recommendedProfiles:
    default: standard
    pathPattern: values/profiles/{profile}.yaml
    supported:
      - all-in-one
      - standard
      - ha
  upgrade:
    allowInPlace: true
    currentVersion: ""
    supportedPreviousVersions:
      - 0.2.0
    allowDowngrade: false
    strategy: rolling
platform:
  target: kubernetes
  network:
    exposureKind: Ingress
  securityProfile: restricted
  openshift:
    enabled: false
  routeAnnotations:
    kubernetes.io/ingress.class: nginx
  podSecurity:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
config:
  inheritanceOrder:
    - common
    - environment
    - customer
    - platform
    - airgap
    - localOverride
    - secretRefs
  configMapNames:
    gateway: in-falcone-gateway-config
    controlPlane: in-falcone-control-plane-config
    webConsole: in-falcone-web-console-config
  secretRefs:
    gatewayTls:
      existingSecret: in-falcone-dev-api-tls
      keys:
        - tls.crt
        - tls.key
    identityClient:
      existingSecret: in-falcone-identity-client
      keys:
        - client-id
        - client-secret
    postgresCredentials:
      existingSecret: in-falcone-postgresql
      keys:
        - username
        - password
        - database
    # Document-store credentials feed MONGO_USER/MONGO_PASSWORD/MONGO_DATABASE for the
    # control-plane's connection to the FerretDB gateway (which passes them through to the
    # DocumentDB engine). After the MongoDB-server -> FerretDB cutover these come from the
    # DocumentDB engine Secret (in-falcone-documentdb), not the removed in-falcone-mongodb.
    mongoCredentials:
      existingSecret: in-falcone-documentdb
      keys:
        - POSTGRES_USER
        - POSTGRES_PASSWORD
        - POSTGRES_DB
    kafkaCredentials:
      existingSecret: in-falcone-kafka
      keys:
        - username
        - password
    objectStorageCredentials:
      existingSecret: in-falcone-storage
      keys:
        - access-key
        - secret-key
bootstrap:
  serviceAccount:
    create: true
    name: ""
  job:
    image:
      repository: docker.io/bitnami/kubectl
      tag: 1.32.2
      pullPolicy: IfNotPresent
    # Raised from 1 (fix-bootstrap-job-coldstart-retry, #558): on a COLD fresh `helm install`
    # the Job ran against a not-yet-Ready Keycloak and exhausted a single retry before Keycloak
    # accepted the admin token (BackoffLimitExceeded), leaving the realm/roles/clients/superadmin
    # unprovisioned until a manual re-run. A larger retry budget lets the Job converge on its own;
    # the create-only phase is idempotent (apply-missing + reconcile), so re-runs are safe.
    backoffLimit: 6
    activeDeadlineSeconds: 900
    ttlSecondsAfterFinished: 86400
    # Keycloak-readiness gate (#558): an initContainer polls the Keycloak service until the master
    # realm answers before the bootstrap container runs, so a cold install does not race a starting
    # Keycloak. Opt out with keycloakReadiness.enabled=false (e.g. when Keycloak is external/managed).
    keycloakReadiness:
      enabled: true
      # Per-attempt curl timeout (seconds) and the sleep between polls.
      requestTimeoutSeconds: 3
      intervalSeconds: 5
      # Upper bound on the wait (seconds) before the initContainer gives up and the Job retries.
      timeoutSeconds: 600
    annotations: {}
    podAnnotations: {}
    podLabels: {}
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    nodeSelector: {}
    tolerations: []
    affinity: {}
    extraEnv: []
  lock:
    name: in-falcone-bootstrap-lock
    breakGlassExistingLock: false
  markers:
    name: in-falcone-bootstrap-state
  secretResolution:
    supportedStrategies:
      - kubernetesSecret
      - env
      - externalRef
    sources:
      keycloakAdminUsername:
        strategy: kubernetesSecret
        envVarName: BOOTSTRAP_KEYCLOAK_ADMIN_USERNAME
        existingSecret:
          name: in-falcone-keycloak-admin
          key: username
      keycloakAdminPassword:
        strategy: kubernetesSecret
        envVarName: BOOTSTRAP_KEYCLOAK_ADMIN_PASSWORD
        existingSecret:
          name: in-falcone-keycloak-admin
          key: password
      superadminPassword:
        strategy: kubernetesSecret
        envVarName: BOOTSTRAP_SUPERADMIN_PASSWORD
        existingSecret:
          name: in-falcone-superadmin
          key: password
      apisixAdminKey:
        strategy: kubernetesSecret
        envVarName: BOOTSTRAP_APISIX_ADMIN_KEY
        existingSecret:
          name: in-falcone-apisix-admin
          key: admin-key
  oneShot:
    keycloak:
      realm:
        realm: in-falcone-platform
        displayName: In Falcone Platform
        enabled: true
        attributes:
          in-falcone.realm-type: platform
          in-falcone.console-client: in-falcone-console
          in-falcone.gateway-client: in-falcone-gateway
        login:
          loginWithEmailAllowed: true
          registrationAllowed: true
          rememberMe: true
          verifyEmail: true
          resetPasswordAllowed: true
        # Keycloak brute-force detection for the platform realm (#668). Keycloak defaults
        # `bruteForceProtected` to FALSE, so a fresh realm accepts unlimited wrong-password attempts
        # (no lockout, attack-detection not even counting) — a brute-force / credential-stuffing
        # exposure for the console/superadmin login. These fields are merged into the realm-create
        # payload (so a NEW install creates the realm protected) AND PUT idempotently onto the realm
        # by the bootstrap `ensure_keycloak_brute_force` step (so an EXISTING platform realm is
        # retrofitted on upgrade — realm-create is skipped once the realm exists).
        # `bruteForceProtected` is the master switch; the thresholds below are inert while it is
        # false. failureFactor=10 is deliberately stricter than Keycloak's default 30 (still
        # typo-tolerant); permanentLockout stays false so a locked account recovers after
        # maxFailureWaitSeconds rather than needing an admin reset.
        bruteForce:
          bruteForceProtected: true
          failureFactor: 10            # consecutive failures before lockout
          maxFailureWaitSeconds: 900   # max temporary lockout window (15 min)
          waitIncrementSeconds: 60     # lockout grows by this much per failure over the factor
          minimumQuickLoginWaitSeconds: 60
          quickLoginCheckMilliSeconds: 1000
          maxDeltaTimeSeconds: 43200   # window over which failures are counted (12 h) AND after which the failure count resets
          permanentLockout: false      # temporary lockout only; account auto-recovers
      # Keycloak 26 declarative user profile. The default profile marks email/firstName/lastName
      # REQUIRED for role "user"; a user provisioned via the admin API without those (or any
      # programmatically-created platform principal) then fails Direct Access Grant (ROPC) with
      # invalid_grant "Account is not fully set up" — even with requiredActions:[] — blocking
      # onboarding of every new principal except the bootstrap superadmin (fix-auth-as-a-service-login,
      # #496). We PUT this relaxed profile to the platform realm so those attributes are optional
      # (username/email validations are retained). Proven against real KC26 in
      # tests/env/keycloak/auth-ropc-user-profile.test.mjs.
      userProfile:
        attributes:
          - name: username
            displayName: ${username}
            validations:
              length: { min: 3, max: 255 }
              username-prohibited-characters: {}
              up-username-not-idn-homograph: {}
            permissions:
              view: [admin, user]
              edit: [admin, user]
            multivalued: false
          - name: email
            displayName: ${email}
            validations:
              email: {}
              length: { max: 255 }
            permissions:
              view: [admin, user]
              edit: [admin, user]
            multivalued: false
          - name: firstName
            displayName: ${firstName}
            validations:
              length: { max: 255 }
              person-name-prohibited-characters: {}
            permissions:
              view: [admin, user]
              edit: [admin, user]
            multivalued: false
          - name: lastName
            displayName: ${lastName}
            validations:
              length: { max: 255 }
              person-name-prohibited-characters: {}
            permissions:
              view: [admin, user]
              edit: [admin, user]
            multivalued: false
          # finding A4 (live E2E campaign 2026-06-17): the tenant-context / workspace-context client
          # scopes map user.attribute tenant_id / workspace_id into the token, but with a declarative
          # user profile and unmanagedAttributePolicy off, an undeclared attribute is silently
          # dropped — so a platform user could not carry tenant scope. Declare them as MANAGED
          # attributes (admin-edit only: a user cannot self-assign tenant scope) so the values
          # persist and surface in the issued JWT, without opening up arbitrary unmanaged attributes.
          - name: tenant_id
            displayName: Tenant ID
            group: user-metadata
            validations:
              length: { max: 255 }
            permissions:
              view: [admin, user]
              edit: [admin]
            multivalued: false
          - name: workspace_id
            displayName: Workspace ID
            group: user-metadata
            validations:
              length: { max: 255 }
            permissions:
              view: [admin, user]
              edit: [admin]
            multivalued: false
        groups:
          - name: user-metadata
            displayHeader: User metadata
            displayDescription: Attributes, which refer to user metadata
      realmRoles:
        - superadmin
        - platform_admin
        - platform_operator
        - platform_auditor
        - tenant_owner
        - tenant_admin
        - tenant_developer
        - tenant_viewer
        - workspace_owner
        - workspace_admin
        - workspace_developer
        - workspace_operator
        - workspace_auditor
        - workspace_viewer
        - workspace_service_account
      clientScopes:
        - name: tenant-context
          protocol: openid-connect
          attributes:
            include.in.token.scope: "false"
            display.on.consent.screen: "false"
          protocolMappers:
            - name: tenant_id
              protocol: openid-connect
              protocolMapper: oidc-usermodel-attribute-mapper
              consentRequired: false
              config:
                user.attribute: tenant_id
                claim.name: tenant_id
                jsonType.label: String
                access.token.claim: "true"
                id.token.claim: "true"
                userinfo.token.claim: "true"
        - name: workspace-context
          protocol: openid-connect
          attributes:
            include.in.token.scope: "false"
            display.on.consent.screen: "false"
          protocolMappers:
            - name: workspace_id
              protocol: openid-connect
              protocolMapper: oidc-usermodel-attribute-mapper
              consentRequired: false
              config:
                user.attribute: workspace_id
                claim.name: workspace_id
                jsonType.label: String
                access.token.claim: "true"
                id.token.claim: "true"
                userinfo.token.claim: "true"
        - name: plan-context
          protocol: openid-connect
          attributes:
            include.in.token.scope: "false"
            display.on.consent.screen: "false"
          protocolMappers:
            - name: plan_id
              protocol: openid-connect
              protocolMapper: oidc-usermodel-attribute-mapper
              consentRequired: false
              config:
                user.attribute: plan_id
                claim.name: plan_id
                jsonType.label: String
                access.token.claim: "true"
                id.token.claim: "true"
                userinfo.token.claim: "true"
        - name: workspace-roles
          protocol: openid-connect
          attributes:
            include.in.token.scope: "false"
            display.on.consent.screen: "false"
          protocolMappers:
            - name: workspace_roles
              protocol: openid-connect
              protocolMapper: oidc-usermodel-attribute-mapper
              consentRequired: false
              config:
                user.attribute: workspace_roles
                claim.name: workspace_roles
                jsonType.label: String
                multivalued: "true"
                access.token.claim: "true"
                id.token.claim: "true"
                userinfo.token.claim: "true"
      clients:
        - clientId: in-falcone-gateway
          name: In Falcone Gateway
          protocol: openid-connect
          enabled: true
          bearerOnly: true
          publicClient: false
          serviceAccountsEnabled: false
          standardFlowEnabled: false
          directAccessGrantsEnabled: false
          defaultClientScopes:
            # Standard Keycloak default scopes (auto-created with the realm). Explicitly listing
            # ONLY the custom context scopes overrode these, so issued tokens carried no
            # realm_access.roles and every role check 403'd, incl. superadmin (finding A2). `roles`
            # injects realm_access.roles; `basic` injects sub/auth_time; `profile` the user claims.
            - roles
            - basic
            - profile
            - tenant-context
            - workspace-context
            - plan-context
            - workspace-roles
        - clientId: in-falcone-console
          name: In Falcone Console
          protocol: openid-connect
          enabled: true
          publicClient: true
          bearerOnly: false
          standardFlowEnabled: true
          directAccessGrantsEnabled: true
          serviceAccountsEnabled: false
          redirectUris:
            - https://console.dev.in-falcone.example.com/*
            - https://console.sandbox.in-falcone.example.com/*
            - https://console.staging.in-falcone.example.com/*
            - https://console.in-falcone.example.com/*
          webOrigins:
            - https://console.dev.in-falcone.example.com
            - https://console.sandbox.in-falcone.example.com
            - https://console.staging.in-falcone.example.com
            - https://console.in-falcone.example.com
          defaultClientScopes:
            # Standard Keycloak default scopes (see in-falcone-gateway above): without `roles` the
            # console's tokens carry no realm_access.roles, so superadmin authorization 403'd until
            # the scope was added manually (finding A2).
            - roles
            - basic
            - profile
            - tenant-context
            - workspace-context
            - plan-context
            - workspace-roles
      tenantRealmTemplate:
        realmIdPattern: tenant-{tenantSlug}
        displayNamePattern: Tenant {tenantDisplayName}
        strategyDefaults:
          shared: realm_per_tenant
          dedicated: realm_per_tenant
          federated: brokered_tenant_realm
        realmAttributes:
          in-falcone.realm-type: tenant
          in-falcone.control-plane.platform-realm: in-falcone-platform
        requiredRealmRoles:
          - tenant_owner
          - tenant_admin
          - tenant_developer
          - tenant_viewer
          - workspace_owner
          - workspace_admin
          - workspace_developer
          - workspace_operator
          - workspace_auditor
          - workspace_viewer
          - workspace_service_account
        requiredClientScopes:
          - tenant-context
          - workspace-context
          - plan-context
          - workspace-roles
        workspaceClientTemplate:
          clientIdPattern: "{workspaceSlug}-{applicationSlug}"
          defaultClientScopes:
            - tenant-context
            - workspace-context
            - plan-context
            - workspace-roles
          metadataAttributes:
            tenant_id: "{tenantId}"
            workspace_id: "{workspaceId}"
            workspace_slug: "{workspaceSlug}"
        serviceAccountTemplate:
          clientIdPattern: "{workspaceSlug}-svc-{serviceAccountSlug}"
          credentialRefPattern: secret://iam/{tenantId}/{workspaceId}/service-accounts/{serviceAccountId}
          defaultClientScopes:
            - tenant-context
            - workspace-context
            - plan-context
          metadataAttributes:
            tenant_id: "{tenantId}"
            workspace_id: "{workspaceId}"
            service_account_id: "{serviceAccountId}"
      superadmin:
        username: superadmin
        email: platform-admin@in-falcone.example.com
        firstName: Platform
        lastName: Admin
        # finding A1 (live E2E campaign 2026-06-17): a UserRepresentation POSTed without `enabled`
        # is created DISABLED by Keycloak, so the bootstrap superadmin could not log in
        # (login -> 401 "Account disabled") until manually enabled. Create it ready to use.
        enabled: true
        emailVerified: true
        requiredActions: []
        realmRoles:
          - superadmin
    governanceCatalog:
      plans:
        - planId: pln_01starter
          slug: starter
          displayName: Starter
          planFamily: starter
          planStatus: active
          deploymentProfileId: dpf_01sharedstarter
          quotaPolicyId: qta_01starter
          billingInterval: monthly
          capabilityKeys:
            - identity.sso.oidc
            - data.postgresql.shared
            - data.storage.bucket
            - observability.metrics.basic
        - planId: pln_01growth
          slug: growth
          displayName: Growth
          planFamily: growth
          planStatus: active
          deploymentProfileId: dpf_01sharedgrowth
          quotaPolicyId: qta_01growth
          billingInterval: monthly
          capabilityKeys:
            - identity.sso.oidc
            - data.postgresql.shared
            - data.storage.bucket
            - data.kafka.topics
            - data.openwhisk.actions
            - observability.metrics.basic
            - observability.logs.extended
        - planId: pln_01regulated
          slug: regulated
          displayName: Regulated
          planFamily: regulated
          planStatus: active
          deploymentProfileId: dpf_01regulateddedicated
          quotaPolicyId: qta_01regulated
          billingInterval: annual
          capabilityKeys:
            - identity.sso.oidc
            - data.postgresql.dedicated
            - data.storage.bucket
            - data.kafka.topics
            - observability.metrics.basic
            - observability.audit.export
        - planId: pln_01enterprise
          slug: enterprise
          displayName: Enterprise
          planFamily: enterprise
          planStatus: active
          deploymentProfileId: dpf_01enterprisefederated
          quotaPolicyId: qta_01enterprise
          billingInterval: annual
          capabilityKeys:
            - identity.sso.oidc
            - data.postgresql.dedicated
            - data.storage.bucket
            - data.kafka.topics
            - data.mongodb.database
            - data.openwhisk.actions
            - control.federated_clusters
            - observability.metrics.basic
            - observability.logs.extended
            - observability.traces.long_retention
            - observability.audit.export
      quotaPolicies:
        - quotaPolicyId: qta_01starter
          slug: starter-default
          displayName: Starter default quota policy
          quotaScope: tenant_and_workspace
          enforcementMode: hard_stop
          warningThresholdPercent: 80
          defaultLimits:
            - metricKey: tenant.workspaces.max
              scope: tenant
              unit: count
              limit: 1
            - metricKey: tenant.members.max
              scope: tenant
              unit: count
              limit: 10
            - metricKey: workspace.managed_resources.max
              scope: workspace
              unit: count
              limit: 8
            - metricKey: workspace.kafka_topics.max
              scope: workspace
              unit: count
              limit: 0
            - metricKey: workspace.monthly_function_invocations.max
              scope: workspace
              unit: count
              limit: 100000
            - metricKey: tenant.audit_retention_days.max
              scope: tenant
              unit: days
              limit: 30
            - metricKey: tenant.storage.bytes.max
              scope: tenant
              unit: bytes
              limit: 10737418240
            - metricKey: tenant.storage.buckets.max
              scope: tenant
              unit: count
              limit: 8
            - metricKey: tenant.api_requests_per_minute.max
              scope: tenant
              unit: count
              limit: 120
        - quotaPolicyId: qta_01growth
          slug: growth-default
          displayName: Growth default quota policy
          quotaScope: tenant_and_workspace
          enforcementMode: hard_stop
          warningThresholdPercent: 85
          defaultLimits:
            - metricKey: tenant.workspaces.max
              scope: tenant
              unit: count
              limit: 3
            - metricKey: tenant.members.max
              scope: tenant
              unit: count
              limit: 50
            - metricKey: workspace.managed_resources.max
              scope: workspace
              unit: count
              limit: 24
            - metricKey: workspace.kafka_topics.max
              scope: workspace
              unit: count
              limit: 20
            - metricKey: workspace.monthly_function_invocations.max
              scope: workspace
              unit: count
              limit: 1000000
            - metricKey: tenant.audit_retention_days.max
              scope: tenant
              unit: days
              limit: 90
            - metricKey: tenant.storage.bytes.max
              scope: tenant
              unit: bytes
              limit: 107374182400
            - metricKey: tenant.storage.buckets.max
              scope: tenant
              unit: count
              limit: 32
            - metricKey: tenant.api_requests_per_minute.max
              scope: tenant
              unit: count
              limit: 600
        - quotaPolicyId: qta_01regulated
          slug: regulated-default
          displayName: Regulated default quota policy
          quotaScope: tenant_and_workspace
          enforcementMode: hard_stop
          warningThresholdPercent: 90
          defaultLimits:
            - metricKey: tenant.workspaces.max
              scope: tenant
              unit: count
              limit: 5
            - metricKey: tenant.members.max
              scope: tenant
              unit: count
              limit: 100
            - metricKey: workspace.managed_resources.max
              scope: workspace
              unit: count
              limit: 40
            - metricKey: workspace.kafka_topics.max
              scope: workspace
              unit: count
              limit: 40
            - metricKey: workspace.monthly_function_invocations.max
              scope: workspace
              unit: count
              limit: 500000
            - metricKey: tenant.audit_retention_days.max
              scope: tenant
              unit: days
              limit: 365
            - metricKey: tenant.storage.bytes.max
              scope: tenant
              unit: bytes
              limit: 1099511627776
            - metricKey: tenant.storage.buckets.max
              scope: tenant
              unit: count
              limit: 256
            - metricKey: tenant.api_requests_per_minute.max
              scope: tenant
              unit: count
              limit: 1200
        - quotaPolicyId: qta_01enterprise
          slug: enterprise-default
          displayName: Enterprise default quota policy
          quotaScope: tenant_and_workspace
          enforcementMode: hard_stop
          warningThresholdPercent: 90
