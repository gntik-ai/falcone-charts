global:
  nameOverride: in-falcone
  namespace: in-falcone-dev
  environment: dev
  createNamespace: true
  imageRegistry: ""
  imagePullSecrets:
    - name: ghcr-reader
  airgap:
    enabled: false
  privateRegistry:
    enabled: false
    registry: ""
    pullSecretNames: []
    caBundleConfigMap: ""
  defaultStorageClass: ""
  podSecurity:
    runAsNonRoot: true
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault
    fsGroupChangePolicy: OnRootMismatch
publicSurface:
  routePrefixes:
    controlPlane: /control-plane
    identity: /auth
    realtime: /realtime
    console: /
  optionalWorkspaceSubdomains:
    enabled: false
    hostTemplate: "{workspaceSlug}.apps.{environment}.in-falcone.example.com"
  hostnames:
    api: api.dev.in-falcone.example.com
    console: console.dev.in-falcone.example.com
    identity: iam.dev.in-falcone.example.com
    realtime: realtime.dev.in-falcone.example.com
  certificates:
    wildcardSecretName: in-falcone-dev-wildcard-tls
    surfaces:
      api: in-falcone-dev-api-tls
      console: in-falcone-dev-console-tls
      identity: in-falcone-dev-identity-tls
      realtime: in-falcone-dev-realtime-tls
  bindings:
    api:
      component: apisix
      serviceName: ""
      servicePort: http
      path: /control-plane
    identity:
      component: keycloak
      serviceName: ""
      servicePort: http
      path: /auth
    realtime:
      component: apisix
      serviceName: ""
      servicePort: http
      path: /realtime
    console:
      component: webConsole
      serviceName: ""
      servicePort: http
      path: /
  ingress:
    className: nginx
    annotations: {}
  route:
    annotations: {}
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  tls:
    mode: clusterManaged
  loadBalancer:
    annotations: {}
    className: ""
    ports:
      api: 443
      console: 443
      identity: 443
      realtime: 443
    sourceRanges: []
    externalTrafficPolicy: Cluster
    ipFamilyPolicy: ""
    ipFamilies: []
    allocateLoadBalancerNodePorts: true
environmentProfile:
  id: dev
  diagnostics:
    logLevel: debug
    debugEndpoints: true
    passthroughHeaders: true
  demoData:
    enabled: true
  limitsProfile: relaxed
deployment:
  topology:
    mode: single_cluster
    region: eu-west-1
    clusterRef: cluster-dev-shared
    futureScaleVector:
      - multi_cluster
      - multi_region
  valuesLayers:
    common: values.yaml
    environment: values/dev.yaml
    customer: values/customer-reference.yaml
    platform: values/platform-kubernetes.yaml
    airgap: values/airgap.yaml
    localOverride: values/local.example.yaml
  profile: standard
  recommendedProfiles:
    default: standard
    pathPattern: values/profiles/{profile}.yaml
    supported:
      - all-in-one
      - standard
      - ha
  upgrade:
    allowInPlace: true
    currentVersion: ""
    supportedPreviousVersions:
      - 0.2.0
    allowDowngrade: false
    strategy: rolling
platform:
  target: kubernetes
  network:
    exposureKind: Ingress
  securityProfile: restricted
  openshift:
    enabled: false
  routeAnnotations:
    kubernetes.io/ingress.class: nginx
  podSecurity:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
config:
  inheritanceOrder:
    - common
    - environment
    - customer
    - platform
    - airgap
    - localOverride
    - secretRefs
  configMapNames:
    gateway: in-falcone-gateway-config
    controlPlane: in-falcone-control-plane-config
    webConsole: in-falcone-web-console-config
  secretRefs:
    gatewayTls:
      existingSecret: in-falcone-dev-api-tls
      keys:
        - tls.crt
        - tls.key
    identityClient:
      existingSecret: in-falcone-identity-client
      keys:
        - client-id
        - client-secret
    postgresCredentials:
      existingSecret: in-falcone-postgresql
      keys:
        - username
        - password
        - database
    mongoCredentials:
      existingSecret: in-falcone-mongodb
      keys:
        - username
        - password
        - database
    kafkaCredentials:
      existingSecret: in-falcone-kafka
      keys:
        - username
        - password
    objectStorageCredentials:
      existingSecret: in-falcone-storage
      keys:
        - access-key
        - secret-key
bootstrap:
  enabled: true
  serviceAccount:
    create: true
    name: ""
  job:
    image:
      repository: docker.io/bitnami/kubectl
      tag: 1.32.2
      pullPolicy: IfNotPresent
    backoffLimit: 1
    activeDeadlineSeconds: 900
    ttlSecondsAfterFinished: 86400
    annotations: {}
    podAnnotations: {}
    podLabels: {}
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    nodeSelector: {}
    tolerations: []
    affinity: {}
    extraEnv: []
  lock:
    name: in-falcone-bootstrap-lock
    breakGlassExistingLock: false
  markers:
    name: in-falcone-bootstrap-state
  secretResolution:
    supportedStrategies:
      - kubernetesSecret
      - env
      - externalRef
    sources:
      keycloakAdminUsername:
        strategy: kubernetesSecret
        envVarName: BOOTSTRAP_KEYCLOAK_ADMIN_USERNAME
        existingSecret:
          name: in-falcone-keycloak-admin
          key: username
      keycloakAdminPassword:
        strategy: kubernetesSecret
        envVarName: BOOTSTRAP_KEYCLOAK_ADMIN_PASSWORD
        existingSecret:
          name: in-falcone-keycloak-admin
          key: password
      superadminPassword:
        strategy: kubernetesSecret
        envVarName: BOOTSTRAP_SUPERADMIN_PASSWORD
        existingSecret:
          name: in-falcone-superadmin
          key: password
      apisixAdminKey:
        strategy: kubernetesSecret
        envVarName: BOOTSTRAP_APISIX_ADMIN_KEY
        existingSecret:
          name: in-falcone-apisix-admin
          key: admin-key
  oneShot:
    keycloak:
      realm:
        realm: in-falcone-platform
        displayName: In Falcone Platform
        enabled: true
        attributes:
          in-falcone.realm-type: platform
          in-falcone.console-client: in-falcone-console
          in-falcone.gateway-client: in-falcone-gateway
        login:
          loginWithEmailAllowed: true
          registrationAllowed: true
          rememberMe: true
          verifyEmail: true
          resetPasswordAllowed: true
      realmRoles:
        - superadmin
        - platform_admin
        - platform_operator
        - platform_auditor
        - tenant_owner
        - tenant_admin
        - tenant_developer
        - tenant_viewer
        - workspace_owner
        - workspace_admin
        - workspace_developer
        - workspace_operator
        - workspace_auditor
        - workspace_viewer
        - workspace_service_account
      clientScopes:
        - name: tenant-context
          protocol: openid-connect
          attributes:
            include.in.token.scope: "false"
            display.on.consent.screen: "false"
          protocolMappers:
            - name: tenant_id
              protocol: openid-connect
              protocolMapper: oidc-usermodel-attribute-mapper
              consentRequired: false
              config:
                user.attribute: tenant_id
                claim.name: tenant_id
                jsonType.label: String
                access.token.claim: "true"
                id.token.claim: "true"
                userinfo.token.claim: "true"
        - name: workspace-context
          protocol: openid-connect
          attributes:
            include.in.token.scope: "false"
            display.on.consent.screen: "false"
          protocolMappers:
            - name: workspace_id
              protocol: openid-connect
              protocolMapper: oidc-usermodel-attribute-mapper
              consentRequired: false
              config:
                user.attribute: workspace_id
                claim.name: workspace_id
                jsonType.label: String
                access.token.claim: "true"
                id.token.claim: "true"
                userinfo.token.claim: "true"
        - name: plan-context
          protocol: openid-connect
          attributes:
            include.in.token.scope: "false"
            display.on.consent.screen: "false"
          protocolMappers:
            - name: plan_id
              protocol: openid-connect
              protocolMapper: oidc-usermodel-attribute-mapper
              consentRequired: false
              config:
                user.attribute: plan_id
                claim.name: plan_id
                jsonType.label: String
                access.token.claim: "true"
                id.token.claim: "true"
                userinfo.token.claim: "true"
        - name: workspace-roles
          protocol: openid-connect
          attributes:
            include.in.token.scope: "false"
            display.on.consent.screen: "false"
          protocolMappers:
            - name: workspace_roles
              protocol: openid-connect
              protocolMapper: oidc-usermodel-attribute-mapper
              consentRequired: false
              config:
                user.attribute: workspace_roles
                claim.name: workspace_roles
                jsonType.label: String
                multivalued: "true"
                access.token.claim: "true"
                id.token.claim: "true"
                userinfo.token.claim: "true"
      clients:
        - clientId: in-falcone-gateway
          name: In Falcone Gateway
          protocol: openid-connect
          enabled: true
          bearerOnly: true
          publicClient: false
          serviceAccountsEnabled: false
          standardFlowEnabled: false
          directAccessGrantsEnabled: false
          defaultClientScopes:
            - tenant-context
            - workspace-context
            - plan-context
            - workspace-roles
        - clientId: in-falcone-console
          name: In Falcone Console
          protocol: openid-connect
          enabled: true
          publicClient: true
          bearerOnly: false
          standardFlowEnabled: true
          directAccessGrantsEnabled: true
          serviceAccountsEnabled: false
          redirectUris:
            - https://console.dev.in-falcone.example.com/*
            - https://console.sandbox.in-falcone.example.com/*
            - https://console.staging.in-falcone.example.com/*
            - https://console.in-falcone.example.com/*
          webOrigins:
            - https://console.dev.in-falcone.example.com
            - https://console.sandbox.in-falcone.example.com
            - https://console.staging.in-falcone.example.com
            - https://console.in-falcone.example.com
          defaultClientScopes:
            - tenant-context
            - workspace-context
            - plan-context
            - workspace-roles
      tenantRealmTemplate:
        realmIdPattern: tenant-{tenantSlug}
        displayNamePattern: Tenant {tenantDisplayName}
        strategyDefaults:
          shared: realm_per_tenant
          dedicated: realm_per_tenant
          federated: brokered_tenant_realm
        realmAttributes:
          in-falcone.realm-type: tenant
          in-falcone.control-plane.platform-realm: in-falcone-platform
        requiredRealmRoles:
          - tenant_owner
          - tenant_admin
          - tenant_developer
          - tenant_viewer
          - workspace_owner
          - workspace_admin
          - workspace_developer
          - workspace_operator
          - workspace_auditor
          - workspace_viewer
          - workspace_service_account
        requiredClientScopes:
          - tenant-context
          - workspace-context
          - plan-context
          - workspace-roles
        workspaceClientTemplate:
          clientIdPattern: "{workspaceSlug}-{applicationSlug}"
          defaultClientScopes:
            - tenant-context
            - workspace-context
            - plan-context
            - workspace-roles
          metadataAttributes:
            tenant_id: "{tenantId}"
            workspace_id: "{workspaceId}"
            workspace_slug: "{workspaceSlug}"
        serviceAccountTemplate:
          clientIdPattern: "{workspaceSlug}-svc-{serviceAccountSlug}"
          credentialRefPattern: secret://iam/{tenantId}/{workspaceId}/service-accounts/{serviceAccountId}
          defaultClientScopes:
            - tenant-context
            - workspace-context
            - plan-context
          metadataAttributes:
            tenant_id: "{tenantId}"
            workspace_id: "{workspaceId}"
            service_account_id: "{serviceAccountId}"
      superadmin:
        username: superadmin
        email: platform-admin@in-falcone.example.com
        firstName: Platform
        lastName: Admin
        realmRoles:
          - superadmin
    governanceCatalog:
      plans:
        - planId: pln_01starter
          slug: starter
          displayName: Starter
          planFamily: starter
          planStatus: active
          deploymentProfileId: dpf_01sharedstarter
          quotaPolicyId: qta_01starter
          billingInterval: monthly
          capabilityKeys:
            - identity.sso.oidc
            - data.postgresql.shared
            - data.storage.bucket
            - observability.metrics.basic
        - planId: pln_01growth
          slug: growth
          displayName: Growth
          planFamily: growth
          planStatus: active
          deploymentProfileId: dpf_01sharedgrowth
          quotaPolicyId: qta_01growth
          billingInterval: monthly
          capabilityKeys:
            - identity.sso.oidc
            - data.postgresql.shared
            - data.storage.bucket
            - data.kafka.topics
            - data.openwhisk.actions
            - observability.metrics.basic
            - observability.logs.extended
        - planId: pln_01regulated
          slug: regulated
          displayName: Regulated
          planFamily: regulated
          planStatus: active
          deploymentProfileId: dpf_01regulateddedicated
          quotaPolicyId: qta_01regulated
          billingInterval: annual
          capabilityKeys:
            - identity.sso.oidc
            - data.postgresql.dedicated
            - data.storage.bucket
            - data.kafka.topics
            - observability.metrics.basic
            - observability.audit.export
        - planId: pln_01enterprise
          slug: enterprise
          displayName: Enterprise
          planFamily: enterprise
          planStatus: active
          deploymentProfileId: dpf_01enterprisefederated
          quotaPolicyId: qta_01enterprise
          billingInterval: annual
          capabilityKeys:
            - identity.sso.oidc
            - data.postgresql.dedicated
            - data.storage.bucket
            - data.kafka.topics
            - data.mongodb.database
            - data.openwhisk.actions
            - control.federated_clusters
            - observability.metrics.basic
            - observability.logs.extended
            - observability.traces.long_retention
            - observability.audit.export
      quotaPolicies:
        - quotaPolicyId: qta_01starter
          slug: starter-default
          displayName: Starter default quota policy
          quotaScope: tenant_and_workspace
          enforcementMode: hard_stop
          warningThresholdPercent: 80
          defaultLimits:
            - metricKey: tenant.workspaces.max
              scope: tenant
              unit: count
              limit: 1
            - metricKey: tenant.members.max
              scope: tenant
              unit: count
              limit: 10
            - metricKey: workspace.managed_resources.max
              scope: workspace
              unit: count
              limit: 8
            - metricKey: workspace.kafka_topics.max
              scope: workspace
              unit: count
              limit: 0
            - metricKey: workspace.monthly_function_invocations.max
              scope: workspace
              unit: count
              limit: 100000
            - metricKey: tenant.audit_retention_days.max
              scope: tenant
              unit: days
              limit: 30
            - metricKey: tenant.storage.bytes.max
              scope: tenant
              unit: bytes
              limit: 10737418240
            - metricKey: tenant.storage.buckets.max
              scope: tenant
              unit: count
              limit: 8
        - quotaPolicyId: qta_01growth
          slug: growth-default
          displayName: Growth default quota policy
          quotaScope: tenant_and_workspace
          enforcementMode: hard_stop
          warningThresholdPercent: 85
          defaultLimits:
            - metricKey: tenant.workspaces.max
              scope: tenant
              unit: count
              limit: 3
            - metricKey: tenant.members.max
              scope: tenant
              unit: count
              limit: 50
            - metricKey: workspace.managed_resources.max
              scope: workspace
              unit: count
              limit: 24
            - metricKey: workspace.kafka_topics.max
              scope: workspace
              unit: count
              limit: 20
            - metricKey: workspace.monthly_function_invocations.max
              scope: workspace
              unit: count
              limit: 1000000
            - metricKey: tenant.audit_retention_days.max
              scope: tenant
              unit: days
              limit: 90
            - metricKey: tenant.storage.bytes.max
              scope: tenant
              unit: bytes
              limit: 107374182400
            - metricKey: tenant.storage.buckets.max
              scope: tenant
              unit: count
              limit: 32
        - quotaPolicyId: qta_01regulated
          slug: regulated-default
          displayName: Regulated default quota policy
          quotaScope: tenant_and_workspace
          enforcementMode: hard_stop
          warningThresholdPercent: 90
          defaultLimits:
            - metricKey: tenant.workspaces.max
              scope: tenant
              unit: count
              limit: 5
            - metricKey: tenant.members.max
              scope: tenant
              unit: count
              limit: 100
            - metricKey: workspace.managed_resources.max
              scope: workspace
              unit: count
              limit: 40
            - metricKey: workspace.kafka_topics.max
              scope: workspace
              unit: count
              limit: 40
            - metricKey: workspace.monthly_function_invocations.max
              scope: workspace
              unit: count
              limit: 500000
            - metricKey: tenant.audit_retention_days.max
              scope: tenant
              unit: days
              limit: 365
            - metricKey: tenant.storage.bytes.max
              scope: tenant
              unit: bytes
              limit: 1099511627776
            - metricKey: tenant.storage.buckets.max
              scope: tenant
              unit: count
              limit: 256
        - quotaPolicyId: qta_01enterprise
          slug: enterprise-default
          displayName: Enterprise default quota policy
          quotaScope: tenant_and_workspace
          enforcementMode: hard_stop
          warningThresholdPercent: 90
          defaultLimits:
            - metricKey: tenant.workspaces.max
              scope: tenant
              unit: count
              limit: 10
            - metricKey: tenant.members.max
              scope: tenant
              unit: count
              limit: 250
            - metricKey: workspace.managed_resources.max
              scope: workspace
              unit: count
              limit: 100
            - metricKey: workspace.kafka_topics.max
              scope: workspace
              unit: count
              limit: 200
            - metricKey: workspace.monthly_function_invocations.max
              scope: workspace
              unit: count
              limit: 5000000
            - metricKey: tenant.audit_retention_days.max
              scope: tenant
              unit: days
              limit: 730
            - metricKey: tenant.storage.bytes.max
              scope: tenant
              unit: bytes
              limit: 1099511627776
            - metricKey: tenant.storage.buckets.max
              scope: tenant
              unit: count
              limit: 256
      deploymentProfiles:
        - deploymentProfileId: dpf_01sharedstarter
          slug: shared-starter
          displayName: Shared starter profile
          profileClass: shared
          supportedEnvironments:
            - dev
            - sandbox
          planeBindings:
            control: shared-control-plane
            data: shared-schema
            identity: shared-keycloak-realm
            observability: shared-30d-retention
          providerCapabilityIds:
            - pvc_01keycloakoidc
            - pvc_01pgshared
            - pvc_01storagebucket
            - pvc_01metricsbasic
          identityTopology:
            platformRealm: in-falcone-platform
            tenantRealmMode: realm_per_tenant
            realmClusterModel: shared_keycloak_cluster
            workspaceClientNamespacePattern: "{workspaceSlug}-{applicationSlug}"
            serviceAccountClientPattern: "{workspaceSlug}-svc-{serviceAccountSlug}"
            consoleUsersRealm: in-falcone-platform
            endUsersRealmBoundary: tenant_realm
        - deploymentProfileId: dpf_01sharedgrowth
          slug: shared-growth
          displayName: Shared growth profile
          profileClass: shared
          supportedEnvironments:
            - dev
            - sandbox
            - staging
            - prod
          planeBindings:
            control: shared-control-plane
            data: shared-schema-plus-streams
            identity: shared-keycloak-realm
            observability: shared-90d-retention
          providerCapabilityIds:
            - pvc_01keycloakoidc
            - pvc_01pgshared
            - pvc_01storagebucket
            - pvc_01kafkatopics
            - pvc_01openwhiskactions
            - pvc_01metricsbasic
            - pvc_01logsextended
          identityTopology:
            platformRealm: in-falcone-platform
            tenantRealmMode: realm_per_tenant
            realmClusterModel: shared_keycloak_cluster
            workspaceClientNamespacePattern: "{workspaceSlug}-{applicationSlug}"
            serviceAccountClientPattern: "{workspaceSlug}-svc-{serviceAccountSlug}"
            consoleUsersRealm: in-falcone-platform
            endUsersRealmBoundary: tenant_realm
        - deploymentProfileId: dpf_01regulateddedicated
          slug: regulated-dedicated
          displayName: Regulated dedicated profile
          profileClass: dedicated
          supportedEnvironments:
            - staging
            - prod
          planeBindings:
            control: dedicated-control-plane-policy-set
            data: dedicated-database
            identity: dedicated-keycloak-realm
            observability: regulated-365d-retention
          providerCapabilityIds:
            - pvc_01keycloakoidc
            - pvc_01pgdedicated
            - pvc_01storagebucket
            - pvc_01kafkatopics
            - pvc_01metricsbasic
            - pvc_01auditexport
          identityTopology:
            platformRealm: in-falcone-platform
            tenantRealmMode: realm_per_tenant
            realmClusterModel: dedicated_keycloak_cluster
            workspaceClientNamespacePattern: "{workspaceSlug}-{applicationSlug}"
            serviceAccountClientPattern: "{workspaceSlug}-svc-{serviceAccountSlug}"
            consoleUsersRealm: in-falcone-platform
            endUsersRealmBoundary: tenant_realm
        - deploymentProfileId: dpf_01enterprisefederated
          slug: enterprise-federated
          displayName: Enterprise federated profile
          profileClass: federated
          supportedEnvironments:
            - dev
            - sandbox
            - staging
            - prod
          planeBindings:
            control: federated-control-plane
            data: dedicated-data-plane
            identity: federated-identity-plane
            observability: enterprise-730d-retention
          providerCapabilityIds:
            - pvc_01keycloakoidc
            - pvc_01pgdedicated
            - pvc_01storagebucket
            - pvc_01mongodbdatabase
            - pvc_01kafkatopics
            - pvc_01openwhiskactions
            - pvc_01metricsbasic
            - pvc_01logsextended
            - pvc_01tracesretention
            - pvc_01federatedclusters
            - pvc_01auditexport
          identityTopology:
            platformRealm: in-falcone-platform
            tenantRealmMode: brokered_tenant_realm
            realmClusterModel: federated_keycloak_cluster
            workspaceClientNamespacePattern: "{workspaceSlug}-{applicationSlug}"
            serviceAccountClientPattern: "{workspaceSlug}-svc-{serviceAccountSlug}"
            consoleUsersRealm: in-falcone-platform
            endUsersRealmBoundary: federated_external_directory
    internalNamespaces:
      openwhisk:
        - namespace: platform-system
          description: Shared control-plane automation namespace
          packages:
            - provisioning
            - observability
        - namespace: platform-audit
          description: Audit evidence and export workflows
          packages:
            - evidence
      storage:
        buckets:
          - name: platform-audit
            prefixes:
              - evidence/
              - exports/
          - name: platform-artifacts
            prefixes:
              - packages/
              - bundles/
  reconcile:
    apisix:
      adminService:
        enabled: true
        port: 9180
        targetPort: 9180
        portName: admin
        annotations: {}
      routes:
        - routeId: "1001"
          name: control-plane
          uri: /control-plane/*
          priority: 100
          upstream:
            component: controlPlane
            port: 8080
        - routeId: "1002"
          name: identity
          uri: /auth/*
          priority: 90
          upstream:
            component: keycloak
            port: 8080
        - routeId: "1003"
          name: realtime
          uri: /realtime/*
          priority: 80
          enableWebsocket: true
          upstream:
            component: controlPlane
            port: 8080
        - routeId: "1004"
          name: console
          uri: /*
          priority: 10
          upstream:
            component: webConsole
            port: 3000
        - routeId: "1010"
          name: health
          uri: /health
          methods:
            - GET
          priority: 300
          labels:
            gateway.in-falcone.io/route-kind: public
            gateway.in-falcone.io/audit-required: "false"
          plugins:
            cors: &a1
              allow_origins: https://console.dev.in-falcone.example.com
              allow_methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
              allow_headers: Authorization,Content-Type,Idempotency-Key,X-API-Version,X-Correlation-Id,X-Requested-With,X-Auth-Subject,X-Actor-Username,X-Tenant-Id,X-Workspace-Id,X-Plan-Id,X-Auth-Scopes,X-Actor-Roles
              expose_headers: X-Correlation-Id,X-RateLimit-Limit,X-RateLimit-Remaining,X-RateLimit-Reset
              allow_credential: true
              max_age: 3600
          upstream:
            component: controlPlane
            port: 8080
        - routeId: "2001"
          name: public-api-platform
          uri: /v1/platform/*
          methods: &a2
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          priority: 239
          labels:
