                Idempotency-Key: $http_idempotency_key
                X-Auth-Subject: $jwt_claim_sub
                X-Actor-Username: $jwt_claim_preferred_username
                X-Tenant-Id: $jwt_claim_tenant_id
                X-Workspace-Id: $jwt_claim_workspace_id
                X-Plan-Id: $jwt_claim_plan_id
                X-Auth-Scopes: $jwt_claim_scope
                X-Actor-Roles: $jwt_claim_realm_access_roles
          upstream:
