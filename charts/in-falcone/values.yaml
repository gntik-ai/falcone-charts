    signupPath: /signup
    pendingActivationPath: /pending-activation
    suspendedPath: /account-suspended
    credentialsExpiredPath: /credentials-expired
    passwordRecoveryPath: /password-recovery
    autoSignupPolicy:
      globalMode: approval_required
      environmentModes:
        dev: auto_activate
        sandbox: approval_required
        staging: approval_required
        prod: disabled
      planModes:
        starter: disabled
        growth: approval_required
        regulated: disabled
        enterprise: auto_activate
    statusMessages:
      pending_activation: Your account is pending activation by a platform superadmin.
      account_suspended: Your account is suspended. Contact support or a platform administrator.
      credentials_expired: Your credentials expired. Complete password recovery to continue.
    expirationPolicies:
      invitations:
        defaultTtl: 72h
        maxTtl: 168h
        allowOverride: true
      humanCredentials:
        passwordMaxAge: 90d
        gracePeriod: 7d
        recoveryTokenTtl: 2h
