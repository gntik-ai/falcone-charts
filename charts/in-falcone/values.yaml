  envFromSecrets:
    - in-falcone-kafka
  envFromConfigMaps: []
  persistence:
    enabled: true
    existingClaim: ""
    size: 50Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    mountPath: /bitnami/kafka
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    fsGroup: 1001
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraVolumes: []
  extraVolumeMounts: []
  config:
    inline:
      deliverySemantics: at-least-once
  initContainers: []
  volumePermissions:
    enabled: false
    image:
      repository: docker.io/library/busybox
      tag: 1.36.1
      pullPolicy: IfNotPresent
    command: []
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
seaweedfs:
  # Default-active object store after the MinIO -> SeaweedFS cutover (ADR-13).
  global:
    # Inherit the umbrella registry/pull-secret conventions. The OpenShift
    # overlay rewrites the image registry to Harbor + injects the pull secret.
    imageRegistry: ""
    imagePullSecrets: ""
    seaweedfs:
      # Pin the SeaweedFS image to the spike-validated 4.33 build. The sub-chart
      # appVersion is 4.33, so the default tag already matches; the digest pin
      # from the spike (chrislusf/seaweedfs@sha256:f0b3589...) is applied in the
      # OpenShift/airgap overlay where reproducibility matters.
      image:
        repository: ""
        name: chrislusf/seaweedfs
      # Replication is driven per-component via master.defaultReplication /
      # filer.defaultReplicaPlacement (see below) so the dev (000) and HA (011)
      # notations are explicit per profile. enableReplication stays false so the
      # per-component values win.
      enableReplication: false
      replicationPlacement: "000"
      # Inter-component TLS (master<->volume<->filer<->s3). Default OFF in the
      # dev/base profile because the kind test cluster has no cert-manager; the
      # TLS bootstrap (self-signed CA hook + enableSecurity) is layered on in the
      # OpenShift overlay and the values/profiles/ha.yaml hardening. See task 8.
      enableSecurity: false

  # --- master (Raft quorum for volume assignment) -------------------------
  master:
    enabled: true
    replicas: 1
    port: 9333
    grpcPort: 19333
    # SeaweedFS replication notation <cross-DC><cross-rack><same-rack>.
    # dev/base: 000 = single copy on the lone volume server. (001 means ONE extra
    # same-rack replica, which needs a 2nd volume server; on the 1-server dev
    # topology it makes every object PUT fail with a 500 InternalError.)
    # HA profile (3 volume servers) -> 011.
    defaultReplication: "000"
    # Durable master metadata on a PVC (upstream default is hostPath, which is
    # not durable across reschedules). Falls back to global.defaultStorageClass
    # when storageClass is empty.
    data:
      type: "persistentVolumeClaim"
      size: "8Gi"
      storageClass: ""
    logs:
      type: "emptyDir"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

  # --- volume servers (data shards) ---------------------------------------
  volume:
    enabled: true
    replicas: 1
    port: 8080
    grpcPort: 18080
    # dev/base: a single 100Gi PVC per volume server (matches the MinIO 100Gi
    # envelope). HA profile raises size to 1Ti and replicas to 3.
    dataDirs:
      - name: data1
        type: "persistentVolumeClaim"
        size: "100Gi"
        storageClass: ""
        maxVolumes: 0
    logs:
      type: "emptyDir"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 2Gi

  # --- filer (POSIX namespace + metadata; metadata store = PostgreSQL) -----
  filer:
    enabled: true
    replicas: 1
    port: 8888
    grpcPort: 18888
    # dev/base: 000 (single copy on the lone volume server); see master.defaultReplication.
    defaultReplicaPlacement: "000"
    # 20Gi PVC for the filer's local working data in all profiles (metadata
    # itself lives in PostgreSQL — see extraEnvironmentVars below).
    enablePVC: true
    data:
      type: "persistentVolumeClaim"
      size: "20Gi"
      storageClass: ""
    logs:
      type: "emptyDir"
    # The upstream filer StatefulSet mounts a `db-schema-config-volume` from a
    # ConfigMap; point it at the chart-managed ConfigMap that carries the working
    # postgres2 filer.toml (templates/seaweedfs-db-init-configmap.yaml).
    dbInitConfigName: in-falcone-seaweedfs-db-init
    # Init-container: wait for PostgreSQL, then create the dedicated
    # `seaweedfs_filer` database idempotently. PostgreSQL has NO
    # `CREATE DATABASE IF NOT EXISTS`, so use the SELECT-from-pg_database guard.
    # Rendered via tpl so {{ .Release.Name }} resolves to the in-cluster
    # PostgreSQL service name. Superuser creds come from the postgresql Secret.
    initContainers: |-
      - name: wait-and-create-filer-db
        # NOTE: docker.io/bitnami/postgresql:16 was removed in the bitnami -> bitnamilegacy
        # image purge (NotFound on pull). Use the same non-root (UID 1001) bitnamilegacy
        # postgres client image the umbrella already runs for postgresql, so pg_isready/psql
        # are present and `runAsNonRoot: true` is satisfied.
        image: docker.io/bitnamilegacy/postgresql:17.2.0
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop: ["ALL"]
        env:
          - name: PGHOST
            value: "{{ .Release.Name }}-postgresql"
          - name: PGPORT
            value: "5432"
          - name: PGUSER
            valueFrom:
              secretKeyRef:
                name: in-falcone-postgresql
                key: POSTGRESQL_USERNAME
                optional: true
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                name: in-falcone-postgresql
                key: POSTGRESQL_PASSWORD
          - name: PGDATABASE
            value: "postgres"
        command:
          - /bin/sh
          - -ec
          - |
            : "${PGUSER:=postgres}"
            export PGUSER
            until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER"; do
              echo "waiting for postgres at $PGHOST:$PGPORT"; sleep 2;
            done
            # PostgreSQL has no CREATE DATABASE IF NOT EXISTS — guard on pg_database.
            psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d postgres -tc \
              "SELECT 1 FROM pg_database WHERE datname='seaweedfs_filer'" \
              | grep -q 1 \
              || psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d postgres -c \
                "CREATE DATABASE seaweedfs_filer"
            echo "seaweedfs_filer database is present"
    # Filer metadata store = PostgreSQL `postgres2` backend (one table per
    # bucket — isolates each S3 bucket/tenant into its own table). The
    # add-seaweedfs-storage-adr-spike (#431) empirically proved postgres2 ships
    # NO usable createTable default at 4.33: the filer crashes at boot with
    # `init table filemeta: ERROR: syntax error at or near "%!"`. WEED_POSTGRES2_CREATETABLE
    # below supplies the working template (evidence/01 + conf/filer.toml). The
    # `%s` is substituted with each per-bucket table name at runtime. The filer
    # uses a DEDICATED database (seaweedfs_filer), NOT Falcone's app DB, so its
    # runtime DDL never collides with managed migrations (spike finding).
    extraEnvironmentVars:
      WEED_LEVELDB2_ENABLED: "false"
      WEED_MYSQL_ENABLED: "false"
      WEED_POSTGRES2_ENABLED: "true"
      WEED_POSTGRES2_HOSTNAME: "{{ .Release.Name }}-postgresql"
      WEED_POSTGRES2_PORT: "5432"
      WEED_POSTGRES2_DATABASE: "seaweedfs_filer"
      WEED_POSTGRES2_SCHEMA: "public"
      WEED_POSTGRES2_SSLMODE: "disable"
      WEED_POSTGRES2_CONNECTION_MAX_IDLE: "5"
      WEED_POSTGRES2_CONNECTION_MAX_OPEN: "30"
      WEED_POSTGRES2_CREATETABLE: |-
        CREATE TABLE IF NOT EXISTS "%s" (
          dirhash   BIGINT,
          name      VARCHAR(65535),
          directory VARCHAR(65535),
          meta      bytea,
          PRIMARY KEY (dirhash, name)
        );
    # Filer DB credentials (postgres2 username/password) injected from the
    # in-cluster PostgreSQL Secret. OQ-2 (dedicated least-privilege filer role)
    # is deferred to add-seaweedfs-tenant-identities (#433); for now reuse the
    # provisioned app credentials, which hold runtime CREATE/DROP TABLE.
    secretExtraEnvironmentVars:
      WEED_POSTGRES2_USERNAME:
        secretKeyRef:
          name: in-falcone-postgresql
          key: POSTGRESQL_USERNAME
          optional: true
      WEED_POSTGRES2_PASSWORD:
        secretKeyRef:
          name: in-falcone-postgresql
          key: POSTGRESQL_PASSWORD
    # The filer does NOT run the S3 gateway; a dedicated `s3` Deployment does.
    s3:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

  # --- S3 gateway (S3-protocol front door, port 8333) ---------------------
  s3:
    enabled: true
    replicas: 1
    port: 8333
    # ClusterIP only — never NodePort/LoadBalancer. Ingress/Route stay disabled
    # (upstream defaults) so the gateway is internal-only (no tenant-facing path).
    service:
      type: ClusterIP
    # FILER-BASED dynamic IAM (#553). Auth is enforced, but the gateway loads its
    # identities from the FILER (not a static `-config` file) so per-workspace
    # identities can be onboarded at runtime via `weed shell s3.configure -apply` and
    # take effect WITHOUT a gateway restart (verified live 2026-06-18). A static
    # `-config` file (the old `enableAuth: true` path) is loaded once at start and
    # IGNORES filer-stored identities — incompatible with per-tenant onboarding.
    #   - `enableAuth: false` drops `-config` so the gateway reads IAM from the filer.
    #   - `-iam.readOnly=false` permits dynamic identity writes.
    # The backend admin identity (`falcone-s3-admin`, the STORAGE_S3_* credential) is
    # seeded into the filer by templates/seaweedfs-admin-seed-hook.yaml so the gateway
    # still authenticates it (and so the filer is never empty -> never anonymous).
    enableAuth: false
    extraArgs:
      - "-iam.readOnly=false"
    # Retained but UNUSED while enableAuth is false (filer-mode ignores it); kept so a
    # rollback to static-config mode is just the enableAuth flip.
    existingConfigSecret: in-falcone-seaweedfs-s3-config
    # Reserved platform/system bucket. Tenant buckets are fronted by per-workspace
    # SCOPED identities (seaweedfs-s3-identities-config.mjs + the runtime issuer); the
    # admin/service identity stays broad (it backs the storage REST API) but is NO
    # LONGER the only credential — tenants get scoped keys. (#553)
    createBuckets:
      - name: falcone-platform-system
    # No bucket-subdomain routing (path-style only); leave domainName empty.
    domainName: ""
    # Iceberg REST catalog (port 8181) is a new surface Falcone does not use —
    # leave it disabled/unexposed (spike note).
    icebergPort: null
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # --- components Falcone does not deploy ---------------------------------
  sftp:
    enabled: false
  admin:
    enabled: false
  worker:
    enabled: false
  cosi:
    enabled: false
  allInOne:
    enabled: false

  # --- internal-only networking (add-seaweedfs-deployment, D9) ------------
  # Rendered by templates/seaweedfs-networkpolicy.yaml only when
  # seaweedfs.enabled AND seaweedfs.networkPolicy.enabled. Allows app -> S3:8333
  # from the listed Falcone app component labels, permits intra-SeaweedFS traffic
  # on master/volume/filer ports, and denies all other ingress to SeaweedFS pods.
  # NOTE: NetworkPolicy is honored only under a policy-enforcing CNI
  # (Calico/Cilium/OVN-Kubernetes). kind's default kindnet does NOT enforce it,
  # so the manifest renders but has no effect on kind.
  networkPolicy:
    enabled: true
    # Falcone app pods (by app.kubernetes.io/name = componentId) allowed to reach
    # the S3 gateway on 8333.
    # These must match the rendered `app.kubernetes.io/name` pod labels, which the
    # component-wrapper sets to the KEBAB-case componentId (e.g. `control-plane`),
    # NOT the camelCase values key. Mismatched (camelCase) entries silently drop all
    # app -> SeaweedFS:8333 traffic, since kindnet enforces this NetworkPolicy.
    allowedAppComponents:
      - control-plane
      - control-plane-executor
      - workflow-worker
    # PostgreSQL component name (filer egress target for the metadata store).
    postgresComponent: postgresql

# ---------------------------------------------------------------------------
# SeaweedFS inter-component TLS bootstrap (add-seaweedfs-deployment, task 8 / OQ-3).
#
# The upstream sub-chart can run with mutual TLS between master/volume/filer/s3
# (seaweedfs.global.seaweedfs.enableSecurity=true). It normally provisions the
# certs with cert-manager (Issuer/Certificate CRDs). cert-manager availability is
# a DEPLOY-TIME concern that cannot be probed from `helm template`, so the SAFE
# DEFAULT shipped here is a Helm pre-install hook Job that generates a self-signed
# CA + leaf certs into the Secrets the sub-chart expects
# (<release>-seaweedfs-{ca,master,volume,filer,client}-cert) using openssl, and we
# set certificates.externalCertificates.enabled=true so the sub-chart consumes
# them instead of cert-manager. Toggle `tlsBootstrap.enabled` off where
# cert-manager is present and let the sub-chart's Issuer path run instead.
#
# Default OFF in the base/dev profile (kind has neither cert-manager nor a need
# for inter-pod TLS in a single-node dev cluster); enable it (and enableSecurity)
# in hardened profiles / the OpenShift overlay.
# ---------------------------------------------------------------------------
seaweedfsTls:
  bootstrap:
    enabled: false
    # Image used by the pre-install hook to run openssl + kubectl.
    image:
      repository: docker.io/bitnami/kubectl
      tag: "1.32.2"
      pullPolicy: IfNotPresent
    # CA subject common name and cert validity (days).
    commonName: "Falcone SeaweedFS CA"
    days: 3650

# ---------------------------------------------------------------------------
# SeaweedFS S3 credential Secret (add-seaweedfs-deployment, D7).
#
# A chart-created Secret `in-falcone-seaweedfs-s3-creds` (keys `s3AccessKey` /
# `s3SecretKey`) is generated on first install (randAlphaNum) and is the SINGLE
# source of truth for the S3 gateway credentials — see
# templates/seaweedfs-s3-creds.yaml. A lookup-based regeneration guard keeps the
# values STABLE across re-installs/upgrades (no rotation). The same values are
# rendered into the SeaweedFS identities JSON Secret
# (`in-falcone-seaweedfs-s3-config`, key `seaweedfs_s3_config`) consumed by the
# gateway (seaweedfs.s3.existingConfigSecret above).
#
# CONSUMER WIRING (#434): the live runtime reads provider-neutral
# STORAGE_S3_ENDPOINT / STORAGE_S3_ACCESS_KEY / STORAGE_S3_SECRET_KEY — see
# deploy/kind/values-kind.yaml + values-openshift.yaml (both point at SeaweedFS).
# To point consumers at SeaweedFS, wire:
#   STORAGE_S3_ENDPOINT   -> http://<release>-seaweedfs-s3:8333  (path-style)
#   STORAGE_S3_ACCESS_KEY -> secret in-falcone-seaweedfs-s3-creds key s3AccessKey
#   STORAGE_S3_SECRET_KEY -> secret in-falcone-seaweedfs-s3-creds key s3SecretKey
# (left to the cutover step / data-migration change; #434's values are untouched.)
# ---------------------------------------------------------------------------
seaweedfsS3Creds:
  # Secret holding the human-facing credential keys (s3AccessKey/s3SecretKey)
  # plus the adminAccessKey/adminSecretKey the runtime IAM client signs per-tenant
  # identity writes with (#553).
  secretName: in-falcone-seaweedfs-s3-creds
  # Secret holding the SeaweedFS identities JSON (key: seaweedfs_s3_config) that
  # the gateway loads via -s3.config; derived from the same generated values.
  configSecretName: in-falcone-seaweedfs-s3-config
  # Identity name advertised inside the SeaweedFS identities JSON.
  identityName: falcone-s3-admin
  # TENANT ISOLATION (#553). The bootstrap admin identity is scoped to per-bucket
  # action strings under THIS reserved prefix only (`Action:<prefix>system`) — it
  # is NOT a cross-tenant skeleton key over `t-…` tenant buckets. Tenant buckets
  # are namespaced `t-<tenantHash>-<workspaceHash>` (deriveWorkspaceBucketName).
  # Keep in sync with PLATFORM_RESERVED_BUCKET_PREFIX in
  # services/adapters/src/seaweedfs-s3-identities-config.mjs.
  platformBucketPrefix: falcone-platform-
  # Admin endpoint the runtime IAM client (seaweedfs-iam-client.mjs) calls to
  # onboard/rotate/revoke per-workspace identities live. Wire SEAWEEDFS_S3_ADMIN_
  # ENDPOINT to this and SEAWEEDFS_ADMIN_ACCESS_KEY/SEAWEEDFS_ADMIN_SECRET_KEY to
  # the adminAccessKey/adminSecretKey keys of `secretName` for the provisioning
  # workloads that issue tenant identities.
  adminEndpoint: http://in-falcone-seaweedfs-s3:8333

gatewaySharedSecret:
  # Chart-managed shared secret bridging the APISIX gateway and the control-plane executor
  # (fix-apisix-gateway-shared-secret-provisioning, D3). APISIX signs forwarded requests with
  # `x-gateway-auth: ${{GATEWAY_SHARED_SECRET}}` and reads the value from its process env; the
  # executor trusts gateway-injected identity headers only when x-gateway-auth matches its own
  # GATEWAY_SHARED_SECRET. Without it APISIX CrashLoops on config load. Wired into apisix.env and
  # controlPlaneExecutor.env via secretKeyRef on the fixed name below.
  # Set create=false and pre-create a Secret named `secretName` to supply your own value.
  create: true
  secretName: in-falcone-gateway-shared-secret
  secretKey: secret

grafana:
  # Grafana for Falcone dashboards (#499). Provisioned with a Prometheus datasource (the
  # observability service) + the Falcone dashboards in templates/grafana.yaml.
  image:
    repository: docker.io/grafana/grafana
    tag: 11.4.0
    pullPolicy: IfNotPresent
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

observability:
  wrapper:
    componentId: observability
    workload:
      kind: Deployment
  image:
    repository: docker.io/prom/prometheus
    tag: 3.2.1
    pullPolicy: IfNotPresent
  replicas: 1
  # Run Prometheus against the real scrape config mounted below (#499) — without an explicit
  # --config.file it falls back to the default config and scrapes only itself.
  args:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --storage.tsdb.retention.time=15d
    - --web.enable-lifecycle
  serviceAccount:
    create: true
    name: ""
    # Hardened default: NO SA token mounted. The widened Prometheus scrape (add-deploy-completeness-
    # cluster, #562) uses Kubernetes pod service-discovery, which needs an authenticated API token
    # + the namespaced pod-list Role (observability-prometheus-rbac.yaml). Deploy overlays that want
    # pod-discovery (e.g. deploy/kind/values-kind.yaml) opt in by setting automountToken: true; the
    # base chart stays token-less so the security-hardening default is preserved.
    automountToken: false
  service:
    enabled: true
    type: ClusterIP
    port: 9090
    targetPort: 9090
    portName: http
    annotations: {}
  ports:
    - name: http
      containerPort: 9090
      protocol: TCP
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  env:
    - name: PROMETHEUS_RETENTION_TIME
      value: 15d
  envFromSecrets: []
  envFromConfigMaps: []
  persistence:
    enabled: true
    existingClaim: ""
    size: 20Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    mountPath: /prometheus
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    fsGroup: 1001
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Mount the real prometheus.yml (templates/observability-prometheus-config.yaml) at
  # /etc/prometheus so --config.file (above) finds it; without this Prometheus scrapes only itself
  # (#499). ConfigMap name = <release>-prometheus-config (e.g. falcone-prometheus-config).
  extraVolumes:
    - name: prometheus-config
      configMap:
        name: falcone-prometheus-config
  extraVolumeMounts:
    - name: prometheus-config
      mountPath: /etc/prometheus
      readOnly: true
  config:
    inline:
      scrapeModel: platform-wide
      metricsStack:
        version: 2026-03-28
        model: hybrid
        retention:
          hotRetention: 15d
          downsampleAfter: 90d
          coldRetention: 395d
          defaultResolution: 30s
          downsampledResolutions:
            - 5m
            - 1h
        requiredLabels:
          - environment
          - subsystem
          - metricScope
          - collectionMode
        tenantIsolation:
          metricScopeLabel: metric_scope
          tenantLabel: tenant_id
          workspaceLabel: workspace_id
          platformValue: platform
          tenantValue: tenant
          workspaceValue: workspace
        collectionHealth:
          metricName: in_falcone_observability_collection_health
          failureCounter: in_falcone_observability_collection_failures_total
          lagMetric: in_falcone_observability_collection_lag_seconds
        componentTargets:
          apisix:
            collectionMode: scrape
            component: apisix
            portName: http
            metricsPath: /apisix/prometheus/metrics
            interval: 30s
            maxStaleness: 120s
          kafka:
            collectionMode: scrape
            component: kafka
            portName: metrics
            metricsPath: /metrics
            interval: 30s
            maxStaleness: 120s
          postgresql:
            collectionMode: scrape
            component: postgresql
            portName: metrics
            metricsPath: /metrics
            interval: 30s
            maxStaleness: 120s
          # Capability subsystems repointed to the current backends after the
          # OpenWhisk->Knative / MinIO->SeaweedFS / MongoDB-server->FerretDB cutover.
          # TODO: the scrape metricsPath/metric names below are placeholders — verify
          # against the new backends (DocumentDB = Postgres exporter; FerretDB = /debug/metrics;
          # SeaweedFS = per-component ServiceMonitors; functions = Knative via control-plane).
          mongodb:
            collectionMode: scrape
            component: documentdb
            portName: metrics
            metricsPath: /metrics
            interval: 30s
            maxStaleness: 120s
          openwhisk:
            collectionMode: scrape
            component: controlPlane
            portName: metrics
            metricsPath: /metrics
            interval: 30s
            maxStaleness: 120s
          storage:
            collectionMode: hybrid
            component: seaweedfs
            portName: metrics
            metricsPath: /metrics
            interval: 60s
            maxStaleness: 180s
          controlPlane:
            collectionMode: scrape
            component: controlPlane
            portName: http
            metricsPath: /metrics
            interval: 15s
            maxStaleness: 60s
  initContainers: []
  volumePermissions:
    enabled: false
    image:
      repository: docker.io/library/busybox
      tag: 1.36.1
      pullPolicy: IfNotPresent
    command: []
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
controlPlane:
  wrapper:
    componentId: control-plane
    workload:
      kind: Deployment
  image:
    repository: ghcr.io/gntik-ai/in-falcone-control-plane
    tag: 0.6.2
    pullPolicy: IfNotPresent
  replicas: 2
  serviceAccount:
    create: true
    name: ""
    # Core runtime needs its ServiceAccount token for OpenBao Kubernetes auth and
    # chart-owned function/MCP management paths.
    automountToken: true
  # Function executor (Knative): RBAC + the per-function runtime image. The data-plane
  # connection env (PG/KEYCLOAK/STORAGE_S3/MONGO/KAFKA host+secret refs) is environment-
  # specific (release-prefixed service DNS + external secrets) and lives in the overlay
  # values (deploy/kind/values-kind.yaml, deploy/openshift/values-openshift.yaml).
  # The per-function runtime image is read by the executor from the FN_RUNTIME_IMAGE
  # env var (set in the overlay: kind -> localhost:30500, OpenShift -> Harbor).
  functionExecutor: {}
  service:
    enabled: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
    portName: http
    annotations: {}
  ports:
    - name: http
      containerPort: 8080
      protocol: TCP
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  env:
    - name: NODE_ENV
      value: production
    - name: DEPLOYMENT_PROFILE
      value: dev
    - name: TEMPORAL_ADDRESS
      value: "{{ .Release.Name }}-temporal-frontend:7233"
    - name: TEMPORAL_NAMESPACE
      value: falcone-flows
    - name: MCP_ENABLED
      value: "true"
    - name: MCP_RUNTIME_IMAGE
      value: ghcr.io/gntik-ai/in-falcone-mcp-runtime
    - name: MCP_RUNTIME_IMAGE_DIGEST
      value: sha256:6f2d5b0f7dfb5a6b8a9ef0f8f613f2a511de80c92eaedc6f2fd3ed871b3f5f42
    - name: BAO_ADDR
      value: https://openbao.secret-store.svc.cluster.local:8200
    - name: BAO_KV_MOUNT
      value: secret
    - name: BAO_KUBERNETES_AUTH_ROLE
      value: workspace-secrets-role
    - name: NODE_EXTRA_CA_CERTS
      value: /openbao/tls/ca.crt
  envFromSecrets: []
  envFromConfigMaps:
    - in-falcone-control-plane-config
  persistence:
    enabled: false
    existingClaim: ""
    size: ""
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    mountPath: /srv/control-plane
    annotations: {}
  # Prometheus pod-discovery hint (add-deploy-completeness-cluster, #562): the control-plane
  # exposes falcone_* HTTP metrics at /metrics, so annotate it for the namespace-scoped
  # kubernetes_sd pod-discovery scrape job (observability-prometheus-config.yaml). This widens
  # metrics coverage beyond the 3 hardcoded static targets to any annotated component.
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: /metrics
  podLabels: {}
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraVolumes:
    - name: openbao-ca
      secret:
        secretName: in-falcone-openbao-client-ca
  extraVolumeMounts:
    - name: openbao-ca
      mountPath: /openbao/tls
      readOnly: true
  config:
    inline:
      openapiPath: /control-plane/openapi
  initContainers: []
  volumePermissions:
    enabled: false
    image:
      repository: docker.io/library/busybox
      tag: 1.36.1
      pullPolicy: IfNotPresent
    command: []
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

# Control-plane EXECUTOR: the runnable data control-plane (apps/control-plane) that
# EXECUTES the adapter plans against the workspace backends (Postgres/Mongo/Kafka +
# Functions). Helm owns it as part of the core baseline. Data-plane APISIX routes
# (upstream.dataPlane:true — /v1/postgres|mongo|events|functions/*) and executor-required
# routes are always sent here (see templates/bootstrap-payload-configmap.yaml). The executor
# serves the data-plane + DDL slice and TRANSPARENTLY PROXIES every other path under those
# prefixes (browse/inventory/management routes) to the control-plane via CONTROL_PLANE_UPSTREAM.
controlPlaneExecutor:
  wrapper:
    componentId: control-plane-executor
    workload:
      kind: Deployment
  image:
    repository: ghcr.io/gntik-ai/in-falcone-control-plane-executor
    tag: 0.9.0
    pullPolicy: IfNotPresent
  replicas: 2
  serviceAccount:
    create: true
    name: ""
    automountToken: true
  service:
    enabled: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
    portName: http
    annotations: {}
  ports:
    - name: http
      containerPort: 8080
  # Prometheus pod-discovery hint (add-deploy-completeness-cluster, #562): the cp-executor
  # exposes its HTTP metrics at /metrics (runtime/server.mjs), so annotate it for the
  # namespace-scoped kubernetes_sd pod-discovery scrape job (it is scraped even when applied
  # out-of-band of the chart, as long as it runs in the release namespace with this annotation).
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: /metrics
  # Core data-plane wiring. The component-wrapper tpl-renders env values so release-prefixed
  # service DNS names resolve for any Helm release name.
  env:
    - name: CONTROL_PLANE_UPSTREAM
      value: "http://{{ .Release.Name }}-control-plane:8080"
    - name: PGHOST
      value: "{{ .Release.Name }}-postgresql"
    - name: PGUSER
      valueFrom:
        secretKeyRef:
          name: in-falcone-postgresql
          key: POSTGRESQL_USERNAME
    - name: PGDATABASE
      value: in_falcone
    - name: PGPASSWORD
      valueFrom:
        secretKeyRef:
          name: in-falcone-postgresql
          key: POSTGRESQL_PASSWORD
    - name: MONGO_HOST
      value: "{{ .Release.Name }}-ferretdb:27017"
    - name: MONGO_USER
      valueFrom:
        secretKeyRef:
          name: in-falcone-documentdb
          key: POSTGRES_USER
    - name: MONGO_PASSWORD
      valueFrom:
        secretKeyRef:
          name: in-falcone-documentdb
          key: POSTGRES_PASSWORD
    - name: MONGO_DATABASE
      valueFrom:
        secretKeyRef:
          name: in-falcone-documentdb
          key: POSTGRES_DB
    - name: KAFKA_BROKERS
      value: "{{ .Release.Name }}-kafka:9092"
    - name: TEMPORAL_ADDRESS
      value: "{{ .Release.Name }}-temporal-frontend:7233"
    - name: TEMPORAL_NAMESPACE
      value: falcone-flows
    - name: TEMPORAL_TASK_QUEUE
      value: flows-main
    - name: MCP_ENABLED
      value: "true"
    - name: MCP_RUNTIME_IMAGE
      value: ghcr.io/gntik-ai/in-falcone-mcp-runtime
    - name: MCP_RUNTIME_IMAGE_DIGEST
      value: sha256:6f2d5b0f7dfb5a6b8a9ef0f8f613f2a511de80c92eaedc6f2fd3ed871b3f5f42
    - name: BAO_ADDR
      value: https://openbao.secret-store.svc.cluster.local:8200
    - name: BAO_KV_MOUNT
      value: secret
    - name: BAO_KUBERNETES_AUTH_ROLE
      value: workspace-secrets-role
    - name: NODE_EXTRA_CA_CERTS
      value: /openbao/tls/ca.crt
    - name: GATEWAY_SHARED_SECRET
      valueFrom:
        secretKeyRef:
          name: in-falcone-gateway-shared-secret
          key: secret
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  envFromSecrets: []
  envFromConfigMaps: []
  persistence:
    enabled: false
    existingClaim: ""
    size: ""
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    mountPath: /srv/control-plane-executor
    annotations: {}
  podLabels:
    app.kubernetes.io/component: control-plane-executor
  podSecurityContext: {}
  extraVolumes:
    - name: openbao-ca
      secret:
        secretName: in-falcone-openbao-client-ca
  extraVolumeMounts:
    - name: openbao-ca
      mountPath: /openbao/tls
      readOnly: true
  nodeSelector: {}
  tolerations: []
  affinity: {}
  config:
    inline: {}
  initContainers: []
  volumePermissions:
    enabled: false
    image:
      repository: docker.io/library/busybox
      tag: 1.36.1
      pullPolicy: IfNotPresent
    command: []
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
  readinessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 3
    periodSeconds: 5
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL

webConsole:
