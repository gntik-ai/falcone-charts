        # ---- Realtime change stream (SSE) → executor (OPT-IN). Read-only; a browser
        #      EventSource cannot set headers, so the anon key arrives as ?apikey= and the
        #      executor verifies it. Long upstream timeout (upstream.sse) keeps the stream open. ----
        - routeId: "2016-rt"
          name: public-api-realtime-changes
          uri: /v1/realtime/*
          methods: ["GET", "OPTIONS"]
          priority: 340
