kafka:
  replicas: 3
  persistence:
    size: 250Gi
# SeaweedFS HA overrides (add-seaweedfs-deployment, D2/D3). master -> 3-node Raft
# quorum, volume -> 3 servers at 1Ti each, S3 -> 2 replicas, replication 011 (one
# cross-rack copy). filer stays at 1 replica (stateless w.r.t. object data;
# metadata in PostgreSQL) with its 20Gi PVC unchanged. Applies only when
# Applied to the core SeaweedFS baseline.
seaweedfs:
  master:
    replicas: 3
    # 011 = 1 copy + 1 cross-rack copy (tolerates a volume-server failure).
    defaultReplication: "011"
  volume:
    replicas: 3
    dataDirs:
      - name: data1
        type: "persistentVolumeClaim"
        size: "1Ti"
        storageClass: ""
        maxVolumes: 0
  filer:
    # Stateless filer; HA scale of the filer process is deferred. PVC unchanged.
    replicas: 1
    defaultReplicaPlacement: "011"
  s3:
    replicas: 2
# DocumentDB engine HA (add-ferretdb-documentdb-engine). Applies to the core
# DocumentDB baseline. 2 replicas spread across nodes
# (preferred anti-affinity, like every other component here — `required` would leave
# the second replica Pending on a single-node cluster). 200Gi PVC sizes the
# document store. Primary selection (Patroni / streaming replication) is
# a follow-up change; this only delivers the StatefulSet + PVC HA foundation.
documentdb:
  replicas: 2
  persistence:
    size: 200Gi
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - documentdb
            topologyKey: kubernetes.io/hostname
