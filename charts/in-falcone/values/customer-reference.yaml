global:
  namespace: in-falcone-acme

publicSurface:
  hostnames:
    api: api.acme.dev.in-falcone.example.com
    console: console.acme.dev.in-falcone.example.com
    identity: iam.acme.dev.in-falcone.example.com
    realtime: realtime.acme.dev.in-falcone.example.com

config:
  secretRefs:
    gatewayTls:
      existingSecret: acme-dev-api-tls
      keys:
        - tls.crt
        - tls.key

controlPlane:
  resources:
    requests:
      cpu: 300m
      memory: 384Mi

webConsole:
  resources:
    requests:
      cpu: 150m
      memory: 192Mi

storage:
  persistence:
    size: 200Gi
