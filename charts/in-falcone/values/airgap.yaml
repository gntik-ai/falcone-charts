global:
  airgap:
    enabled: true
  privateRegistry:
    enabled: true
    registry: registry.airgap.in-falcone.local
    pullSecretNames:
      - in-falcone-registry
    caBundleConfigMap: in-falcone-registry-ca
  imagePullSecrets:
    - name: in-falcone-registry
  imageRegistry: registry.airgap.in-falcone.local
apisix:
  image:
    repository: registry.airgap.in-falcone.local/apache/apisix
keycloak:
  image:
    repository: registry.airgap.in-falcone.local/keycloak/keycloak
  # DB-init initContainer (fix-keycloak-persistent-store) needs a psql client image;
  # mirror it alongside the postgresql image below.
  database:
    initImage:
      repository: registry.airgap.in-falcone.local/bitnami/postgresql
postgresql:
  image:
    repository: registry.airgap.in-falcone.local/bitnami/postgresql
documentdb:
  image:
    repository: registry.airgap.in-falcone.local/ferretdb/postgres-documentdb
ferretdb:
  image:
    repository: registry.airgap.in-falcone.local/ferretdb/ferretdb
kafka:
  image:
    repository: registry.airgap.in-falcone.local/bitnami/kafka
seaweedfs:
  image:
    repository: registry.airgap.in-falcone.local/chrislusf/seaweedfs
observability:
  image:
    repository: registry.airgap.in-falcone.local/prometheus/prometheus
controlPlane:
  image:
    repository: registry.airgap.in-falcone.local/example/in-falcone-control-plane
webConsole:
  image:
    repository: registry.airgap.in-falcone.local/example/in-falcone-web-console
