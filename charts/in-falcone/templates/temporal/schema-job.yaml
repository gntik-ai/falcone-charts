{{- $root := . -}}
{{- $t := .Values.temporal -}}
{{- $p := $t.persistence -}}
{{- /*
  Schema setup/upgrade Job. On fresh install this is a normal Job because PostgreSQL is created by
  the same release; its connectivity loop waits until the DB bootstrap creates the role/databases.
  On upgrades, where PostgreSQL already exists, it runs before workload rollout.
*/ -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "in-falcone.temporal.fullname" $root }}-schema
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "in-falcone.temporal.roleLabels" (dict "root" $root "role" "schema") | nindent 4 }}
  {{- if .Release.IsUpgrade }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  {{- end }}
spec:
  backoffLimit: {{ $t.jobs.backoffLimit }}
  activeDeadlineSeconds: {{ $t.jobs.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ $t.jobs.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "in-falcone.temporal.roleLabels" (dict "root" $root "role" "schema") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      enableServiceLinks: false
      automountServiceAccountToken: false
      {{- include "in-falcone.temporal.imagePullSecrets" $root | nindent 6 }}
      {{- with $t.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: temporal-sql-tool
          image: {{ include "in-falcone.temporal.image" (dict "root" $root "image" $t.schemaTool.image) | quote }}
          imagePullPolicy: {{ $t.schemaTool.image.pullPolicy | default "IfNotPresent" }}
          command:
            - /bin/sh
            - -ec
            - |
              # NOTE: the admin-tools image is alpine-based and ships /bin/sh ONLY (no
              # bash). Keep this script POSIX-sh compatible (no arrays, no PIPESTATUS).
              SQL="temporal-sql-tool --ep ${SQL_HOST} --port ${SQL_PORT} --user ${SQL_USER} --password ${SQL_PASSWORD} --plugin ${SQL_PLUGIN}"
              schema_lifecycle="{{ ternary "upgrade" "install" .Release.IsUpgrade }}"

              # Wait for PostgreSQL to accept connections before touching schemas.
              # temporal-sql-tool has no `ping`; `create-database` against the default
              # `postgres` DB doubles as a connectivity probe (idempotent + exit 0 when
              # PG is reachable, whether or not the database already exists).
              i=0
              while [ "$i" -lt 60 ]; do
                if ${SQL} --database postgres create-database >/dev/null 2>&1; then
                  echo "postgres ${SQL_HOST}:${SQL_PORT} reachable"; break
                fi
                i=$((i + 1))
                echo "waiting for postgres ${SQL_HOST}:${SQL_PORT} (${i}/60)"; sleep 5
              done

              update_temporal_schema() {
                db="$1"
                dir="$2"
                {{- if .Release.IsUpgrade }}
                # Initial schema creation is not an upgrade operation: once
                # schema_version exists, rerunning it can fail or mask a bad
                # lifecycle. The pre-upgrade DB bootstrap hook has already ensured
                # the role/databases exist.
                echo "upgrading existing Temporal schema in ${db}"
                {{- else }}
                # Fresh installs start from empty dedicated databases. The DB bootstrap
                # Job creates them first; create-database is retained here as an
                # idempotent race guard while both normal install Jobs converge.
                ${SQL} --database "${db}" create-database
                ${SQL} --database "${db}" setup-schema -v 0.0
                {{- end }}
                ${SQL} --database "${db}" update-schema -d "${dir}"
              }

              # Primary persistence database + schema.
              update_temporal_schema "${SQL_DATABASE}" /etc/temporal/schema/postgresql/v12/temporal/versioned

              # SQL visibility database + schema (no Elasticsearch).
              update_temporal_schema "${SQL_VISIBILITY_DATABASE}" /etc/temporal/schema/postgresql/v12/visibility/versioned
          env:
            - name: SQL_PLUGIN
              value: {{ $p.driver | quote }}
            - name: SQL_HOST
              value: {{ tpl $p.host $root | quote }}
            - name: SQL_PORT
              value: {{ $p.port | quote }}
            - name: SQL_USER
              value: {{ $p.user | quote }}
            - name: SQL_PASSWORD
              {{- if $p.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ $p.existingSecret | quote }}
                  key: {{ $p.passwordSecretKey | quote }}
              {{- else }}
              value: {{ $p.password | quote }}
              {{- end }}
            - name: SQL_DATABASE
              value: {{ $p.database | quote }}
            - name: SQL_VISIBILITY_DATABASE
              value: {{ $p.visibilityDatabase | quote }}
          {{- with $t.jobs.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $t.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
