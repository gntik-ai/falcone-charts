{{- /*
  RBAC for MCP server hosting (ADR-12: reuse Knative — each MCP server = a ksvc).
  Grants the executor ServiceAccount the namespace-scoped permissions to manage
  per-tenant MCP-server Knative Services plus the internal-only NetworkPolicies and
  scoped RBAC those servers need. Namespace-scoped (not cluster-wide / not privileged).
  Bound to the executor ServiceAccount because the executor serves /v1/mcp.
*/ -}}
{{- $saName := default (printf "%s-control-plane-executor" .Release.Name) .Values.controlPlaneExecutor.serviceAccount.name -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-mcp-runtime
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "in-falcone.labels" . | nindent 4 }}
rules:
  # MCP server = a Knative Service per tenant project (deploy = create/patch ksvc).
  - apiGroups: ["serving.knative.dev"]
    resources: ["services"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  # Per-tenant internal-only networking for hosted MCP servers.
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  # Per-tenant scoped RBAC for MCP-server workloads (least-privilege per server).
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  # Read pod status/logs for MCP-server observability (feeds #398).
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-mcp-runtime
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "in-falcone.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-mcp-runtime
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
    namespace: {{ .Release.Namespace }}
