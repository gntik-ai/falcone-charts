{{- /*
  Real Prometheus scrape config (add-falcone-metrics-scrape-and-dashboards, #499). The
  observability component previously mounted no config and ran Prometheus' default (it scraped only
  itself). This ConfigMap is a real prometheus.yml that scrapes the control-plane and executor
  /metrics endpoints (the falcone_* HTTP metrics) plus the APISIX gateway; the observability values
  mount it at /etc/prometheus and set --config.file. Targets use the chart's component service-name
  helper (release-name + componentId), matching the deployed services.
*/}}
{{- $ns := .Release.Namespace -}}
{{- $cp := printf "%s.%s.svc.cluster.local:%v" (include "in-falcone.componentServiceNameByAlias" (dict "root" . "component" "controlPlane")) $ns .Values.controlPlane.service.port -}}
{{- $apisix := printf "%s.%s.svc.cluster.local:%v" (include "in-falcone.componentServiceNameByAlias" (dict "root" . "component" "apisix")) $ns (.Values.apisix.service.port | default 9080) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-prometheus-config
  labels:
    {{- include "in-falcone.labels" . | nindent 4 }}
    in-falcone.io/component: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 30s
      external_labels:
        cluster: in-falcone
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']
      - job_name: falcone-control-plane
        metrics_path: /metrics
        static_configs:
          - targets: ['{{ $cp }}']
            labels:
              component: control-plane
      - job_name: falcone-control-plane-executor
        metrics_path: /metrics
        static_configs:
          - targets: ['{{ printf "%s.%s.svc.cluster.local:%v" (include "in-falcone.componentServiceNameByAlias" (dict "root" . "component" "controlPlaneExecutor")) $ns ((.Values.controlPlaneExecutor.service).port | default 8080) }}']
            labels:
              component: executor
      - job_name: falcone-apisix
        metrics_path: {{ .Values.gatewayPolicy.observability.gatewayMetrics.metricsPath | default "/apisix/prometheus/metrics" | quote }}
        static_configs:
          - targets: ['{{ $apisix }}']
            labels:
              component: gateway
      {{- /*
        Widen the scrape beyond the 3 static targets above (add-deploy-completeness-cluster, #562).
        Namespace-scoped Kubernetes pod service-discovery: scrape ANY Falcone pod that opts in via
        the `prometheus.io/scrape: "true"` annotation, reading its metrics port/path from
        `prometheus.io/port` + `prometheus.io/path` (defaults /metrics). This covers every current
        AND future metrics-exposing component (control-plane, executor, ...) without hardcoding a
        per-target job. Components WITHOUT a
        /metrics endpoint (e.g. workflow-worker, which serves only /livez+/readyz) are simply not
        annotated, so they are never scraped — no dead targets.
      */}}
      - job_name: falcone-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ $ns }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: replace
            target_label: component
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
