{{- if .Values.observability.enabled }}
{{- /*
  Real Prometheus scrape config (add-falcone-metrics-scrape-and-dashboards, #499). The
  observability component previously mounted no config and ran Prometheus' default (it scraped only
  itself). This ConfigMap is a real prometheus.yml that scrapes the control-plane and cp-executor
  /metrics endpoints (the falcone_* HTTP metrics) plus the APISIX gateway; the observability values
  mount it at /etc/prometheus and set --config.file. Targets use the chart's component service-name
  helper (release-name + componentId), matching the deployed services.
*/}}
{{- $ns := .Release.Namespace -}}
{{- $cp := printf "%s.%s.svc.cluster.local:%v" (include "in-falcone.componentServiceNameByAlias" (dict "root" . "component" "controlPlane")) $ns .Values.controlPlane.service.port -}}
{{- $apisix := printf "%s.%s.svc.cluster.local:%v" (include "in-falcone.componentServiceNameByAlias" (dict "root" . "component" "apisix")) $ns (.Values.apisix.service.port | default 9080) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-prometheus-config
  labels:
    {{- include "in-falcone.labels" . | nindent 4 }}
    in-falcone.io/component: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 30s
      external_labels:
        cluster: in-falcone
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']
      - job_name: falcone-control-plane
        metrics_path: /metrics
        static_configs:
          - targets: ['{{ $cp }}']
            labels:
              component: control-plane
      {{- if (.Values.controlPlaneExecutor).enabled }}
      - job_name: falcone-cp-executor
        metrics_path: /metrics
        static_configs:
          - targets: ['{{ printf "%s.%s.svc.cluster.local:%v" (include "in-falcone.componentServiceNameByAlias" (dict "root" . "component" "controlPlaneExecutor")) $ns ((.Values.controlPlaneExecutor.service).port | default 8080) }}']
            labels:
              component: executor
      {{- end }}
      - job_name: falcone-apisix
        metrics_path: {{ .Values.gatewayPolicy.observability.gatewayMetrics.metricsPath | default "/apisix/prometheus/metrics" | quote }}
        static_configs:
          - targets: ['{{ $apisix }}']
            labels:
              component: gateway
{{- end }}
