{{- if .Values.documentdb.enabled }}
{{- /*
  DocumentDB engine SERVER-START GUC overrides (add-ferretdb-documentdb-engine).

  `shared_preload_libraries` is a context=postmaster GUC: it is read once before the
  postmaster starts and CANNOT be set at session scope or via POSTGRES_EXTRA_ARGS.
  This ConfigMap is mounted by the DocumentDB StatefulSet (documentdb.extraVolumes /
  extraVolumeMounts in values.yaml) as a conf.d include FILE applied before postmaster
  start, so the setting is explicit, auditable and survives a pod restart.

  The pinned engine image ALSO preloads these libraries via its own bundled config
  (ADR-14 / add-ferretdb-adr-spike #455); this file is the Helm-managed declaration of
  the same set. Only these two GUCs are mandatory at startup (ADR-14): no additional
  `documentdb.*` GUCs are required.

  Name MUST equal documentdb.confConfigMapName (referenced by the StatefulSet volume).
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.documentdb.confConfigMapName }}
  labels:
    {{- include "in-falcone.labels" . | nindent 4 }}
    in-falcone.io/component: documentdb
data:
  custom.conf: |
    # Managed by Helm — add-ferretdb-documentdb-engine. Do not edit in-cluster.
    shared_preload_libraries = 'pg_cron,pg_documentdb_core,pg_documentdb'
    cron.database_name = 'postgres'
{{- if .Values.documentdb.logicalReplication.enabled }}
    # Logical replication for realtime SSE + CDC (add-ferretdb-realtime-cdc-remediation #460).
    # FerretDB v2 has no change streams; the realtime executor and the Kafka CDC bridge consume a
    # pgoutput logical replication slot on this engine. wal_level MUST be `logical` (default
    # `replica`) — a context=postmaster GUC, so it lives here and is read before postmaster start;
    # without it pg_create_logical_replication_slot fails "logical decoding requires wal_level >= logical".
    wal_level = logical
  # Logical-replication provisioning SQL, run once by the post-install init Job via `psql -f`
  # (add-ferretdb-realtime-cdc-remediation #460). Idempotent. :role / :pw / :pub are passed by the
  # Job via `psql -v` (client-side, safely quoted); %I/%L quote identifiers/literals server-side.
  # Validated against ghcr.io/ferretdb/postgres-documentdb:17-0.107.0-ferretdb-2.7.0.
  provision-logical-replication.sql: |
    -- 1. REPLICATION-privileged login role (distinct from falcone_app / per-tenant roles).
    SELECT format('CREATE ROLE %I LOGIN REPLICATION PASSWORD %L', :'role', :'pw')
      WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = :'role') \gexec
    SELECT format('ALTER ROLE %I WITH LOGIN REPLICATION PASSWORD %L', :'role', :'pw') \gexec
    -- 2. Grants. The walsender decodes the `bson` columns via documentdb_core.bson_out, so the role
    --    needs USAGE on every documentdb* schema (without it streaming dies "permission denied for
    --    schema documentdb_core"). The consumer's CollectionCatalog also reads the collections
    --    catalog. SELECT on documents_* is NOT required (WAL decode reads WAL, not the tables).
    SELECT format('GRANT USAGE ON SCHEMA %I TO %I', nspname, :'role')
      FROM pg_namespace WHERE nspname LIKE 'documentdb%' \gexec
    SELECT format('GRANT SELECT ON documentdb_api_catalog.collections TO %I', :'role') \gexec
    -- 3. Scoped publication (idempotent).
    SELECT format('CREATE PUBLICATION %I FOR TABLES IN SCHEMA documentdb_data', :'pub')
      WHERE NOT EXISTS (SELECT 1 FROM pg_publication WHERE pubname = :'pub') \gexec
    -- 4. REPLICA IDENTITY FULL on existing documents_* tables (delete pre-images).
    DO $$ DECLARE r record; BEGIN
      FOR r IN SELECT relname FROM pg_class c JOIN pg_namespace n ON n.oid = c.relnamespace
               WHERE n.nspname = 'documentdb_data' AND relname LIKE 'documents\_%' AND relkind = 'r'
      LOOP EXECUTE format('ALTER TABLE documentdb_data.%I REPLICA IDENTITY FULL', r.relname); END LOOP;
    END $$;
    -- 5. Event trigger: keep RI FULL applied to documents_* tables created later (new collections).
    CREATE OR REPLACE FUNCTION falcone_documents_ri_full() RETURNS event_trigger
    LANGUAGE plpgsql AS $fn$
    DECLARE obj record; BEGIN
      FOR obj IN SELECT * FROM pg_event_trigger_ddl_commands() WHERE command_tag = 'CREATE TABLE'
      LOOP
        IF obj.schema_name = 'documentdb_data' AND obj.object_identity ~ '\.documents_[0-9]+$' THEN
          EXECUTE format('ALTER TABLE %s REPLICA IDENTITY FULL', obj.object_identity);
        END IF;
      END LOOP;
    END $fn$;
    DROP EVENT TRIGGER IF EXISTS falcone_documents_ri_full_trg;
    CREATE EVENT TRIGGER falcone_documents_ri_full_trg ON ddl_command_end
      WHEN TAG IN ('CREATE TABLE') EXECUTE FUNCTION falcone_documents_ri_full();
{{- end }}
{{- end }}
