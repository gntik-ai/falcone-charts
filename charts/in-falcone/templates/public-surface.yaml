{{- if eq .Values.platform.network.exposureKind "Ingress" }}
{{- $ingressAnnotations := merge (default (dict) .Values.platform.routeAnnotations) (default (dict) .Values.publicSurface.ingress.annotations) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "in-falcone.fullname" . }}-public
  labels:
    {{- include "in-falcone.labels" . | nindent 4 }}
  {{- if gt (len $ingressAnnotations) 0 }}
  annotations:
    {{- toYaml $ingressAnnotations | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.publicSurface.ingress.className | quote }}
  {{- if eq .Values.publicSurface.tls.mode "clusterManaged" }}
  tls:
    {{- range $surface, $hostname := .Values.publicSurface.hostnames }}
    - hosts:
        - {{ $hostname }}
      secretName: {{ index $.Values.publicSurface.certificates.surfaces $surface }}
    {{- end }}
  {{- end }}
  rules:
    {{- range $surface, $binding := .Values.publicSurface.bindings }}
    - host: {{ index $.Values.publicSurface.hostnames $surface }}
      http:
        paths:
          - path: {{ $binding.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "in-falcone.componentServiceName" (dict "root" $ "binding" $binding) }}
                port:
                  name: {{ $binding.servicePort }}
    {{- end }}
{{- else if eq .Values.platform.network.exposureKind "LoadBalancer" }}
{{- $loadBalancerAnnotations := default (dict) .Values.publicSurface.loadBalancer.annotations -}}
{{- range $surface, $binding := .Values.publicSurface.bindings }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "in-falcone.fullname" $ }}-{{ $surface }}-public
  labels:
    {{- include "in-falcone.labels" $ | nindent 4 }}
  {{- if gt (len $loadBalancerAnnotations) 0 }}
  annotations:
    {{- toYaml $loadBalancerAnnotations | nindent 4 }}
  {{- end }}
spec:
  type: LoadBalancer
  selector:
    {{- include "in-falcone.componentSelectorLabels" (dict "root" $ "component" $binding.component) | nindent 4 }}
  ports:
    - name: {{ $binding.servicePort }}
      port: {{ index $.Values.publicSurface.loadBalancer.ports $surface }}
      targetPort: {{ $binding.servicePort }}
      protocol: TCP
  externalTrafficPolicy: {{ $.Values.publicSurface.loadBalancer.externalTrafficPolicy | default "Cluster" }}
  allocateLoadBalancerNodePorts: {{ $.Values.publicSurface.loadBalancer.allocateLoadBalancerNodePorts | default true }}
  {{- with $.Values.publicSurface.loadBalancer.className }}
  loadBalancerClass: {{ . | quote }}
  {{- end }}
  {{- with $.Values.publicSurface.loadBalancer.sourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $.Values.publicSurface.loadBalancer.ipFamilyPolicy }}
  ipFamilyPolicy: {{ . | quote }}
  {{- end }}
  {{- with $.Values.publicSurface.loadBalancer.ipFamilies }}
  ipFamilies:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- end }}
{{- else if eq .Values.platform.network.exposureKind "Route" }}
{{- $routeAnnotations := merge (default (dict) .Values.platform.routeAnnotations) (default (dict) .Values.publicSurface.route.annotations) -}}
{{- range $surface, $binding := .Values.publicSurface.bindings }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "in-falcone.fullname" $ }}-{{ $surface }}
  labels:
    {{- include "in-falcone.labels" $ | nindent 4 }}
  {{- if gt (len $routeAnnotations) 0 }}
  annotations:
    {{- toYaml $routeAnnotations | nindent 4 }}
  {{- end }}
spec:
  host: {{ index $.Values.publicSurface.hostnames $surface }}
  path: {{ $binding.path }}
  to:
    kind: Service
    name: {{ include "in-falcone.componentServiceName" (dict "root" $ "binding" $binding) }}
  port:
    targetPort: {{ $binding.servicePort }}
  {{- with $.Values.publicSurface.route.tls }}
  tls:
    termination: {{ .termination | default "edge" }}
    insecureEdgeTerminationPolicy: {{ .insecureEdgeTerminationPolicy | default "Redirect" }}
  {{- end }}
---
{{- end }}
{{- end }}
