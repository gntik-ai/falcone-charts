{{- if .Values.bootstrap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "in-falcone.bootstrapScriptConfigMapName" . }}
  labels:
    {{- include "in-falcone.labels" . | nindent 4 }}
    in-falcone.io/bootstrap-phase: controller
    in-falcone.io/component: bootstrap
    in-falcone.io/managed-lifecycle: reconcile
  annotations:
    in-falcone.io/bootstrap-one-shot-hash: {{ include "in-falcone.bootstrapOneShotHash" . | quote }}
data:
  bootstrap.sh: |
    #!/bin/bash
    set -euo pipefail

    NAMESPACE="{{ .Release.Namespace }}"
    LOCK_NAME="{{ .Values.bootstrap.lock.name }}"
    MARKER_NAME="{{ .Values.bootstrap.markers.name }}"
    GOVERNANCE_CONFIGMAP="{{ include "in-falcone.bootstrapGovernanceCatalogName" . }}"
    INTERNAL_NAMESPACES_CONFIGMAP="{{ include "in-falcone.bootstrapInternalNamespacesName" . }}"
    PAYLOAD_DIR="/bootstrap/payload"
    ONE_SHOT_HASH="{{ include "in-falcone.bootstrapOneShotHash" . }}"
    RELEASE_REVISION="{{ .Release.Revision }}"
    BREAK_GLASS_EXISTING_LOCK="{{ .Values.bootstrap.lock.breakGlassExistingLock }}"
    KEYCLOAK_REALM_ID="{{ .Values.bootstrap.oneShot.keycloak.realm.realm }}"
    KEYCLOAK_REALM_DISPLAY_NAME="{{ .Values.bootstrap.oneShot.keycloak.realm.displayName }}"
    KEYCLOAK_SUPERADMIN_USERNAME="{{ .Values.bootstrap.oneShot.keycloak.superadmin.username }}"
    APISIX_ADMIN_URL="http://{{ include "in-falcone.apisixAdminServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.bootstrap.reconcile.apisix.adminService.port }}"
    KEYCLOAK_BASE_URL="http://{{ include "in-falcone.componentServiceNameByAlias" (dict "root" . "component" "keycloak") }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.keycloak.service.port }}"

    log() {
      echo "[bootstrap] $*"
    }

    require_env() {
      local name="$1"
      if [ -z "${!name:-}" ]; then
        echo "[bootstrap] required environment variable $name is not set" >&2
        exit 1
      fi
    }

    release_lock() {
      kubectl -n "$NAMESPACE" delete configmap "$LOCK_NAME" --ignore-not-found >/dev/null 2>&1 || true
    }

    acquire_lock() {
      if kubectl -n "$NAMESPACE" get configmap "$LOCK_NAME" >/dev/null 2>&1; then
        if [ "$BREAK_GLASS_EXISTING_LOCK" = "true" ]; then
          log "break-glass enabled; deleting existing bootstrap lock $LOCK_NAME"
          kubectl -n "$NAMESPACE" delete configmap "$LOCK_NAME" --ignore-not-found >/dev/null
        else
          log "bootstrap lock $LOCK_NAME already exists; refusing concurrent execution"
          exit 1
        fi
      fi

      kubectl -n "$NAMESPACE" create configmap "$LOCK_NAME" \
        --from-literal=holder="${HOSTNAME:-bootstrap-job}" \
        --from-literal=startedAt="$(date -u +%FT%TZ)" >/dev/null
      trap release_lock EXIT
    }

    current_marker_hash() {
      kubectl -n "$NAMESPACE" get configmap "$MARKER_NAME" -o jsonpath='{.data.oneShotHash}' 2>/dev/null || true
    }

    write_marker() {
      kubectl -n "$NAMESPACE" create configmap "$MARKER_NAME" \
        --from-literal=oneShotHash="$ONE_SHOT_HASH" \
        --from-literal=completedAt="$(date -u +%FT%TZ)" \
        --from-literal=releaseRevision="$RELEASE_REVISION" \
        --from-literal=mode="apply-missing-and-reconcile" \
        --dry-run=client -o yaml | kubectl -n "$NAMESPACE" apply -f - >/dev/null
    }

    ensure_missing_configmap() {
      local configmap_name="$1"
      shift
      if kubectl -n "$NAMESPACE" get configmap "$configmap_name" >/dev/null 2>&1; then
        log "one-shot configmap $configmap_name already exists; leaving it untouched"
        return 0
      fi

      kubectl -n "$NAMESPACE" create configmap "$configmap_name" "$@" >/dev/null
      kubectl -n "$NAMESPACE" label configmap "$configmap_name" \
        in-falcone.io/bootstrap-phase=one-shot \
        in-falcone.io/managed-lifecycle=create-only \
        --overwrite >/dev/null
      kubectl -n "$NAMESPACE" annotate configmap "$configmap_name" \
        in-falcone.io/bootstrap-one-shot-hash="$ONE_SHOT_HASH" \
        in-falcone.io/bootstrap-created-at="$(date -u +%FT%TZ)" \
        --overwrite >/dev/null
      log "created one-shot configmap $configmap_name"
    }

    get_keycloak_token() {
      local response
      response="$(curl -fsS --retry 6 --retry-delay 5 \
        -H 'Content-Type: application/x-www-form-urlencoded' \
        --data-urlencode 'client_id=admin-cli' \
        --data-urlencode "username=${BOOTSTRAP_KEYCLOAK_ADMIN_USERNAME}" \
        --data-urlencode "password=${BOOTSTRAP_KEYCLOAK_ADMIN_PASSWORD}" \
        --data-urlencode 'grant_type=password' \
        "$KEYCLOAK_BASE_URL/realms/master/protocol/openid-connect/token")"
      echo "$response" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p'
    }

    require_keycloak_token() {
      local token
      token="$(get_keycloak_token)"
      if [ -z "$token" ]; then
        echo '[bootstrap] failed to obtain Keycloak admin token' >&2
        exit 1
      fi
      printf '%s' "$token"
    }

    ensure_keycloak_realm() {
      local token="$1"
      local status
      status="$(curl -sS -o /tmp/keycloak-realm-check -w '%{http_code}' \
        -H "Authorization: Bearer $token" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID")"

      if [ "$status" = "200" ]; then
        log "Keycloak realm $KEYCLOAK_REALM_ID already exists"
        return 0
      fi

      if [ "$status" != "404" ]; then
        cat /tmp/keycloak-realm-check >&2 || true
        echo "[bootstrap] unexpected status while checking realm: $status" >&2
        exit 1
      fi

      status="$(curl -sS -o /tmp/keycloak-realm-create -w '%{http_code}' \
        -X POST \
        -H "Authorization: Bearer $token" \
        -H 'Content-Type: application/json' \
        --data @"$PAYLOAD_DIR/realm.json" \
        "$KEYCLOAK_BASE_URL/admin/realms")"

      if [ "$status" != "201" ] && [ "$status" != "409" ]; then
        cat /tmp/keycloak-realm-create >&2 || true
        echo "[bootstrap] failed to create Keycloak realm; status=$status" >&2
        exit 1
      fi

      log "ensured Keycloak realm $KEYCLOAK_REALM_DISPLAY_NAME"
    }

    # Relax the realm's Keycloak 26 declarative user profile so email/firstName/lastName are
    # OPTIONAL (fix-auth-as-a-service-login, #496). The default profile marks them required for
    # role "user", so a user provisioned via the admin API without them fails Direct Access Grant
    # with invalid_grant "Account is not fully set up" — even with requiredActions:[] — blocking
    # onboarding of every new principal but the bootstrap superadmin. Idempotent (PUT). Skipped
    # when no payload is provided.
    ensure_keycloak_user_profile() {
      local token="$1"
      local status
      if [ ! -f "$PAYLOAD_DIR/user-profile.json" ]; then
        log "no Keycloak user-profile payload; leaving the realm default in place"
        return 0
      fi
      status="$(curl -sS -o /tmp/keycloak-user-profile -w '%{http_code}' \
        -X PUT \
        -H "Authorization: Bearer $token" \
        -H 'Content-Type: application/json' \
        --data @"$PAYLOAD_DIR/user-profile.json" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/users/profile")"

      if [ "$status" != "200" ]; then
        cat /tmp/keycloak-user-profile >&2 || true
        echo "[bootstrap] failed to relax Keycloak user profile; status=$status" >&2
        exit 1
      fi

      log "relaxed Keycloak user profile (email/firstName/lastName optional)"
    }

    # Enable Keycloak brute-force detection on the platform realm (#668). Keycloak defaults
    # `bruteForceProtected` to FALSE, so the realm accepts unlimited wrong-password attempts (no
    # lockout, attack-detection not even counting) — a brute-force / credential-stuffing exposure
    # for the console/superadmin login. The realm-create payload already carries these fields, but
    # ensure_keycloak_realm SKIPS create-or-update once the realm exists, so a payload-only change
    # would NOT retrofit an already-provisioned platform realm. This idempotent PUT applies the
    # brute-force settings to the realm regardless of whether it pre-existed (KC's realm PUT merges
    # the provided partial rep, leaving clients/roles/user-profile untouched). Idempotent (PUT).
    # Skipped when no payload is provided.
    ensure_keycloak_brute_force() {
      local token="$1"
      local status
      if [ ! -f "$PAYLOAD_DIR/brute-force.json" ]; then
        log "no Keycloak brute-force payload; leaving the realm default in place"
        return 0
      fi
      status="$(curl -sS -o /tmp/keycloak-brute-force -w '%{http_code}' \
        -X PUT \
        -H "Authorization: Bearer $token" \
        -H 'Content-Type: application/json' \
        --data @"$PAYLOAD_DIR/brute-force.json" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID")"

      if [ "$status" != "200" ] && [ "$status" != "204" ]; then
        cat /tmp/keycloak-brute-force >&2 || true
        echo "[bootstrap] failed to enable Keycloak brute-force detection; status=$status" >&2
        exit 1
      fi

      log "enabled Keycloak brute-force detection on realm $KEYCLOAK_REALM_ID"
    }

    ensure_keycloak_role_from_file() {
      local token="$1"
      local role_name="$2"
      local role_file="$3"
      local status
      status="$(curl -sS -o /tmp/keycloak-role-check -w '%{http_code}' \
        -H "Authorization: Bearer $token" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/roles/$role_name")"

      if [ "$status" = "200" ]; then
        log "Keycloak role $role_name already exists"
        return 0
      fi

      if [ "$status" != "404" ]; then
        cat /tmp/keycloak-role-check >&2 || true
        echo "[bootstrap] unexpected status while checking Keycloak role $role_name: $status" >&2
        exit 1
      fi

      status="$(curl -sS -o /tmp/keycloak-role-create -w '%{http_code}' \
        -X POST \
        -H "Authorization: Bearer $token" \
        -H 'Content-Type: application/json' \
        --data @"$role_file" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/roles")"

      if [ "$status" != "201" ] && [ "$status" != "204" ] && [ "$status" != "409" ]; then
        cat /tmp/keycloak-role-create >&2 || true
        echo "[bootstrap] failed to create Keycloak role $role_name; status=$status" >&2
        exit 1
      fi

      log "ensured Keycloak role $role_name"
    }

    ensure_keycloak_client_scope() {
      local token="$1"
      local scope_name="$2"
      local scope_file="$3"
      local response
      local status

      response="$(curl -fsS \
        -H "Authorization: Bearer $token" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/client-scopes")"

      if echo "$response" | grep -q '"name":"'$scope_name'"'; then
        log "Keycloak client scope $scope_name already exists"
        return 0
      fi

      status="$(curl -sS -o /tmp/keycloak-client-scope-create -w '%{http_code}' \
        -X POST \
        -H "Authorization: Bearer $token" \
        -H 'Content-Type: application/json' \
        --data @"$scope_file" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/client-scopes")"

      if [ "$status" != "201" ] && [ "$status" != "409" ]; then
        cat /tmp/keycloak-client-scope-create >&2 || true
        echo "[bootstrap] failed to create Keycloak client scope $scope_name; status=$status" >&2
        exit 1
      fi

      log "ensured Keycloak client scope $scope_name"
    }

    ensure_keycloak_client() {
      local token="$1"
      local client_id="$2"
      local client_file="$3"
      local response
      local status

      response="$(curl -fsS \
        -H "Authorization: Bearer $token" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/clients?clientId=$client_id")"

      if echo "$response" | grep -q '"clientId":"'$client_id'"'; then
        log "Keycloak client $client_id already exists"
        return 0
      fi

      status="$(curl -sS -o /tmp/keycloak-client-create -w '%{http_code}' \
        -X POST \
        -H "Authorization: Bearer $token" \
        -H 'Content-Type: application/json' \
        --data @"$client_file" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/clients")"

      if [ "$status" != "201" ] && [ "$status" != "409" ]; then
        cat /tmp/keycloak-client-create >&2 || true
        echo "[bootstrap] failed to create Keycloak client $client_id; status=$status" >&2
        exit 1
      fi

      log "ensured Keycloak client $client_id"
    }

    # Idempotently assign standard Keycloak default client scopes (e.g. roles/basic/profile) to a
    # client (finding A2). create-only ensure_keycloak_client never UPDATES an existing client, so
    # on an upgrade of a deployment whose console/gateway clients were created without these scopes
    # — issued tokens then carried no realm_access.roles and every role check 403'd — this back-fills
    # them via the REST API. Idempotent: a PUT of an already-assigned scope is a no-op. Built-in
    # scopes are auto-created with the realm, so they resolve here.
    ensure_client_default_scopes() {
      local token="$1" client_id="$2"
      shift 2
      local clients_json scopes_json client_uuid scope_id status
      clients_json="$(curl -fsS -H "Authorization: Bearer $token" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/clients?clientId=$client_id")"
      client_uuid="$(printf '%s' "$clients_json" | sed -n 's/.*"id":"\([^"]*\)","clientId":"'$client_id'".*/\1/p' | head -1)"
      if [ -z "$client_uuid" ]; then
        echo "[bootstrap] cannot resolve client $client_id to assign default scopes" >&2
        exit 1
      fi
      scopes_json="$(curl -fsS -H "Authorization: Bearer $token" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/client-scopes")"
      for scope_name in "$@"; do
        # Keycloak serializes a client-scope as "id":"<uuid>","name":"<scope>"; the exact-name
        # match avoids colliding with nested protocol-mapper names.
        scope_id="$(printf '%s' "$scopes_json" | grep -oE '"id":"[^"]*","name":"'"$scope_name"'"' | sed -n 's/"id":"\([^"]*\)".*/\1/p' | head -1)"
        if [ -z "$scope_id" ]; then
          echo "[bootstrap] default client scope '$scope_name' not present in realm; skipping" >&2
          continue
        fi
        status="$(curl -sS -o /dev/null -w '%{http_code}' \
          -X PUT \
          -H "Authorization: Bearer $token" \
          "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/clients/$client_uuid/default-client-scopes/$scope_id")"
        if [ "$status" != "204" ] && [ "$status" != "200" ]; then
          echo "[bootstrap] failed to assign default scope '$scope_name' to $client_id; status=$status" >&2
          exit 1
        fi
        log "ensured default client scope '$scope_name' on $client_id"
      done
    }

    lookup_keycloak_user_id() {
      local token="$1"
      local response
      response="$(curl -fsS \
        -H "Authorization: Bearer $token" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/users?username=$KEYCLOAK_SUPERADMIN_USERNAME&exact=true")"
      if ! echo "$response" | grep -q '"username":"'$KEYCLOAK_SUPERADMIN_USERNAME'"'; then
        return 0
      fi
      echo "$response" | sed -n 's/.*"id":"\([^"]*\)","username":"'$KEYCLOAK_SUPERADMIN_USERNAME'".*/\1/p'
    }

    create_keycloak_superadmin() {
      local token="$1"
      local status
      status="$(curl -sS -o /tmp/keycloak-superadmin-create -w '%{http_code}' \
        -X POST \
        -H "Authorization: Bearer $token" \
        -H 'Content-Type: application/json' \
        --data @"$PAYLOAD_DIR/superadmin.json" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/users")"

      if [ "$status" != "201" ] && [ "$status" != "409" ]; then
        cat /tmp/keycloak-superadmin-create >&2 || true
        echo "[bootstrap] failed to create Keycloak superadmin; status=$status" >&2
        exit 1
      fi
    }

    ensure_keycloak_superadmin() {
      local token="$1"
      local user_id
      local role_response
      local role_id
      local mapping_status

      user_id="$(lookup_keycloak_user_id "$token")"
      if [ -z "$user_id" ]; then
        create_keycloak_superadmin "$token"
        user_id="$(lookup_keycloak_user_id "$token")"
      fi

      if [ -z "$user_id" ]; then
        echo '[bootstrap] unable to resolve Keycloak superadmin user id after creation' >&2
        exit 1
      fi

      # finding A1 (live E2E campaign 2026-06-17): the fresh superadmin payload now sets
      # enabled/emailVerified, but create-only provisioning never updates an existing user, so an
      # older deployment's superadmin stays DISABLED (login -> 401 "Account disabled"). Idempotently
      # back-fill the account state before resetting the password so re-bootstrap heals it.
      curl -fsS \
        -X PUT \
        -H "Authorization: Bearer $token" \
        -H 'Content-Type: application/json' \
        --data '{"enabled":true,"emailVerified":true,"requiredActions":[]}' \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/users/$user_id" >/dev/null

      curl -fsS \
        -X PUT \
        -H "Authorization: Bearer $token" \
        -H 'Content-Type: application/json' \
        --data '{"type":"password","temporary":false,"value":"'"${BOOTSTRAP_SUPERADMIN_PASSWORD}"'"}' \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/users/$user_id/reset-password" >/dev/null

      role_response="$(curl -fsS \
        -H "Authorization: Bearer $token" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/roles/superadmin")"
      role_id="$(echo "$role_response" | sed -n 's/.*"id":"\([^"]*\)".*/\1/p')"
      if [ -z "$role_id" ]; then
        echo '[bootstrap] unable to resolve Keycloak superadmin role id' >&2
        exit 1
      fi

      mapping_status="$(curl -sS -o /tmp/keycloak-superadmin-role-map -w '%{http_code}' \
        -X POST \
        -H "Authorization: Bearer $token" \
        -H 'Content-Type: application/json' \
        --data '[{"id":"'"$role_id"'","name":"superadmin"}]' \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/users/$user_id/role-mappings/realm")"

      if [ "$mapping_status" != "204" ] && [ "$mapping_status" != "409" ]; then
        cat /tmp/keycloak-superadmin-role-map >&2 || true
        echo "[bootstrap] failed to assign Keycloak superadmin role; status=$mapping_status" >&2
        exit 1
      fi

      log "ensured Keycloak superadmin $KEYCLOAK_SUPERADMIN_USERNAME"
    }

    ensure_apisix_route() {
      local route_id="$1"
      local route_file="$2"
      local status
      status="$(curl -sS -o /tmp/apisix-route-response -w '%{http_code}' \
        -X PUT \
        -H 'Content-Type: application/json' \
        -H "X-API-KEY: ${BOOTSTRAP_APISIX_ADMIN_KEY}" \
        --data @"$route_file" \
        "$APISIX_ADMIN_URL/apisix/admin/routes/$route_id")"

      if [ "$status" != "200" ] && [ "$status" != "201" ]; then
        cat /tmp/apisix-route-response >&2 || true
        echo "[bootstrap] failed to reconcile APISIX route $route_id; status=$status" >&2
        exit 1
      fi

      log "reconciled APISIX route $route_id"
    }

    run_one_shot_bootstrap() {
      local token
      token="$(require_keycloak_token)"

      ensure_missing_configmap "$GOVERNANCE_CONFIGMAP" \
        --from-file=plans.json="$PAYLOAD_DIR/governance-plans.json" \
        --from-file=quota-policies.json="$PAYLOAD_DIR/governance-quota-policies.json" \
        --from-file=deployment-profiles.json="$PAYLOAD_DIR/governance-deployment-profiles.json"

      ensure_missing_configmap "$INTERNAL_NAMESPACES_CONFIGMAP" \
        --from-file=internal-namespaces.json="$PAYLOAD_DIR/internal-namespaces.json"

      ensure_keycloak_realm "$token"
      ensure_keycloak_user_profile "$token"
      ensure_keycloak_brute_force "$token"

      for role_file in "$PAYLOAD_DIR"/role-*.json; do
        [ -e "$role_file" ] || continue
        local role_name
        role_name="$(basename "$role_file" .json)"
        role_name="${role_name#role-}"
        ensure_keycloak_role_from_file "$token" "$role_name" "$role_file"
      done

      for scope_file in "$PAYLOAD_DIR"/client-scope-*.json; do
        [ -e "$scope_file" ] || continue
        local scope_name
        scope_name="$(basename "$scope_file" .json)"
        scope_name="${scope_name#client-scope-}"
        ensure_keycloak_client_scope "$token" "$scope_name" "$scope_file"
      done

      for client_file in "$PAYLOAD_DIR"/client-*.json; do
        [ -e "$client_file" ] || continue
        local client_id
        client_id="$(basename "$client_file" .json)"
        client_id="${client_id#client-}"
        ensure_keycloak_client "$token" "$client_id" "$client_file"
      done

      # Back-fill the standard default client scopes on the platform clients so issued tokens carry
      # realm_access.roles (finding A2) — required on upgrades since client creation is create-only.
{{- range .Values.bootstrap.oneShot.keycloak.clients }}
      ensure_client_default_scopes "$token" "{{ .clientId }}" roles basic profile
{{- end }}

      ensure_keycloak_superadmin "$token"
    }

    run_upgrade_reconciliation() {
{{- if eq (toString (dig "config" "inline" "APISIX_STAND_ALONE" "false" .Values.apisix)) "true" }}
      # APISIX runs in standalone mode (APISIX_STAND_ALONE=true, the chart default): routes are
      # served from the mounted standalone config (apisix.yaml), and the admin API targeted below
      # is unavailable. Issuing PUT /apisix/admin/routes there fails and aborts the Job, leaving
      # the platform realm / clients / superadmin unprovisioned (finding D2). Skip the admin-API
      # reconciliation entirely in standalone mode — emit zero admin-API calls.
      log "APISIX_STAND_ALONE=true; skipping APISIX admin-API route reconciliation (standalone serves routes from mounted config)"
{{- else }}
{{- $mode := .Values.gatewayPolicy.passthrough.mode }}
{{- range .Values.bootstrap.reconcile.apisix.routes }}
{{- /* requiresExecutor routes (api-key auth) only exist when the executor is enabled. */ -}}
{{- if and (or (not (hasKey . "enabledInModes")) (has $mode .enabledInModes)) (or (not .upstream.requiresExecutor) ($.Values.controlPlaneExecutor).enabled) }}
      ensure_apisix_route "{{ .routeId }}" "$PAYLOAD_DIR/route-{{ .routeId }}.json"
{{- end }}
{{- end }}
{{- end }}
    }

    # Final smoke check (finding D2): confirm the auth layer the create-only phase is responsible
    # for is actually present in Keycloak before the Job reports success, so a broken bootstrap can
    # never exit 0 with the realm/clients/superadmin missing. Reuses the same admin-API query
    # idioms as the create-only functions; hits Keycloak directly (not via APISIX).
    verify_auth_layer() {
      local token missing=0
      token="$(require_keycloak_token)"

      if [ "$(curl -sS -o /dev/null -w '%{http_code}' \
        -H "Authorization: Bearer $token" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID")" != "200" ]; then
        echo "[bootstrap] verify: platform realm $KEYCLOAK_REALM_ID is absent" >&2
        missing=1
      fi
{{- range .Values.bootstrap.oneShot.keycloak.clients }}
      if ! curl -sS -H "Authorization: Bearer $token" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/clients?clientId={{ .clientId }}" \
        | grep -q '"clientId":"{{ .clientId }}"'; then
        echo "[bootstrap] verify: Keycloak client {{ .clientId }} is absent" >&2
        missing=1
      fi
{{- end }}
      if ! curl -sS -H "Authorization: Bearer $token" \
        "$KEYCLOAK_BASE_URL/admin/realms/$KEYCLOAK_REALM_ID/users?username=$KEYCLOAK_SUPERADMIN_USERNAME&exact=true" \
        | grep -q '"username":"'$KEYCLOAK_SUPERADMIN_USERNAME'"'; then
        echo "[bootstrap] verify: superadmin $KEYCLOAK_SUPERADMIN_USERNAME is absent" >&2
        missing=1
      fi

      if [ "$missing" != "0" ]; then
        echo "[bootstrap] auth-layer verification failed; refusing to report success" >&2
        exit 1
      fi
      log "verified auth layer: platform realm, Keycloak clients, and superadmin are present"
    }

    main() {
      acquire_lock
      require_env BOOTSTRAP_KEYCLOAK_ADMIN_USERNAME
      require_env BOOTSTRAP_KEYCLOAK_ADMIN_PASSWORD
      require_env BOOTSTRAP_SUPERADMIN_PASSWORD
      require_env BOOTSTRAP_APISIX_ADMIN_KEY

      local marker_hash
      marker_hash="$(current_marker_hash)"
      if [ "$marker_hash" = "$ONE_SHOT_HASH" ]; then
        log "bootstrap marker already matches the current one-shot payload; skipping create-only phase"
      else
        log "running create-only bootstrap phase"
        run_one_shot_bootstrap
      fi

      log "running upgrade reconciliation phase"
      run_upgrade_reconciliation
      verify_auth_layer
      write_marker
      log "bootstrap completed successfully"
    }

    main "$@"
{{- end }}
