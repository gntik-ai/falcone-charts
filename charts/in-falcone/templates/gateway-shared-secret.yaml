{{- if .Values.gatewaySharedSecret.create }}
{{- /*
  Gateway shared secret (fix-apisix-gateway-shared-secret-provisioning, finding D3).

  Bridges the APISIX gateway and the control-plane executor: APISIX signs forwarded
  requests with `x-gateway-auth: ${{GATEWAY_SHARED_SECRET}}` (standalone route table),
  and the executor trusts gateway-injected identity headers only when that header
  matches its own GATEWAY_SHARED_SECRET. The APISIX standalone config reads the value
  from its process env, so without this Secret APISIX fails to load config and
  CrashLoops ("can't find environment variable GATEWAY_SHARED_SECRET").

  Both consumers reference this Secret by its fixed name `in-falcone-gateway-shared-secret`
  (key `secret`) via secretKeyRef in apisix.env / controlPlaneExecutor.env. To supply your
  own value, set gatewaySharedSecret.create=false and pre-create a Secret of that name.

  STABLE ACROSS RE-INSTALLS: generated once with randAlphaNum, then re-read on every
  subsequent render via `lookup`, so upgrades do NOT rotate it (which would desync the
  gateway and executor). Carries helm.sh/resource-policy: keep. Mirrors
  seaweedfs-s3-creds.yaml.
*/ -}}
{{- $ns := .Values.global.namespace -}}
{{- $name := .Values.gatewaySharedSecret.secretName -}}
{{- $key := .Values.gatewaySharedSecret.secretKey -}}
{{- $existing := lookup "v1" "Secret" $ns $name -}}
{{- $value := "" -}}
{{- if and $existing $existing.data -}}
  {{- $value = index $existing.data $key | b64dec -}}
{{- end -}}
{{- if not $value -}}
  {{- $value = randAlphaNum 48 -}}
{{- end -}}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    {{- include "in-falcone.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  annotations:
    "helm.sh/resource-policy": keep
stringData:
  {{ $key }}: {{ $value | quote }}
{{- end }}
