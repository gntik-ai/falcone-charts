{{- /*
  Core platform credentials.

  These Secrets replace the old tests/live-campaign/make-secrets.sh pre-step for fresh installs.
  Every generated value is read back with lookup on later renders and marked keep so upgrades and
  rollbacks do not rotate datastore, identity, or bootstrap credentials.
*/ -}}
{{- $ns := .Release.Namespace -}}
{{- $labels := include "in-falcone.labels" . -}}
{{- $get := dict -}}
{{- $_ := set $get "secretValue" (printf "unused") -}}
{{- $pgExisting := lookup "v1" "Secret" $ns "in-falcone-postgresql" -}}
{{- $pgUser := "falcone" -}}
{{- if and $pgExisting $pgExisting.data }}{{- $pgUser = (index $pgExisting.data "POSTGRESQL_USERNAME" | default ($pgUser | b64enc) | b64dec) -}}{{- end -}}
{{- $pgPass := randAlphaNum 48 -}}
{{- if and $pgExisting $pgExisting.data }}{{- $pgPass = (index $pgExisting.data "POSTGRESQL_PASSWORD" | default ($pgPass | b64enc) | b64dec) -}}{{- end -}}
{{- $pgSuperPass := randAlphaNum 48 -}}
{{- if and $pgExisting $pgExisting.data }}{{- $pgSuperPass = (index $pgExisting.data "POSTGRESQL_POSTGRES_PASSWORD" | default ($pgSuperPass | b64enc) | b64dec) -}}{{- end -}}
{{- $pgVectorExisting := lookup "v1" "Secret" $ns "in-falcone-postgresql-vector" -}}
{{- $pgVectorUser := "falcone_vector_admin" -}}
{{- if and $pgVectorExisting $pgVectorExisting.data }}{{- $pgVectorUser = (index $pgVectorExisting.data "POSTGRES_USER" | default ($pgVectorUser | b64enc) | b64dec) -}}{{- end -}}
{{- $pgVectorPass := randAlphaNum 48 -}}
{{- if and $pgVectorExisting $pgVectorExisting.data }}{{- $pgVectorPass = (index $pgVectorExisting.data "POSTGRES_PASSWORD" | default ($pgVectorPass | b64enc) | b64dec) -}}{{- end -}}
{{- $docExisting := lookup "v1" "Secret" $ns "in-falcone-documentdb" -}}
{{- $docUser := "falcone_doc_admin" -}}
{{- if and $docExisting $docExisting.data }}{{- $docUser = (index $docExisting.data "POSTGRES_USER" | default ($docUser | b64enc) | b64dec) -}}{{- end -}}
{{- $docPass := randAlphaNum 48 -}}
{{- if and $docExisting $docExisting.data }}{{- $docPass = (index $docExisting.data "POSTGRES_PASSWORD" | default ($docPass | b64enc) | b64dec) -}}{{- end -}}
{{- $docDb := "in_falcone" -}}
{{- if and $docExisting $docExisting.data }}{{- $docDb = (index $docExisting.data "POSTGRES_DB" | default ($docDb | b64enc) | b64dec) -}}{{- end -}}
{{- $replExisting := lookup "v1" "Secret" $ns "in-falcone-documentdb-replication" -}}
{{- $replPass := randAlphaNum 48 -}}
{{- if and $replExisting $replExisting.data }}{{- $replPass = (index $replExisting.data "password" | default ($replPass | b64enc) | b64dec) -}}{{- end -}}
{{- $kcExisting := lookup "v1" "Secret" $ns "in-falcone-keycloak-admin" -}}
{{- $kcUser := "admin" -}}
{{- if and $kcExisting $kcExisting.data }}{{- $kcUser = (index $kcExisting.data "username" | default ($kcUser | b64enc) | b64dec) -}}{{- end -}}
{{- $kcPass := randAlphaNum 48 -}}
{{- if and $kcExisting $kcExisting.data }}{{- $kcPass = (index $kcExisting.data "password" | default ($kcPass | b64enc) | b64dec) -}}{{- end -}}
{{- $identityExisting := lookup "v1" "Secret" $ns "in-falcone-identity-client" -}}
{{- $identityClientId := "in-falcone-gateway" -}}
{{- if and $identityExisting $identityExisting.data }}{{- $identityClientId = (index $identityExisting.data "client-id" | default ($identityClientId | b64enc) | b64dec) -}}{{- end -}}
{{- $identityClientSecret := randAlphaNum 48 -}}
{{- if and $identityExisting $identityExisting.data }}{{- $identityClientSecret = (index $identityExisting.data "client-secret" | default ($identityClientSecret | b64enc) | b64dec) -}}{{- end -}}
{{- $superExisting := lookup "v1" "Secret" $ns "in-falcone-superadmin" -}}
{{- $superPass := randAlphaNum 48 -}}
{{- if and $superExisting $superExisting.data }}{{- $superPass = (index $superExisting.data "password" | default ($superPass | b64enc) | b64dec) -}}{{- end -}}
{{- $apisixExisting := lookup "v1" "Secret" $ns "in-falcone-apisix-admin" -}}
{{- $apisixAdminKey := randAlphaNum 48 -}}
{{- if and $apisixExisting $apisixExisting.data }}{{- $apisixAdminKey = (index $apisixExisting.data "admin-key" | default ($apisixAdminKey | b64enc) | b64dec) -}}{{- end -}}
{{- $temporalExisting := lookup "v1" "Secret" $ns "in-falcone-temporal" -}}
{{- $temporalUser := "temporal" -}}
{{- if and $temporalExisting $temporalExisting.data }}{{- $temporalUser = (index $temporalExisting.data "username" | default ($temporalUser | b64enc) | b64dec) -}}{{- end -}}
{{- $temporalPass := randAlphaNum 48 -}}
{{- if and $temporalExisting $temporalExisting.data }}{{- $temporalPass = (index $temporalExisting.data "password" | default ($temporalPass | b64enc) | b64dec) -}}{{- end -}}
{{- $encryptionExisting := lookup "v1" "Secret" $ns "in-falcone-encryption" -}}
{{- $encryptionMasterKey := randAlphaNum 64 -}}
{{- if and $encryptionExisting $encryptionExisting.data }}{{- $encryptionMasterKey = (index $encryptionExisting.data "master-key" | default ($encryptionMasterKey | b64enc) | b64dec) -}}{{- end -}}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: in-falcone-postgresql
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: postgresql
  annotations:
    "helm.sh/resource-policy": keep
stringData:
  POSTGRESQL_USERNAME: {{ $pgUser | quote }}
  POSTGRESQL_PASSWORD: {{ $pgPass | quote }}
  POSTGRESQL_POSTGRES_PASSWORD: {{ $pgSuperPass | quote }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: in-falcone-postgresql-vector
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: postgresql-vector
  annotations:
    "helm.sh/resource-policy": keep
stringData:
  POSTGRES_USER: {{ $pgVectorUser | quote }}
  POSTGRES_PASSWORD: {{ $pgVectorPass | quote }}
  POSTGRES_DB: in_falcone_vector
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: in-falcone-documentdb
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: documentdb
  annotations:
    "helm.sh/resource-policy": keep
stringData:
  POSTGRES_USER: {{ $docUser | quote }}
  POSTGRES_PASSWORD: {{ $docPass | quote }}
  POSTGRES_DB: {{ $docDb | quote }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: in-falcone-ferretdb
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: ferretdb
  annotations:
    "helm.sh/resource-policy": keep
stringData:
  postgresql-url: {{ printf "postgres://%s:%s@%s-documentdb:5432/postgres?sslmode=disable" $docUser $docPass .Release.Name | quote }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: in-falcone-documentdb-replication
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: documentdb
  annotations:
    "helm.sh/resource-policy": keep
stringData:
  password: {{ $replPass | quote }}
  realtime-url: {{ printf "postgres://falcone_cdc_repl:%s@%s-documentdb:5432/postgres?sslmode=disable" $replPass .Release.Name | quote }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: in-falcone-kafka
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: kafka
  annotations:
    "helm.sh/resource-policy": keep
stringData:
  KAFKA_CFG_NODE_ID: "0"
  KAFKA_CFG_PROCESS_ROLES: controller,broker
  KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
  KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@127.0.0.1:9093"
  KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
  KAFKA_CFG_ADVERTISED_LISTENERS: {{ printf "PLAINTEXT://%s-kafka:9092" .Release.Name | quote }}
  KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: in-falcone-keycloak-admin
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: keycloak
  annotations:
    "helm.sh/resource-policy": keep
stringData:
  username: {{ $kcUser | quote }}
  password: {{ $kcPass | quote }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: in-falcone-identity-client
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: keycloak
  annotations:
    "helm.sh/resource-policy": keep
stringData:
  KC_BOOTSTRAP_ADMIN_USERNAME: {{ $kcUser | quote }}
  KC_BOOTSTRAP_ADMIN_PASSWORD: {{ $kcPass | quote }}
  client-id: {{ $identityClientId | quote }}
  client-secret: {{ $identityClientSecret | quote }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: in-falcone-superadmin
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: bootstrap
  annotations:
    "helm.sh/resource-policy": keep
stringData:
  password: {{ $superPass | quote }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: in-falcone-apisix-admin
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: apisix
  annotations:
    "helm.sh/resource-policy": keep
stringData:
  admin-key: {{ $apisixAdminKey | quote }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: in-falcone-temporal
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: temporal
  annotations:
    "helm.sh/resource-policy": keep
stringData:
  username: {{ $temporalUser | quote }}
  password: {{ $temporalPass | quote }}
  database: temporal
  visibility-database: temporal_visibility
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: in-falcone-encryption
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: platform-encryption
  annotations:
    "helm.sh/resource-policy": keep
stringData:
  master-key: {{ $encryptionMasterKey | quote }}
