{{- /*
  Core platform credential bootstrap.

  This hook creates/adopts the Kubernetes Secrets that workloads and the OpenBao
  init job consume, but it never renders live credential values into Helm output.
  Existing keys are reused so upgrades and re-installs do not rotate credentials.
*/ -}}
{{- $containerSecurityContext := deepCopy (default (dict) .Values.bootstrap.job.securityContext) -}}
{{- if (.Values.global.podSecurity.openshiftRestricted | default false) -}}
  {{- $_ := unset $containerSecurityContext "runAsUser" -}}
  {{- $_ := unset $containerSecurityContext "runAsGroup" -}}
{{- end -}}
{{- $imagePullSecrets := list -}}
{{- range (default (list) .Values.global.imagePullSecrets) -}}
  {{- $imagePullSecrets = append $imagePullSecrets (.name | default .) -}}
{{- end -}}
{{- range (default (list) .Values.global.privateRegistry.pullSecretNames) -}}
  {{- $imagePullSecrets = append $imagePullSecrets . -}}
{{- end -}}
{{- $imagePullSecrets = $imagePullSecrets | uniq -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "in-falcone.fullname" . }}-credential-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "in-falcone.labels" . | nindent 4 }}
    app.kubernetes.io/component: credential-bootstrap
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-31"
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "in-falcone.fullname" . }}-credential-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "in-falcone.labels" . | nindent 4 }}
    app.kubernetes.io/component: credential-bootstrap
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-31"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "in-falcone.fullname" . }}-credential-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "in-falcone.labels" . | nindent 4 }}
    app.kubernetes.io/component: credential-bootstrap
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-31"
    "helm.sh/hook-delete-policy": before-hook-creation
subjects:
  - kind: ServiceAccount
    name: {{ include "in-falcone.fullname" . }}-credential-bootstrap
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "in-falcone.fullname" . }}-credential-bootstrap
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "in-falcone.fullname" . }}-credential-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "in-falcone.labels" . | nindent 4 }}
    app.kubernetes.io/component: credential-bootstrap
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "in-falcone.labels" . | nindent 8 }}
        app.kubernetes.io/component: credential-bootstrap
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "in-falcone.fullname" . }}-credential-bootstrap
      {{- if gt (len $imagePullSecrets) 0 }}
      imagePullSecrets:
        {{- range $imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- with .Values.bootstrap.job.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: credential-bootstrap
          image: "{{ include "component-wrapper.normalizeRepository" (dict "Values" .Values "repository" .Values.bootstrap.job.image.repository) }}:{{ .Values.bootstrap.job.image.tag }}"
          imagePullPolicy: {{ .Values.bootstrap.job.image.pullPolicy }}
          command: ["/bin/bash", "-ec"]
          env:
            - name: RELEASE_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: RELEASE_NAME
              value: {{ .Release.Name | quote }}
            - name: CHART_LABEL
              value: {{ printf "%s-%s" .Chart.Name .Chart.Version | quote }}
            - name: APP_NAME
              value: {{ include "in-falcone.name" . | quote }}
            - name: MANAGED_BY
              value: {{ .Release.Service | quote }}
            - name: S3_CREDS_SECRET
              value: {{ .Values.seaweedfsS3Creds.secretName | quote }}
            - name: S3_CONFIG_SECRET
              value: {{ .Values.seaweedfsS3Creds.configSecretName | quote }}
            - name: S3_IDENTITY_NAME
              value: {{ .Values.seaweedfsS3Creds.identityName | quote }}
            - name: GATEWAY_SHARED_SECRET_CREATE
              value: {{ ternary "true" "false" .Values.gatewaySharedSecret.create | quote }}
            - name: GATEWAY_SHARED_SECRET_NAME
              value: {{ .Values.gatewaySharedSecret.secretName | quote }}
            - name: GATEWAY_SHARED_SECRET_KEY
              value: {{ .Values.gatewaySharedSecret.secretKey | quote }}
          args:
            - |
              release_ns="${RELEASE_NAMESPACE}"
              work=/work

              secret_value() {
                local secret="$1" key="$2" raw
                raw="$(kubectl -n "$release_ns" get secret "$secret" -o json 2>/dev/null | jq -r --arg key "$key" '.data[$key] // empty')" || true
                if [ -n "$raw" ]; then
                  printf '%s' "$raw" | base64 -d
                fi
              }

              random_alnum() {
                LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom | head -c "$1"
              }

              existing_or_default() {
                local secret="$1" key="$2" default_value="$3" value
                value="$(secret_value "$secret" "$key")"
                if [ -n "$value" ]; then
                  printf '%s' "$value"
                else
                  printf '%s' "$default_value"
                fi
              }

              existing_or_random() {
                local secret="$1" key="$2" length="$3" value
                value="$(secret_value "$secret" "$key")"
                if [ -n "$value" ]; then
                  printf '%s' "$value"
                else
                  random_alnum "$length"
                fi
              }

              begin_secret() {
                secret_name="$1"
                secret_component="$2"
                secret_dir="${work}/${secret_name}"
                rm -rf "$secret_dir"
                mkdir -p "$secret_dir"
                secret_args=()
              }

              add_key() {
                local key="$1" value="$2"
                printf '%s' "$value" > "${secret_dir}/${key}"
                chmod 0400 "${secret_dir}/${key}"
                secret_args+=(--from-file="${key}=${secret_dir}/${key}")
              }

              apply_secret() {
                kubectl -n "$release_ns" create secret generic "$secret_name" \
                  "${secret_args[@]}" \
                  --dry-run=client -o yaml | kubectl apply -f - >/dev/null
                kubectl -n "$release_ns" label secret "$secret_name" \
                  "helm.sh/chart=${CHART_LABEL}" \
                  "app.kubernetes.io/name=${APP_NAME}" \
                  "app.kubernetes.io/instance=${RELEASE_NAME}" \
                  "app.kubernetes.io/managed-by=${MANAGED_BY}" \
                  "app.kubernetes.io/part-of=in-falcone" \
                  "app.kubernetes.io/component=${secret_component}" \
                  --overwrite >/dev/null
                kubectl -n "$release_ns" annotate secret "$secret_name" \
                  "helm.sh/resource-policy=keep" \
                  "meta.helm.sh/release-name=${RELEASE_NAME}" \
                  "meta.helm.sh/release-namespace=${RELEASE_NAMESPACE}" \
                  --overwrite >/dev/null
              }

              extract_s3_config_key() {
                local field="$1" raw
                raw="$(kubectl -n "$release_ns" get secret "$S3_CONFIG_SECRET" -o json 2>/dev/null | jq -r '.data.seaweedfs_s3_config // empty')" || true
                if [ -n "$raw" ]; then
                  printf '%s' "$raw" | base64 -d | jq -r --arg identity "$S3_IDENTITY_NAME" --arg field "$field" \
                    '.identities[]? | select(.name == $identity) | .credentials[0][$field] // empty' | head -n1
                fi
              }

              pg_user="$(existing_or_default in-falcone-postgresql POSTGRESQL_USERNAME falcone)"
              pg_pass="$(existing_or_random in-falcone-postgresql POSTGRESQL_PASSWORD 48)"
              pg_super_pass="$(existing_or_random in-falcone-postgresql POSTGRESQL_POSTGRES_PASSWORD 48)"
              begin_secret in-falcone-postgresql postgresql
              add_key POSTGRESQL_USERNAME "$pg_user"
              add_key POSTGRESQL_PASSWORD "$pg_pass"
              add_key POSTGRESQL_POSTGRES_PASSWORD "$pg_super_pass"
              apply_secret

              pg_vector_user="$(existing_or_default in-falcone-postgresql-vector POSTGRES_USER falcone_vector_admin)"
              pg_vector_pass="$(existing_or_random in-falcone-postgresql-vector POSTGRES_PASSWORD 48)"
              pg_vector_db="$(existing_or_default in-falcone-postgresql-vector POSTGRES_DB in_falcone_vector)"
              begin_secret in-falcone-postgresql-vector postgresql-vector
              add_key POSTGRES_USER "$pg_vector_user"
              add_key POSTGRES_PASSWORD "$pg_vector_pass"
              add_key POSTGRES_DB "$pg_vector_db"
              apply_secret

              doc_user="$(existing_or_default in-falcone-documentdb POSTGRES_USER falcone_doc_admin)"
              doc_pass="$(existing_or_random in-falcone-documentdb POSTGRES_PASSWORD 48)"
              doc_db="$(existing_or_default in-falcone-documentdb POSTGRES_DB in_falcone)"
              begin_secret in-falcone-documentdb documentdb
              add_key POSTGRES_USER "$doc_user"
              add_key POSTGRES_PASSWORD "$doc_pass"
              add_key POSTGRES_DB "$doc_db"
              apply_secret

              ferretdb_url="$(secret_value in-falcone-ferretdb postgresql-url)"
              if [ -z "$ferretdb_url" ]; then
                ferretdb_url="postgres://${doc_user}:${doc_pass}@${RELEASE_NAME}-documentdb:5432/postgres?sslmode=disable"
              fi
              begin_secret in-falcone-ferretdb ferretdb
              add_key postgresql-url "$ferretdb_url"
              apply_secret

              repl_pass="$(existing_or_random in-falcone-documentdb-replication password 48)"
              repl_url="$(secret_value in-falcone-documentdb-replication realtime-url)"
              if [ -z "$repl_url" ]; then
                repl_url="postgres://falcone_cdc_repl:${repl_pass}@${RELEASE_NAME}-documentdb:5432/postgres?sslmode=disable"
              fi
              begin_secret in-falcone-documentdb-replication documentdb
              add_key password "$repl_pass"
              add_key realtime-url "$repl_url"
              apply_secret

              begin_secret in-falcone-kafka kafka
              add_key KAFKA_CFG_NODE_ID "$(existing_or_default in-falcone-kafka KAFKA_CFG_NODE_ID 0)"
              add_key KAFKA_CFG_PROCESS_ROLES "$(existing_or_default in-falcone-kafka KAFKA_CFG_PROCESS_ROLES controller,broker)"
              add_key KAFKA_CFG_CONTROLLER_LISTENER_NAMES "$(existing_or_default in-falcone-kafka KAFKA_CFG_CONTROLLER_LISTENER_NAMES CONTROLLER)"
              add_key KAFKA_CFG_CONTROLLER_QUORUM_VOTERS "$(existing_or_default in-falcone-kafka KAFKA_CFG_CONTROLLER_QUORUM_VOTERS 0@127.0.0.1:9093)"
              add_key KAFKA_CFG_LISTENERS "$(existing_or_default in-falcone-kafka KAFKA_CFG_LISTENERS PLAINTEXT://:9092,CONTROLLER://:9093)"
              add_key KAFKA_CFG_ADVERTISED_LISTENERS "$(existing_or_default in-falcone-kafka KAFKA_CFG_ADVERTISED_LISTENERS PLAINTEXT://${RELEASE_NAME}-kafka:9092)"
              add_key KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP "$(existing_or_default in-falcone-kafka KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT)"
              apply_secret

              s3_access="$(secret_value "$S3_CREDS_SECRET" s3AccessKey)"
              [ -n "$s3_access" ] || s3_access="$(secret_value in-falcone-storage s3_access_key)"
              [ -n "$s3_access" ] || s3_access="$(extract_s3_config_key accessKey)"
              [ -n "$s3_access" ] || s3_access="$(random_alnum 20)"
              s3_secret="$(secret_value "$S3_CREDS_SECRET" s3SecretKey)"
              [ -n "$s3_secret" ] || s3_secret="$(secret_value in-falcone-storage s3_secret_key)"
              [ -n "$s3_secret" ] || s3_secret="$(extract_s3_config_key secretKey)"
              [ -n "$s3_secret" ] || s3_secret="$(random_alnum 40)"
              begin_secret "$S3_CREDS_SECRET" seaweedfs-s3
              add_key s3AccessKey "$s3_access"
              add_key s3SecretKey "$s3_secret"
              add_key adminAccessKey "$(existing_or_default "$S3_CREDS_SECRET" adminAccessKey "$s3_access")"
              add_key adminSecretKey "$(existing_or_default "$S3_CREDS_SECRET" adminSecretKey "$s3_secret")"
              apply_secret

              jq -cn --arg identity "$S3_IDENTITY_NAME" --arg access "$s3_access" --arg secret "$s3_secret" \
                '{identities:[{name:$identity,credentials:[{accessKey:$access,secretKey:$secret}],actions:["Admin","Read","Write","List","Tagging"]}]}' \
                > "${work}/seaweedfs_s3_config"
              begin_secret "$S3_CONFIG_SECRET" seaweedfs-s3
              add_key seaweedfs_s3_config "$(cat "${work}/seaweedfs_s3_config")"
              apply_secret

              begin_secret in-falcone-storage storage
              add_key s3_access_key "$s3_access"
              add_key s3_secret_key "$s3_secret"
              apply_secret

              seaweed_db_secret="${RELEASE_NAME}-seaweedfs-db-secret"
              begin_secret "$seaweed_db_secret" seaweedfs
              add_key user "$(existing_or_default "$seaweed_db_secret" user YourSWUser)"
              add_key password "$(existing_or_random "$seaweed_db_secret" password 32)"
              apply_secret

              kc_user="$(existing_or_default in-falcone-keycloak-admin username admin)"
              kc_pass="$(existing_or_random in-falcone-keycloak-admin password 48)"
              begin_secret in-falcone-keycloak-admin keycloak
              add_key username "$kc_user"
              add_key password "$kc_pass"
              apply_secret

              identity_client_id="$(existing_or_default in-falcone-identity-client client-id in-falcone-gateway)"
              identity_client_secret="$(existing_or_random in-falcone-identity-client client-secret 48)"
              begin_secret in-falcone-identity-client keycloak
              add_key KC_BOOTSTRAP_ADMIN_USERNAME "$(existing_or_default in-falcone-identity-client KC_BOOTSTRAP_ADMIN_USERNAME "$kc_user")"
              add_key KC_BOOTSTRAP_ADMIN_PASSWORD "$(existing_or_default in-falcone-identity-client KC_BOOTSTRAP_ADMIN_PASSWORD "$kc_pass")"
              add_key client-id "$identity_client_id"
              add_key client-secret "$identity_client_secret"
              apply_secret

              begin_secret in-falcone-superadmin bootstrap
              add_key password "$(existing_or_random in-falcone-superadmin password 48)"
              apply_secret

              begin_secret in-falcone-apisix-admin apisix
              add_key admin-key "$(existing_or_random in-falcone-apisix-admin admin-key 48)"
              apply_secret

              if [ "$GATEWAY_SHARED_SECRET_CREATE" = "true" ]; then
                begin_secret "$GATEWAY_SHARED_SECRET_NAME" gateway
                add_key "$GATEWAY_SHARED_SECRET_KEY" "$(existing_or_random "$GATEWAY_SHARED_SECRET_NAME" "$GATEWAY_SHARED_SECRET_KEY" 48)"
                apply_secret
              fi

              begin_secret in-falcone-temporal temporal
              add_key username "$(existing_or_default in-falcone-temporal username temporal)"
              add_key password "$(existing_or_random in-falcone-temporal password 48)"
              add_key database "$(existing_or_default in-falcone-temporal database temporal)"
              add_key visibility-database "$(existing_or_default in-falcone-temporal visibility-database temporal_visibility)"
              apply_secret

              begin_secret in-falcone-encryption platform-encryption
              add_key master-key "$(existing_or_random in-falcone-encryption master-key 64)"
              apply_secret

              echo "platform credential Secrets converged"
          volumeMounts:
            - name: work
              mountPath: /work
            - name: tmp
              mountPath: /tmp
          {{- with .Values.bootstrap.job.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: work
          emptyDir:
            medium: Memory
        - name: tmp
          emptyDir: {}
