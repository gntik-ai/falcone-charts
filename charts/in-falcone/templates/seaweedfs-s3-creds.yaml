{{- /*
  SeaweedFS S3 gateway credentials (add-seaweedfs-deployment, design D7;
  scoping hardened by add-seaweedfs-per-tenant-identities, #553).

  Two chart-created Secrets, sharing ONE generated access/secret-key pair:

    1. {{ .Values.seaweedfsS3Creds.secretName }}
       Human/consumer-facing keys `s3AccessKey` / `s3SecretKey`. This is the
       Secret storage consumers reference. Wire it to the provider-neutral
       STORAGE_S3_ACCESS_KEY / STORAGE_S3_SECRET_KEY env names (#434).

    2. {{ .Values.seaweedfsS3Creds.configSecretName }}
       The SeaweedFS identities JSON (key `seaweedfs_s3_config`) that the S3
       gateway loads via `-s3.config` (wired through
       seaweedfs.s3.existingConfigSecret). Built from the SAME generated values
       so the gateway authenticates with the chart-created credentials.

  TENANT ISOLATION (#553, partial — model + scaffolding). This identity is the
  TRUSTED INTERNAL backend key (also the control-plane's STORAGE_S3_* credential),
  so it retains broad bucket management and is never handed to tenants. The
  tenant-FACING isolation is the per-workspace scoped identities built by
  services/adapters/src/seaweedfs-s3-identities-config.mjs (deriveWorkspaceBucketName
  + buildSeaweedFSIdentitiesConfig) and onboarded via the admin endpoint wired
  below (seaweedfs-iam-client.mjs). Issuing those per-workspace credentials at
  runtime and RETIRING this master key — the full closure of the live 2026-06-18
  breach (single global root identity) — is the cutover tracked under
  epic-seaweedfs-migration (#430); confining this key here would break the storage
  REST API for every tenant bucket, so it is intentionally NOT confined yet.

  STABLE ACROSS RE-INSTALLS: the values are generated once with randAlphaNum and
  then re-read on every subsequent render via `lookup`, so upgrades/re-installs
  do NOT rotate the credentials. The Secrets also carry
  helm.sh/resource-policy: keep so an accidental uninstall does not drop them.
*/ -}}
{{- $ns := .Release.Namespace -}}
{{- $credsName := .Values.seaweedfsS3Creds.secretName -}}
{{- $configName := .Values.seaweedfsS3Creds.configSecretName -}}
{{- $identityName := .Values.seaweedfsS3Creds.identityName -}}
{{- $platformPrefix := .Values.seaweedfsS3Creds.platformBucketPrefix | default "falcone-platform-" -}}
{{- $platformBucket := printf "%ssystem" $platformPrefix -}}
{{- /* Regeneration guard: reuse existing values when the Secret already exists. */ -}}
{{- $existing := lookup "v1" "Secret" $ns $credsName -}}
{{- $accessKey := "" -}}
{{- $secretKey := "" -}}
{{- if and $existing $existing.data -}}
  {{- $accessKey = index $existing.data "s3AccessKey" | b64dec -}}
  {{- $secretKey = index $existing.data "s3SecretKey" | b64dec -}}
{{- end -}}
{{- if not $accessKey -}}
  {{- $accessKey = randAlphaNum 20 -}}
{{- end -}}
{{- if not $secretKey -}}
  {{- $secretKey = randAlphaNum 40 -}}
{{- end -}}
{{- /*
  Per-bucket-scoped admin actions: `Action:bucket` for each {Admin,Read,Write,
  List,Tagging} × each reserved platform bucket. A bare global action (no
  `:bucket` suffix) would re-open the cross-tenant breach, so it is never
  emitted. Mirrors services/adapters/src/seaweedfs-s3-identities-config.mjs ::
  buildSeaweedFSIdentitiesConfig (and seaweedfs-iam-client buildSeaweedFSIdentity).
*/ -}}
{{- /*
  TRUSTED BACKEND SERVICE IDENTITY. This identity's keys are also wired to the
  control-plane's STORAGE_S3_ACCESS_KEY/SECRET (it provisions and serves every
  tenant's bucket behind the ALREADY tenant-gated storage REST API), so it MUST
  retain broad bucket management — confining it to the reserved platform prefix
  would break createBucket/put/get for all `t-…` tenant buckets. It is an internal
  service key, never handed to tenants. The tenant-FACING credentials are the
  per-workspace scoped identities (deriveWorkspaceBucketName +
  buildSeaweedFSIdentitiesConfig in services/adapters/src/seaweedfs-s3-identities-config.mjs,
  onboarded via the admin endpoint); issuing those at runtime and RETIRING this
  master key is the live cutover tracked under epic-seaweedfs-migration (#430).
*/ -}}
{{- $adminActions := list "Admin" "Read" "Write" "List" "Tagging" -}}
{{- $identities := dict "identities" (list (dict
      "name" $identityName
      "credentials" (list (dict "accessKey" $accessKey "secretKey" $secretKey))
      "actions" $adminActions)) -}}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ $credsName }}
  namespace: {{ $ns }}
  labels:
    {{- include "in-falcone.labels" . | nindent 4 }}
    app.kubernetes.io/component: seaweedfs-s3
  annotations:
    "helm.sh/resource-policy": keep
stringData:
  s3AccessKey: {{ $accessKey | quote }}
  s3SecretKey: {{ $secretKey | quote }}
  # Admin keys the runtime IAM client (seaweedfs-iam-client.mjs) signs per-tenant
  # identity writes with. Same generated pair; named for the SEAWEEDFS_ADMIN_*
  # env contract so per-workspace identity onboarding (#553) can be wired by
  # secretKeyRef without exposing a second credential.
  adminAccessKey: {{ $accessKey | quote }}
  adminSecretKey: {{ $secretKey | quote }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ $configName }}
  namespace: {{ $ns }}
  labels:
    {{- include "in-falcone.labels" . | nindent 4 }}
    app.kubernetes.io/component: seaweedfs-s3
  annotations:
    "helm.sh/resource-policy": keep
stringData:
  seaweedfs_s3_config: {{ toJson $identities | quote }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: in-falcone-storage
  namespace: {{ $ns }}
  labels:
    {{- include "in-falcone.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
  annotations:
    "helm.sh/resource-policy": keep
stringData:
  s3_access_key: {{ $accessKey | quote }}
  s3_secret_key: {{ $secretKey | quote }}
