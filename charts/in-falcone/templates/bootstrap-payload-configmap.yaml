{{- if .Values.bootstrap.enabled }}
{{- /* Brute-force detection (#668): `realm.bruteForce` is authored as a nested sub-block (so it can
       carry comments + a single source of truth), but Keycloak's RealmRepresentation expects the
       fields at the TOP level. Build the realm-create payload by lifting the bruteForce fields onto
       the realm dict and dropping the nested key, then render. Also emit a standalone partial realm
       rep `brute-force.json` for the idempotent ensure step (which retrofits an already-created
       realm). */ -}}
{{- $realm := omit .Values.bootstrap.oneShot.keycloak.realm "bruteForce" -}}
{{- $bruteForce := .Values.bootstrap.oneShot.keycloak.realm.bruteForce | default dict -}}
{{- $realmPayload := merge (deepCopy $realm) $bruteForce -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "in-falcone.bootstrapPayloadConfigMapName" . }}
  labels:
    {{- include "in-falcone.labels" . | nindent 4 }}
    in-falcone.io/bootstrap-phase: payload
    in-falcone.io/reconcile-scope: upgrade-safe
    in-falcone.io/component: bootstrap
    in-falcone.io/managed-lifecycle: reconcile
  annotations:
    in-falcone.io/bootstrap-one-shot-hash: {{ include "in-falcone.bootstrapOneShotHash" . | quote }}
data:
  realm.json: |
{{ toPrettyJson $realmPayload | nindent 4 }}
{{- /* Minimal partial RealmRepresentation (#668): `realm` is required so KC resolves the target;
       the remaining fields are the brute-force knobs. KC's realm PUT merges provided fields, so the
       idempotent ensure step retrofits brute-force onto an existing realm without disturbing its
       clients/roles/user-profile. */}}
{{- if $bruteForce }}
  brute-force.json: |
{{ toPrettyJson (merge (dict "realm" $realm.realm) $bruteForce) | nindent 4 }}
{{- end }}
{{- if .Values.bootstrap.oneShot.keycloak.userProfile }}
  user-profile.json: |
{{ toPrettyJson .Values.bootstrap.oneShot.keycloak.userProfile | nindent 4 }}
{{- end }}
  superadmin.json: |
{{ toPrettyJson .Values.bootstrap.oneShot.keycloak.superadmin | nindent 4 }}
  tenant-realm-template.json: |
{{ toPrettyJson .Values.bootstrap.oneShot.keycloak.tenantRealmTemplate | nindent 4 }}
{{- range .Values.bootstrap.oneShot.keycloak.realmRoles }}
  role-{{ . }}.json: |
{{ toPrettyJson (dict "name" .) | nindent 4 }}
{{- end }}
{{- range .Values.bootstrap.oneShot.keycloak.clientScopes }}
  client-scope-{{ .name }}.json: |
{{ toPrettyJson . | nindent 4 }}
{{- end }}
{{- range .Values.bootstrap.oneShot.keycloak.clients }}
  client-{{ .clientId }}.json: |
{{ toPrettyJson . | nindent 4 }}
{{- end }}
  governance-plans.json: |
{{ toPrettyJson .Values.bootstrap.oneShot.governanceCatalog.plans | nindent 4 }}
  governance-quota-policies.json: |
{{ toPrettyJson .Values.bootstrap.oneShot.governanceCatalog.quotaPolicies | nindent 4 }}
  governance-deployment-profiles.json: |
{{ toPrettyJson .Values.bootstrap.oneShot.governanceCatalog.deploymentProfiles | nindent 4 }}
  internal-namespaces.json: |
{{ toPrettyJson .Values.bootstrap.oneShot.internalNamespaces | nindent 4 }}
{{- $mode := .Values.gatewayPolicy.passthrough.mode -}}
{{- range .Values.bootstrap.reconcile.apisix.routes }}
{{- /* requiresExecutor routes (api-key auth) only exist when the executor is enabled —
       only the executor verifies anon/service keys; the control-plane cannot. */ -}}
{{- if and (or (not (hasKey . "enabledInModes")) (has $mode .enabledInModes)) (or (not .upstream.requiresExecutor) ($.Values.controlPlaneExecutor).enabled) }}
{{- /* Data-plane routes (upstream.dataPlane: true) go to the dedicated control-plane
       executor when it is enabled; otherwise they stay on the default control-plane. */ -}}
{{- $upstreamComponent := .upstream.component -}}
{{- if and (.upstream.dataPlane) ($.Values.controlPlaneExecutor).enabled -}}
{{- $upstreamComponent = "controlPlaneExecutor" -}}
{{- end -}}
{{- $routeBody := dict "name" .name "priority" .priority "uri" .uri "upstream" (dict "type" "roundrobin" "nodes" (dict (printf "%s.%s.svc.cluster.local:%v" (include "in-falcone.componentServiceNameByAlias" (dict "root" $ "component" $upstreamComponent "serviceName" (.upstream.serviceName | default ""))) $.Release.Namespace .upstream.port) 1)) -}}
{{- $familyId := "" -}}
{{- $passthroughId := "" -}}
{{- if .labels -}}
  {{- $familyId = (index .labels "gateway.in-falcone.io/family" | default "") -}}
  {{- $passthroughId = (index .labels "gateway.in-falcone.io/passthrough-id" | default "") -}}
{{- end -}}
{{- $qosProfileName := "" -}}
{{- $validationProfileName := "" -}}
{{- if $familyId -}}
  {{- $familyPolicy := (index $.Values.gatewayPolicy.familyPolicies $familyId | default (dict)) -}}
  {{- $qosProfileName = ($familyPolicy.qosProfile | default "") -}}
  {{- $validationProfileName = ($familyPolicy.requestValidationProfile | default "") -}}
{{- end -}}
{{- if $passthroughId -}}
  {{- range $.Values.gatewayPolicy.passthrough.routes -}}
    {{- if eq .id $passthroughId -}}
      {{- $qosProfileName = (.qosProfile | default $qosProfileName) -}}
      {{- $validationProfileName = (.requestValidationProfile | default $validationProfileName) -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
{{- $qosProfile := (index $.Values.gatewayPolicy.qos.profiles $qosProfileName | default (dict)) -}}
{{- $timeoutProfile := (index $.Values.gatewayPolicy.qos.timeoutProfiles ($qosProfile.timeoutProfile | default "") | default (dict)) -}}
{{- $retryProfile := (index $.Values.gatewayPolicy.qos.retryProfiles ($qosProfile.retryProfile | default "") | default (dict)) -}}
{{- $validationProfile := (index $.Values.gatewayPolicy.requestValidation.profiles $validationProfileName | default (dict)) -}}
{{- if .methods }}{{- $_ := set $routeBody "methods" .methods -}}{{- end }}
{{- if .enableWebsocket }}{{- $_ := set $routeBody "enable_websocket" true -}}{{- end }}
{{- if .labels }}{{- $_ := set $routeBody "labels" .labels -}}{{- end }}
{{- if .vars }}{{- $_ := set $routeBody "vars" .vars -}}{{- end }}
{{- if $qosProfileName }}
{{- $_ := set (index $routeBody "upstream") "retries" ($retryProfile.retries | default 0) -}}
{{- $_ := set (index $routeBody "upstream") "timeout" (dict
  "connect" ($timeoutProfile.connectSeconds | default 3)
  "send" ($timeoutProfile.sendSeconds | default 15)
  "read" ($timeoutProfile.readSeconds | default 20)
) -}}
{{- end }}
{{- /* SSE routes (upstream.sse) hold a long-lived stream — use a long read/send timeout
       so the gateway does not cut the connection. */ -}}
{{- if .upstream.sse }}
{{- $_ := set (index $routeBody "upstream") "timeout" (dict "connect" 5 "send" 3600 "read" 3600) -}}
{{- end }}
{{- if .plugins }}
{{- $plugins := fromJson (toJson .plugins) -}}
{{- if hasKey $plugins "openid-connect" }}
{{- $oidc := index $plugins "openid-connect" -}}
{{- $_ := set $oidc "discovery" $.Values.gatewayPolicy.oidc.discoveryUrl -}}
{{- $_ := set $oidc "client_id" $.Values.gatewayPolicy.oidc.clientId -}}
{{- $_ := set $oidc "bearer_only" $.Values.gatewayPolicy.oidc.bearerOnly -}}
{{- $_ := set $oidc "realm" $.Values.gatewayPolicy.oidc.realm -}}
{{- $_ := set $oidc "ssl_verify" $.Values.gatewayPolicy.oidc.sslVerify -}}
{{- end }}
{{- if hasKey $plugins "cors" }}
{{- $cors := index $plugins "cors" -}}
{{- $_ := set $cors "allow_origins" (join "," $.Values.gatewayPolicy.cors.allowOrigins) -}}
{{- $_ := set $cors "allow_methods" (join "," $.Values.gatewayPolicy.cors.allowMethods) -}}
{{- $_ := set $cors "allow_headers" (join "," $.Values.gatewayPolicy.cors.allowHeaders) -}}
{{- $_ := set $cors "expose_headers" (join "," $.Values.gatewayPolicy.cors.exposeHeaders) -}}
{{- $_ := set $cors "allow_credential" $.Values.gatewayPolicy.cors.allowCredentials -}}
{{- $_ := set $cors "max_age" $.Values.gatewayPolicy.cors.maxAgeSeconds -}}
{{- end }}
{{- /* Executor (api-key) routes carry their own limit-count keyed by the apikey header —
       the per-tenant qos override (keyed by x-tenant-id, absent on the no-JWT api-key path)
       must NOT clobber it. */ -}}
{{- if and $qosProfileName (hasKey $plugins "limit-count") (not .upstream.requiresExecutor) }}
{{- /* Static requestsPerMinute is the grace-period floor (limitCeiling: max_of_plan_and_static);
       the scope-enforcement plugin raises it to the resolved per-tenant plan quota at runtime. */ -}}
{{- $_ := set (index $plugins "limit-count") "count" ($qosProfile.requestsPerMinute | default 60) -}}
{{- $_ := set (index $plugins "limit-count") "time_window" 60 -}}
{{- $_ := set (index $plugins "limit-count") "rejected_code" 429 -}}
{{- /* Partition the rate-limit counter per tenant (and per workspace for workspace-bound
       families) using the qosProfile limitKeyType/limitKeyVar; fall back to the per-tenant var. */ -}}
{{- $_ := set (index $plugins "limit-count") "key_type" ($qosProfile.limitKeyType | default "var") -}}
{{- $_ := set (index $plugins "limit-count") "key" ($qosProfile.limitKeyVar | default "$http_x_tenant_id") -}}
{{- $_ := set (index $plugins "limit-count") "allow_degradation" false -}}
{{- end }}
{{- /* Rate-limit storage policy (gatewayPolicy.rateLimit): "local" (default, per-gateway-node
       counters) or "redis" (counters shared across all gateway replicas → globally exact
       limits). Applies to EVERY limit-count (JWT family routes + executor api-key/realtime). */ -}}
{{- if hasKey $plugins "limit-count" }}
{{- $rl := ($.Values.gatewayPolicy.rateLimit | default (dict)) -}}
{{- $_ := set (index $plugins "limit-count") "policy" ($rl.policy | default "local") -}}
{{- if eq ($rl.policy | default "local") "redis" }}
{{- $redis := ($rl.redis | default (dict)) -}}
{{- $_ := set (index $plugins "limit-count") "redis_host" $redis.host -}}
{{- $_ := set (index $plugins "limit-count") "redis_port" ($redis.port | default 6379) -}}
{{- $_ := set (index $plugins "limit-count") "redis_database" ($redis.database | default 0) -}}
{{- $_ := set (index $plugins "limit-count") "redis_timeout" ($redis.timeoutMs | default 1000) -}}
{{- end }}
{{- end }}
{{- if and $validationProfileName (hasKey $plugins "client-control") }}
{{- $_ := set (index $plugins "client-control") "max_body_size" ($validationProfile.maxBodyBytes | default 262144) -}}
{{- end }}
{{- if hasKey $plugins "request-validation" }}
{{- $requiredHeaders := $.Values.gatewayPolicy.claimsPropagation.requiredRequestHeaders -}}
{{- $schemaProps := dict -}}
{{- range $requiredHeaders }}{{- $_ := set $schemaProps . (dict "type" "string") -}}{{- end }}
{{- $_ := set $schemaProps "X-API-Version" (dict "type" "string" "pattern" (printf "^%s$" $.Values.gatewayPolicy.version)) -}}
{{- $_ := set $schemaProps $.Values.gatewayPolicy.correlation.headerName (dict "type" "string" "pattern" $.Values.gatewayPolicy.correlation.tokenPattern) -}}
{{- $_ := set $schemaProps $.Values.gatewayPolicy.idempotency.headerName (dict "type" "string" "pattern" $.Values.gatewayPolicy.idempotency.keyPattern) -}}
{{- if gt (len ($validationProfile.allowedContentTypes | default (list))) 0 }}
{{- $_ := set $schemaProps "Content-Type" (dict "type" "string" "pattern" (printf "^(%s)(;.*)?$" (join "|" ($validationProfile.allowedContentTypes | default (list)))) ) -}}
{{- end }}
{{- if $validationProfile.rejectSpoofedContextHeaders }}
{{- range $.Values.gatewayPolicy.requestValidation.spoofedHeaders }}{{- $_ := set $schemaProps . (dict "type" "string" "maxLength" 0) -}}{{- end }}
{{- end }}
{{- $_ := set (index $plugins "request-validation") "header_schema" (dict "type" "object" "required" $requiredHeaders "properties" $schemaProps) -}}
{{- end }}
{{- if hasKey $plugins "proxy-rewrite" }}
{{- $_ := set (index $plugins "proxy-rewrite") "headers" (dict
  "X-Gateway-Managed-Route" "true"
  $.Values.gatewayPolicy.correlation.headerName (printf "$http_%s" (lower (replace "-" "_" $.Values.gatewayPolicy.correlation.headerName)))
  $.Values.gatewayPolicy.correlation.requestIdHeader "$request_id"
  $.Values.gatewayPolicy.correlation.internalModeHeader $.Values.gatewayPolicy.internalRequests.mode
  $.Values.gatewayPolicy.correlation.internalTimestampHeader "$time_iso8601"
  $.Values.gatewayPolicy.idempotency.headerName "$http_idempotency_key"
  $.Values.gatewayPolicy.claimsPropagation.headers.subject "$jwt_claim_sub"
  $.Values.gatewayPolicy.claimsPropagation.headers.username "$jwt_claim_preferred_username"
  $.Values.gatewayPolicy.claimsPropagation.headers.tenantId "$jwt_claim_tenant_id"
  $.Values.gatewayPolicy.claimsPropagation.headers.workspaceId "$jwt_claim_workspace_id"
  $.Values.gatewayPolicy.claimsPropagation.headers.planId "$jwt_claim_plan_id"
  $.Values.gatewayPolicy.claimsPropagation.headers.scopes "$jwt_claim_scope"
  $.Values.gatewayPolicy.claimsPropagation.headers.roles "$jwt_claim_realm_access_roles"
) -}}
{{- end }}
{{- if hasKey $plugins "authz-keycloak" }}
{{- $authz := index $plugins "authz-keycloak" -}}
{{- $_ := set $authz "discovery" $.Values.gatewayPolicy.oidc.discoveryUrl -}}
{{- $_ := set $authz "client_id" $.Values.gatewayPolicy.oidc.clientId -}}
{{- end }}
{{- if hasKey $plugins "http-logger" }}
{{- $_ := set (index $plugins "http-logger") "uri" (printf "http://%s.%s.svc.cluster.local:%v/control-plane/internal/audit/gateway-passthrough" (include "in-falcone.componentServiceNameByAlias" (dict "root" $ "component" "controlPlane" "serviceName" "")) $.Release.Namespace $.Values.controlPlane.service.port) -}}
{{- end }}
{{- $_ := set $routeBody "plugins" $plugins -}}
{{- end }}
  route-{{ .routeId }}.json: |
{{ toPrettyJson $routeBody | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
