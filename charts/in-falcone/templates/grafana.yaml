{{- /*
  Grafana (add-falcone-metrics-scrape-and-dashboards, #499) — none was deployed, so the platform
  shipped 0 dashboards. This stands up Grafana with a provisioned Prometheus datasource (the
  observability service) and Falcone dashboards (platform overview + per-tenant), built on the
  falcone_* HTTP metrics the control-plane/executor now expose.
*/}}
{{- $fullname := .Release.Name -}}
{{- $ns := .Release.Namespace -}}
{{- $promUrl := printf "http://%s.%s.svc.cluster.local:%v" (include "in-falcone.componentServiceNameByAlias" (dict "root" . "component" "observability")) $ns (.Values.observability.service.port | default 9090) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-grafana-provisioning
  labels: {{- include "in-falcone.labels" . | nindent 4 }}
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: {{ $promUrl }}
        isDefault: true
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: falcone
        orgId: 1
        folder: Falcone
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-grafana-dashboards
  labels: {{- include "in-falcone.labels" . | nindent 4 }}
data:
  falcone-platform-overview.json: |
    {
      "uid": "falcone-platform", "title": "Falcone — Platform Overview", "schemaVersion": 39, "version": 1,
      "time": {"from": "now-6h", "to": "now"}, "refresh": "30s",
      "panels": [
        {"id": 1, "title": "Request rate (req/s) by component", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
         "targets": [{"expr": "sum by (component) (rate(falcone_http_requests_total[5m]))", "legendFormat": "{{`{{component}}`}}"}]},
        {"id": 2, "title": "Error rate (5xx, req/s)", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
         "targets": [{"expr": "sum(rate(falcone_http_requests_total{status=~\"5..\"}[5m]))", "legendFormat": "5xx"}]},
        {"id": 3, "title": "p95 latency (s) by route", "type": "timeseries", "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8},
         "targets": [{"expr": "histogram_quantile(0.95, sum by (le, route) (rate(falcone_http_request_duration_seconds_bucket[5m])))", "legendFormat": "{{`{{route}}`}}"}]}
      ]
    }
  falcone-per-tenant.json: |
    {
      "uid": "falcone-tenant", "title": "Falcone — Per-Tenant", "schemaVersion": 39, "version": 1,
      "time": {"from": "now-6h", "to": "now"}, "refresh": "30s",
      "templating": {"list": [{"name": "tenant_id", "type": "query", "datasource": "Prometheus",
        "query": "label_values(falcone_http_requests_total, tenant_id)", "refresh": 2}]},
      "panels": [
        {"id": 1, "title": "Request rate (req/s) — $tenant_id", "type": "timeseries", "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0},
         "targets": [{"expr": "sum(rate(falcone_http_requests_total{tenant_id=\"$tenant_id\"}[5m]))", "legendFormat": "req/s"}]}
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-grafana
  labels: {{- include "in-falcone.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: grafana, app.kubernetes.io/instance: {{ .Release.Name }}}
  template:
    metadata:
      labels: {app.kubernetes.io/name: grafana, app.kubernetes.io/instance: {{ .Release.Name }}}
    spec:
      {{- include "in-falcone.imagePullSecrets" . | nindent 6 }}
      securityContext: {{- toYaml .Values.grafana.podSecurityContext | nindent 8 }}
      containers:
        - name: grafana
          image: {{ include "in-falcone.imageNameWithTag" (dict "root" . "image" .Values.grafana.image) | quote }}
          imagePullPolicy: {{ .Values.grafana.image.pullPolicy | default "IfNotPresent" }}
          securityContext: {{- toYaml .Values.grafana.securityContext | nindent 12 }}
          ports: [{name: http, containerPort: 3000}]
          env:
            - {name: GF_AUTH_ANONYMOUS_ENABLED, value: "true"}
            - {name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: "Viewer"}
            - {name: GF_SECURITY_ALLOW_EMBEDDING, value: "true"}
            - {name: GF_USERS_DEFAULT_THEME, value: "light"}
          readinessProbe: {httpGet: {path: /api/health, port: http}, initialDelaySeconds: 10, periodSeconds: 10}
          resources: {{- toYaml .Values.grafana.resources | nindent 12 }}
          volumeMounts:
            - {name: provisioning-datasources, mountPath: /etc/grafana/provisioning/datasources}
            - {name: provisioning-dashboards, mountPath: /etc/grafana/provisioning/dashboards}
            - {name: dashboards, mountPath: /var/lib/grafana/dashboards}
      volumes:
        - name: provisioning-datasources
          configMap: {name: {{ $fullname }}-grafana-provisioning, items: [{key: datasource.yaml, path: datasource.yaml}]}
        - name: provisioning-dashboards
          configMap: {name: {{ $fullname }}-grafana-provisioning, items: [{key: dashboards.yaml, path: dashboards.yaml}]}
        - name: dashboards
          configMap: {name: {{ $fullname }}-grafana-dashboards}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-grafana
  labels: {{- include "in-falcone.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {app.kubernetes.io/name: grafana, app.kubernetes.io/instance: {{ .Release.Name }}}
  ports: [{name: http, port: 3000, targetPort: http}]
