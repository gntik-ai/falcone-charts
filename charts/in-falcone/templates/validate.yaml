{{- define "in-falcone.validate" -}}
{{- $components := list "apisix" "keycloak" "postgresql" "mongodb" "kafka" "openwhisk" "storage" "observability" "controlPlane" "webConsole" -}}
{{- $supportedExposureKinds := list "Ingress" "LoadBalancer" "Route" -}}
{{- range $components }}
  {{- $component := index $.Values . -}}
  {{- if and $component.enabled (not $component.image.repository) -}}
    {{- fail (printf "%s.image.repository is required when the component is enabled" .) -}}
  {{- end -}}
  {{- if and $component.enabled $component.persistence.enabled (not $component.persistence.existingClaim) (not $component.persistence.size) -}}
    {{- fail (printf "%s.persistence.size is required when persistence is enabled without existingClaim" .) -}}
  {{- end -}}
{{- end -}}
{{- if and .Values.global.airgap.enabled (not .Values.global.privateRegistry.registry) -}}
  {{- fail "global.privateRegistry.registry is required when global.airgap.enabled=true" -}}
{{- end -}}
{{- if and .Values.global.privateRegistry.enabled (eq (len .Values.global.privateRegistry.pullSecretNames) 0) -}}
  {{- fail "global.privateRegistry.pullSecretNames must not be empty when the private registry is enabled" -}}
{{- end -}}
{{- if not (has .Values.platform.network.exposureKind $supportedExposureKinds) -}}
  {{- fail "platform.network.exposureKind must be one of Ingress, LoadBalancer, or Route" -}}
{{- end -}}
{{- if and .Values.platform.openshift.enabled (ne .Values.platform.network.exposureKind "Route") -}}
  {{- fail "platform.network.exposureKind must be Route when platform.openshift.enabled=true" -}}
{{- end -}}
{{- if and (not .Values.platform.openshift.enabled) (not (has .Values.platform.network.exposureKind (list "Ingress" "LoadBalancer"))) -}}
  {{- fail "platform.network.exposureKind must be Ingress or LoadBalancer when platform.openshift.enabled=false" -}}
{{- end -}}
{{- if and (eq .Values.platform.network.exposureKind "LoadBalancer") (ne .Values.publicSurface.tls.mode "external") -}}
  {{- fail "publicSurface.tls.mode must be external when platform.network.exposureKind=LoadBalancer" -}}
{{- end -}}
{{- if not (has .Values.deployment.profile .Values.deployment.recommendedProfiles.supported) -}}
  {{- fail "deployment.profile must be one of deployment.recommendedProfiles.supported" -}}
{{- end -}}
{{- range $surface, $binding := .Values.publicSurface.bindings -}}
  {{- $component := index $.Values $binding.component -}}
  {{- if and (not $binding.serviceName) (not $component.enabled) -}}
    {{- fail (printf "publicSurface.bindings.%s needs either an enabled component or an explicit serviceName" $surface) -}}
  {{- end -}}
  {{- if and (eq $.Values.platform.network.exposureKind "LoadBalancer") $binding.serviceName -}}
    {{- fail (printf "publicSurface.bindings.%s cannot use explicit serviceName when exposureKind=LoadBalancer" $surface) -}}
  {{- end -}}
{{- end -}}
{{- if not (has "common" .Values.config.inheritanceOrder) -}}
  {{- fail "config.inheritanceOrder must include the common values layer" -}}
{{- end -}}
{{- if not .Values.gatewayPolicy.oidc.enabled -}}
  {{- fail "gatewayPolicy.oidc.enabled must remain true for APISIX OIDC protection" -}}
{{- end -}}
{{- if not (has .Values.gatewayPolicy.passthrough.mode (list "enabled" "limited" "disabled")) -}}
  {{- fail "gatewayPolicy.passthrough.mode must be one of enabled, limited, or disabled" -}}
{{- end -}}
{{- if not .Values.gatewayPolicy.claimsPropagation.stripIncomingHeaders -}}
  {{- fail "gatewayPolicy.claimsPropagation.stripIncomingHeaders must remain true" -}}
{{- end -}}
{{- if eq (len (.Values.gatewayPolicy.cors.allowHeaders | default (list))) 0 -}}
  {{- fail "gatewayPolicy.cors.allowHeaders must define the approved browser request headers" -}}
{{- end -}}
{{- if not .Values.gatewayPolicy.correlation.generateWhenMissing -}}
  {{- fail "gatewayPolicy.correlation.generateWhenMissing must remain true to preserve gateway trace continuity" -}}
{{- end -}}
{{- if ne .Values.gatewayPolicy.errorEnvelope.schema "ErrorResponse" -}}
  {{- fail "gatewayPolicy.errorEnvelope.schema must remain ErrorResponse" -}}
{{- end -}}
{{- if eq (len (.Values.gatewayPolicy.requestValidation.spoofedHeaders | default (list))) 0 -}}
  {{- fail "gatewayPolicy.requestValidation.spoofedHeaders must list the downstream-only auth context headers" -}}
{{- end -}}
{{- if eq (len (.Values.gatewayPolicy.qos.profiles | keys | default (list))) 0 -}}
  {{- fail "gatewayPolicy.qos.profiles must define at least one QoS profile" -}}
{{- end -}}
{{- if eq (len (.Values.gatewayPolicy.internalRequests.requiredHeaders | default (list))) 0 -}}
  {{- fail "gatewayPolicy.internalRequests.requiredHeaders must declare the hardened downstream trust headers" -}}
{{- end -}}
{{- if .Values.bootstrap.enabled -}}
  {{- if eq .Values.bootstrap.lock.name .Values.bootstrap.markers.name -}}
    {{- fail "bootstrap.lock.name and bootstrap.markers.name must be different resources" -}}
  {{- end -}}
  {{- if not .Values.keycloak.enabled -}}
    {{- fail "bootstrap requires keycloak.enabled=true for the default realm/superadmin flow" -}}
  {{- end -}}
  {{- if not .Values.apisix.enabled -}}
    {{- fail "bootstrap requires apisix.enabled=true for the default APISIX route reconciliation flow" -}}
  {{- end -}}
  {{- if eq (len .Values.bootstrap.secretResolution.sources) 0 -}}
    {{- fail "bootstrap.secretResolution.sources must define the required credential inputs" -}}
  {{- end -}}
{{- end -}}
{{- if and .Release.IsUpgrade .Values.deployment.upgrade.allowInPlace -}}
  {{- $currentVersion := .Values.deployment.upgrade.currentVersion | default "" -}}
  {{- if eq $currentVersion "" -}}
    {{- fail "deployment.upgrade.currentVersion is required during in-place upgrades" -}}
  {{- end -}}
  {{- if not (has $currentVersion (.Values.deployment.upgrade.supportedPreviousVersions | default (list))) -}}
    {{- fail (printf "deployment.upgrade.currentVersion %s is not in deployment.upgrade.supportedPreviousVersions" $currentVersion) -}}
  {{- end -}}
  {{- if and (not .Values.deployment.upgrade.allowDowngrade) (semverCompare (printf ">%s" .Chart.AppVersion) $currentVersion) -}}
    {{- fail (printf "deployment.upgrade.currentVersion %s is newer than target chart appVersion %s" $currentVersion .Chart.AppVersion) -}}
  {{- end -}}
{{- end -}}
{{- end -}}
{{ include "in-falcone.validate" . }}
