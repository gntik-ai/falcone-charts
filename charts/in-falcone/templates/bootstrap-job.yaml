{{- if .Values.bootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "in-falcone.fullname" . }}-bootstrap
  labels:
    {{- include "in-falcone.labels" . | nindent 4 }}
    in-falcone.io/component: bootstrap
    in-falcone.io/bootstrap-phase: hook
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
    {{- with .Values.bootstrap.job.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.bootstrap.job.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.bootstrap.job.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.bootstrap.job.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "in-falcone.labels" . | nindent 8 }}
        in-falcone.io/component: bootstrap
        in-falcone.io/bootstrap-phase: hook
        {{- with .Values.bootstrap.job.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.bootstrap.job.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "in-falcone.bootstrapServiceAccountName" . }}
      {{- /* normalize imagePullSecrets({name} maps) + privateRegistry.pullSecretNames(strings) */ -}}
      {{- $imagePullSecrets := list -}}
      {{- range (default (list) .Values.global.imagePullSecrets) -}}
        {{- $imagePullSecrets = append $imagePullSecrets (.name | default .) -}}
      {{- end -}}
      {{- range (default (list) .Values.global.privateRegistry.pullSecretNames) -}}
        {{- $imagePullSecrets = append $imagePullSecrets . -}}
      {{- end -}}
      {{- $imagePullSecrets = $imagePullSecrets | uniq -}}
      {{- if gt (len $imagePullSecrets) 0 }}
      imagePullSecrets:
        {{- range $imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- with .Values.bootstrap.job.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- /* Keycloak-readiness gate (fix-bootstrap-job-coldstart-retry, #558): a COLD fresh
             `helm install` previously raced a not-yet-Ready Keycloak — the bootstrap container's
             ~30s curl --retry budget elapsed before Keycloak accepted the admin token, and with
             backoffLimit:1 the Job failed without provisioning the realm/clients/superadmin. This
             initContainer polls the Keycloak service master realm until it answers 200 (or until
             timeoutSeconds), so the bootstrap container only runs once Keycloak is reachable. */}}
      {{- if .Values.bootstrap.job.keycloakReadiness.enabled }}
      initContainers:
        - name: wait-for-keycloak
          {{- /* reuse the bootstrap image (it carries curl, as the bootstrap script relies on it) */}}
          image: "{{ include "component-wrapper.normalizeRepository" (dict "Values" .Values "repository" .Values.bootstrap.job.image.repository) }}:{{ .Values.bootstrap.job.image.tag }}"
          imagePullPolicy: {{ .Values.bootstrap.job.image.pullPolicy }}
          command:
            - /bin/bash
            - -ec
            - |
              KEYCLOAK_BASE_URL="http://{{ include "in-falcone.componentServiceNameByAlias" (dict "root" . "component" "keycloak") }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.keycloak.service.port }}"
              DEADLINE=$(( $(date +%s) + {{ .Values.bootstrap.job.keycloakReadiness.timeoutSeconds }} ))
              echo "[wait-for-keycloak] polling $KEYCLOAK_BASE_URL/realms/master until ready (deadline {{ .Values.bootstrap.job.keycloakReadiness.timeoutSeconds }}s)"
              until [ "$(curl -sS -o /dev/null -w '%{http_code}' \
                --max-time {{ .Values.bootstrap.job.keycloakReadiness.requestTimeoutSeconds }} \
                "$KEYCLOAK_BASE_URL/realms/master")" = "200" ]; do
                if [ "$(date +%s)" -ge "$DEADLINE" ]; then
                  echo "[wait-for-keycloak] Keycloak not ready before deadline; failing init so the Job retries" >&2
                  exit 1
                fi
                echo "[wait-for-keycloak] Keycloak not ready; retry in {{ .Values.bootstrap.job.keycloakReadiness.intervalSeconds }}s"
                sleep {{ .Values.bootstrap.job.keycloakReadiness.intervalSeconds }}
              done
              echo "[wait-for-keycloak] Keycloak master realm is reachable; proceeding with bootstrap"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- with .Values.bootstrap.job.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.bootstrap.job.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- end }}
      containers:
        - name: bootstrap
          {{- /* route through the shared image helper so global.imageRegistry (Harbor) rewrites it */}}
          image: "{{ include "component-wrapper.normalizeRepository" (dict "Values" .Values "repository" .Values.bootstrap.job.image.repository) }}:{{ .Values.bootstrap.job.image.tag }}"
          imagePullPolicy: {{ .Values.bootstrap.job.image.pullPolicy }}
          command:
            - /bin/bash
            - /bootstrap/script/bootstrap.sh
          env:
            - name: RELEASE_NAME
              value: {{ .Release.Name | quote }}
            - name: RELEASE_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            {{- range $name, $source := .Values.bootstrap.secretResolution.sources }}
            {{- if eq $source.strategy "kubernetesSecret" }}
            - name: {{ $source.envVarName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $source.existingSecret.name | quote }}
                  key: {{ $source.existingSecret.key | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.bootstrap.job.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: script
              mountPath: /bootstrap/script
              readOnly: true
            - name: payload
              mountPath: /bootstrap/payload
              readOnly: true
            - name: tmp
              mountPath: /tmp
          {{- with .Values.bootstrap.job.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.bootstrap.job.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: script
          configMap:
            name: {{ include "in-falcone.bootstrapScriptConfigMapName" . }}
            defaultMode: 0755
        - name: payload
          configMap:
            name: {{ include "in-falcone.bootstrapPayloadConfigMapName" . }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.bootstrap.job.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.bootstrap.job.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.bootstrap.job.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
