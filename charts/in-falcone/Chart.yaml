apiVersion: v2
name: in-falcone
description: Umbrella Helm chart for modular In Falcone platform deployments
type: application
version: 0.3.1
appVersion: "0.3.1"
annotations:
  falcone.io/min-control-plane-version: "0.3.1"
  falcone.io/webhook-key-lifecycle: "v1"
dependencies:
  - name: component-wrapper
    alias: apisix
    version: 0.2.1
    repository: file://./charts/component-wrapper
  - name: component-wrapper
    alias: keycloak
    version: 0.2.1
    repository: file://./charts/component-wrapper
  - name: component-wrapper
    alias: postgresql
    version: 0.2.1
    repository: file://./charts/component-wrapper
  # Dedicated pgvector Postgres (add-pgvector-image-for-vector-search, #602) — core dedicated
  # Postgres StatefulSet on the pgvector/pgvector image.
  - name: component-wrapper
    alias: postgresqlVector
    version: 0.2.1
    repository: file://./charts/component-wrapper
  # DocumentDB engine (FerretDB document-store backend) — dedicated Postgres 17
  # StatefulSet rendered by the generic component-wrapper.
  # See add-ferretdb-documentdb-engine. The document store; the legacy MongoDB server was removed.
  - name: component-wrapper
    alias: documentdb
    version: 0.2.1
    repository: file://./charts/component-wrapper
  # FerretDB gateway — stateless MongoDB-wire-protocol proxy in front of the
  # documentdb engine, rendered by the generic component-wrapper (Deployment),
  # always installed as part of the core baseline. See add-ferretdb-gateway.
  # DEPENDS ON documentdb (engine must be initialised before the gateway connects).
  - name: component-wrapper
    alias: ferretdb
    version: 0.2.1
    repository: file://./charts/component-wrapper
  - name: component-wrapper
    alias: kafka
    version: 0.2.1
    repository: file://./charts/component-wrapper
  - name: component-wrapper
    alias: observability
    version: 0.2.1
    repository: file://./charts/component-wrapper
  - name: component-wrapper
    alias: controlPlane
    version: 0.2.1
    repository: file://./charts/component-wrapper
  - name: component-wrapper
    alias: controlPlaneExecutor
    version: 0.2.1
    repository: file://./charts/component-wrapper
  - name: component-wrapper
    alias: webConsole
    version: 0.2.1
    repository: file://./charts/component-wrapper
  - name: component-wrapper
    alias: workflowWorker
    version: 0.2.1
    repository: file://./charts/component-wrapper
  - name: eso
    version: 0.1.0
    repository: file://./charts/eso
  - name: openbao
    version: 0.1.0
    repository: file://./charts/openbao
  # SeaweedFS HA object-storage tier (master/volume/filer/S3 gateway) — the
  # default-active object store (the bundled MinIO storage component was removed
  # in the MinIO -> SeaweedFS migration, ADR-13). First remote sub-chart dependency
  # in this umbrella. Version pinned to the chart that ships SeaweedFS appVersion
  # 4.33 (validated by the add-seaweedfs-storage-adr-spike #431 evidence). See
  # add-seaweedfs-deployment.
  - name: seaweedfs
    version: 4.33.0
    repository: https://seaweedfs.github.io/seaweedfs/helm
