{{- $workloadKind := .Values.wrapper.workload.kind | default "Deployment" -}}
{{- $podSecurityContext := mergeOverwrite (deepCopy (default (dict) .Values.global.podSecurity)) (default (dict) .Values.podSecurityContext) -}}
{{- if (.Values.global.podSecurity.openshiftRestricted | default false) -}}
  {{- $_ := unset $podSecurityContext "runAsUser" -}}
  {{- $_ := unset $podSecurityContext "runAsGroup" -}}
  {{- $_ := unset $podSecurityContext "fsGroup" -}}
  {{- $_ := unset $podSecurityContext "fsGroupChangePolicy" -}}
  {{- $_ := unset $podSecurityContext "openshiftRestricted" -}}
{{- end -}}
{{- /* Normalize pull secrets to a string list: global.imagePullSecrets items are
       {name: ...} maps; global.privateRegistry.pullSecretNames items are strings
       (per values.schema.json). The previous concat + `{{ .name | default . }}`
       crashed on string items, so the private-registry/Harbor path could not render. */ -}}
{{- $imagePullSecrets := list -}}
{{- range (default (list) .Values.global.imagePullSecrets) -}}
  {{- $imagePullSecrets = append $imagePullSecrets (.name | default .) -}}
{{- end -}}
{{- range (default (list) .Values.global.privateRegistry.pullSecretNames) -}}
  {{- $imagePullSecrets = append $imagePullSecrets . -}}
{{- end -}}
{{- $imagePullSecrets = $imagePullSecrets | uniq -}}
{{- /* In-transit TLS injection (harden-datastore-transport-tls / #645): when the umbrella's
       global.transportSecurity is enabled AND this component opts in (transportSecurityClient),
       append the shared TLS env and mount the CA secret. No-op otherwise, so default renders
       are byte-identical. */ -}}
{{- $ts := default (dict) .Values.global.transportSecurity -}}
{{- $tsOn := and .Values.transportSecurityClient ($ts.enabled | default false) -}}
{{- $tsEnv := ternary (default (list) $ts.env) (list) $tsOn -}}
{{- $tsCa := and $tsOn (ne (default "" $ts.caSecretName) "") -}}
{{- /* C-25 webhook master-key injection is deliberately alias-specific. Globals
       are visible to this dependency, while no generic component value accepts
       key material or an override env entry. */ -}}
{{- $webhookKey := default (dict) .Values.global.webhookSigningKey -}}
{{- $isControlPlane := and (eq (.Values.wrapper.componentId | default "") "control-plane") (gt (len $webhookKey) 0) -}}
{{- $webhookKeyId := "" -}}
{{- $webhookMode := "canonical-v1" -}}
{{- $webhookAction := "none" -}}
{{- $webhookRequestId := "" -}}
{{- $webhookRotationId := "" -}}
{{- if $isControlPlane -}}
  {{- $webhookKeyId = printf "wk1:%s" (sha256sum (printf "%s/%s/%s" .Release.Namespace $webhookKey.secretName $webhookKey.secretKey)) -}}
  {{- $webhookAction = $webhookKey.rotation.action | default "none" -}}
  {{- $webhookRequestId = $webhookKey.rotation.requestId | default $webhookKey.adoption.requestId | default "" -}}
  {{- $webhookRotationId = $webhookKey.rotation.rotationId | default "" -}}
  {{- if and (eq ($webhookKey.adoption.mode | default "none") "legacy") (ne $webhookAction "rotate") -}}
    {{- $webhookMode = "legacy" -}}
  {{- end -}}
{{- end -}}
{{- $podAnnotations := deepCopy (default (dict) .Values.podAnnotations) -}}
{{- if $isControlPlane -}}
  {{- $_ := set $podAnnotations "in-falcone.io/release-revision" (printf "%d" (.Release.Revision | int)) -}}
  {{- $_ := set $podAnnotations "in-falcone.io/webhook-key-id" $webhookKeyId -}}
  {{- $_ := set $podAnnotations "in-falcone.io/webhook-key-mode" $webhookMode -}}
  {{- $_ := set $podAnnotations "in-falcone.io/webhook-key-action" $webhookAction -}}
  {{- if $webhookRequestId }}{{- $_ := set $podAnnotations "in-falcone.io/webhook-key-request-id" $webhookRequestId -}}{{- end -}}
  {{- if $webhookRotationId }}{{- $_ := set $podAnnotations "in-falcone.io/webhook-key-rotation-id" $webhookRotationId -}}{{- end -}}
{{- end -}}
apiVersion: apps/v1
kind: {{ $workloadKind }}
metadata:
  name: {{ include "component-wrapper.fullname" . }}
  labels:
    {{- include "component-wrapper.labels" . | nindent 4 }}
spec:
  {{- if eq $workloadKind "StatefulSet" }}
  serviceName: {{ include "component-wrapper.fullname" . }}
  {{- end }}
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "component-wrapper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "component-wrapper.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "component-wrapper.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountToken | default false }}
      enableServiceLinks: false
      {{- if gt (len $imagePullSecrets) 0 }}
      imagePullSecrets:
        {{- range $imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if gt (len $podSecurityContext) 0 }}
      securityContext:
        {{- toYaml $podSecurityContext | nindent 8 }}
      {{- end }}
      {{- if or (and .Values.persistence.enabled .Values.volumePermissions.enabled) (gt (len .Values.initContainers) 0) }}
      initContainers:
        {{- if and .Values.persistence.enabled .Values.volumePermissions.enabled }}
        - name: volume-permissions
          image: {{ include "component-wrapper.renderImage" (dict "Values" .Values "image" .Values.volumePermissions.image "name" (printf "%s volumePermissions" (include "component-wrapper.name" .))) | quote }}
          imagePullPolicy: {{ .Values.volumePermissions.image.pullPolicy | default "IfNotPresent" }}
          command:
            {{- toYaml (.Values.volumePermissions.command | default (list "sh" "-ec" (printf "mkdir -p %s && chmod -R g+rwX %s" .Values.persistence.mountPath .Values.persistence.mountPath))) | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          securityContext:
            {{- toYaml .Values.volumePermissions.securityContext | nindent 12 }}
        {{- end }}
        {{- with .Values.initContainers }}
        {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ include "component-wrapper.name" . }}
          image: {{ include "component-wrapper.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.ports }}
          ports:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.env (gt (len $tsEnv) 0) $isControlPlane }}
          env:
            {{- if $isControlPlane }}
            - name: WEBHOOK_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $webhookKey.secretName | quote }}
                  key: {{ $webhookKey.secretKey | quote }}
                  optional: false
            - name: WEBHOOK_SIGNING_KEY_MODE
              value: {{ $webhookMode | quote }}
            - name: WEBHOOK_SIGNING_KEY_ID
              value: {{ $webhookKeyId | quote }}
            - name: WEBHOOK_SIGNING_KEY_MANAGED
              value: {{ ternary "true" "false" $webhookKey.create | quote }}
            {{- end }}
            {{- with .Values.env }}
            {{- tpl (toYaml .) $ | nindent 12 }}
            {{- end }}
            {{- with $tsEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if or (gt (len .Values.envFromSecrets) 0) (gt (len .Values.envFromConfigMaps) 0) (and .Values.config.inline (gt (len .Values.config.inline) 0)) }}
          envFrom:
            {{- if and .Values.config.inline (gt (len .Values.config.inline) 0) }}
            - configMapRef:
                name: {{ include "component-wrapper.generatedConfigMapName" . }}
            {{- end }}
            {{- range .Values.envFromConfigMaps }}
            - configMapRef:
                name: {{ . }}
            {{- end }}
            {{- range .Values.envFromSecrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.persistence.enabled (gt (len .Values.extraVolumeMounts) 0) $tsCa }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if $tsCa }}
            - name: falcone-transport-ca
              mountPath: {{ $ts.caMountPath | default "/etc/falcone/tls" }}
              readOnly: true
            {{- end }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      {{- if or .Values.persistence.enabled (gt (len .Values.extraVolumes) 0) $tsCa }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "component-wrapper.persistenceClaimName" . }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if $tsCa }}
        - name: falcone-transport-ca
          secret:
            secretName: {{ $ts.caSecretName }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
