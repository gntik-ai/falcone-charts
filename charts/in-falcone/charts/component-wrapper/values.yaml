      drop:
        - ALL
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
nodeSelector: {}
tolerations: []
affinity: {}
