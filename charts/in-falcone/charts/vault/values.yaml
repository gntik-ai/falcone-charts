eso:
  serviceAccountName: "eso-vault-auth"
  tokenTTL: "24h"

vault:
  namespace: secret-store
  replicas: 1
  image:
    repository: hashicorp/vault
    tag: "1.15.0"
    pullPolicy: IfNotPresent
  storage:
    size: 10Gi
    storageClassName: ""
  tls:
    enabled: true
    secretName: vault-server-tls
    # finding D7/C.6: how the server TLS Secret (<secretName>) is provisioned.
    #   cert-manager -> render a cert-manager.io/v1 Certificate (needs cert-manager CRDs; the
    #                   default, for clusters that run cert-manager).
    #   self-signed  -> a pre-install/pre-upgrade hook Job generates a self-signed CA + server
    #                   cert with openssl and writes <secretName> directly. KIND-COMPATIBLE: no
    #                   cert-manager required, so `vault.enabled=true` no longer aborts the release.
    # The Secret carries tls.crt/tls.key/ca.crt; ESO's caProvider reads its ca.crt to trust Vault.
    mode: cert-manager
    issuerRef:
      name: selfsigned-issuer
      kind: ClusterIssuer
    # Used only when mode=self-signed.
    bootstrap:
      image:
        repository: docker.io/bitnami/kubectl
        tag: "1.32.2"
        pullPolicy: IfNotPresent
      days: 3650
  service:
    type: ClusterIP
    port: 8200
    clusterPort: 8201
  unsealMethod: shamir
  initShares: 5
  initThreshold: 3
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  auditSidecar:
    enabled: true
    image:
      repository: node
      tag: 20-alpine
      pullPolicy: IfNotPresent
    kafkaTopic: console.secrets.audit
    kafkaBrokers: "kafka.kafka.svc.cluster.local:9092"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  networkPolicy:
    enabled: true
    allowedNamespaceLabel: vault-access
  metrics:
    enabled: true
  migration:
    enabled: true
    image:
      repository: bitnami/kubectl
      tag: latest
      pullPolicy: IfNotPresent
