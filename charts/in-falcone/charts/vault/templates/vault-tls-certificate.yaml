{{- /* finding D7/C.6: render the cert-manager Certificate ONLY in cert-manager mode. On a cluster
  without cert-manager (e.g. kind) this CRD is absent, so rendering it unconditionally aborted the
  release whenever vault.enabled=true. The self-signed bootstrap Job covers the kind path. */ -}}
{{- if eq (.Values.vault.tls.mode | default "cert-manager") "cert-manager" }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-server-tls
  namespace: {{ .Values.vault.namespace }}
spec:
  secretName: {{ .Values.vault.tls.secretName }}
  issuerRef:
    name: {{ .Values.vault.tls.issuerRef.name }}
    kind: {{ .Values.vault.tls.issuerRef.kind }}
  commonName: vault.secret-store.svc.cluster.local
  dnsNames:
    - vault
    - vault.secret-store
    - vault.secret-store.svc
    - vault.secret-store.svc.cluster.local
    - vault-internal.secret-store.svc.cluster.local
{{- end }}
