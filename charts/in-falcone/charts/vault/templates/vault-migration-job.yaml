apiVersion: batch/v1
kind: Job
metadata:
  name: vault-migration
  namespace: {{ .Values.vault.namespace }}
  annotations:
    falcone.io/rollback: "Revert service chart updates to previous inline credential sources if verification fails."
spec:
  template:
    spec:
      serviceAccountName: vault
      restartPolicy: OnFailure
      containers:
        - name: migrate-secrets
          image: "{{ .Values.vault.image.repository }}:{{ .Values.vault.image.tag }}"
          command: ["/bin/sh", "-ec"]
          args:
            - |
              export VAULT_ADDR="https://vault.{{ .Values.vault.namespace }}.svc.cluster.local:8200"
              export VAULT_CACERT=/vault/tls/ca.crt
              : "This job is intentionally idempotent; replace credential discovery stubs with real cluster sources at deploy time."
              echo "Idempotent migration placeholder: read existing Kubernetes Secrets and upsert them into Vault via vault kv put."
              echo "Record migrated metadata into secret_metadata with INSERT ... ON CONFLICT DO NOTHING."
              exit 0
          volumeMounts:
            - name: tls
              mountPath: /vault/tls
              readOnly: true
      volumes:
        - name: tls
          secret:
            secretName: {{ .Values.vault.tls.secretName }}
