apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eso-to-vault
  namespace: {{ .Values.eso.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: secret-store
      ports:
        - protocol: TCP
          port: 8200
