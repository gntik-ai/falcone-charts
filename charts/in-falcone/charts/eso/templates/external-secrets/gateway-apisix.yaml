apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gateway-apisix-credentials
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
spec:
  refreshInterval: {{ $.Values.eso.refreshInterval | quote }}
  secretStoreRef: { name: openbao-backend, kind: ClusterSecretStore }
  target: { name: in-falcone-apisix-admin, creationPolicy: Merge, immutable: false }
  data:
    - secretKey: admin-key
      remoteRef: { key: gateway/apisix, property: admin-key }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gateway-shared-secret
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
spec:
  refreshInterval: {{ $.Values.eso.refreshInterval | quote }}
  secretStoreRef: { name: openbao-backend, kind: ClusterSecretStore }
  target: { name: in-falcone-gateway-shared-secret, creationPolicy: Merge, immutable: false }
  data:
    - secretKey: secret
      remoteRef: { key: gateway/shared, property: secret }
