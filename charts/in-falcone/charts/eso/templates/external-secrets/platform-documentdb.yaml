apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-documentdb-credentials
  namespace: documentdb
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
spec:
  refreshInterval: {{ $.Values.eso.refreshInterval | quote }}
  secretStoreRef: { name: openbao-backend, kind: ClusterSecretStore }
  target: { name: platform-documentdb-credentials, immutable: true }
  data:
    - secretKey: root-password
      remoteRef: { key: platform/documentdb, property: root-password }
    - secretKey: app-password
      remoteRef: { key: platform/documentdb, property: app-password }
