apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
{{ $openbaoNamespace := .Values.eso.caProvider.namespace | default "secret-store" }}
{{ $vaultAddress := .Values.eso.vaultAddress | default (printf "https://openbao.%s.svc.cluster.local:8200" $openbaoNamespace) }}
metadata:
  # OpenBao-backed store. The provider TYPE stays `vault` — ESO's Vault provider is the
  # OpenBao-compatible client (KV v2 over the same REST surface); only the target points at OpenBao.
  name: openbao-backend
  annotations:
    # Apply the CRs as a post-install/upgrade hook so the operator + its admission webhook are running
    # before the ClusterSecretStore/ExternalSecret instances are validated (the CRDs themselves are in
    # this subchart's crds/ dir, installed first). Store = weight 0, ExternalSecrets = weight 5.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
spec:
  provider:
    vault:
      server: {{ $vaultAddress | quote }}
      path: secret
      version: v2
      caProvider:
        type: Secret
        name: {{ .Values.eso.caProvider.name }}
        key: {{ .Values.eso.caProvider.key }}
        namespace: {{ .Values.eso.caProvider.namespace }}
      auth:
        kubernetes:
          mountPath: {{ .Values.eso.vaultAuthPath | quote }}
          role: {{ .Values.eso.vaultAuthRole | quote }}
          serviceAccountRef:
            name: {{ .Values.eso.serviceAccountName }}
            namespace: {{ .Values.eso.namespace }}
