apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-preflight
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eso-preflight
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["external-secrets.io"]
    resources: ["clustersecretstores"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eso-preflight
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: eso-preflight
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: eso-preflight
---
apiVersion: batch/v1
kind: Job
metadata:
  name: eso-preflight
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-19"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/component: eso-preflight
    spec:
      restartPolicy: Never
      serviceAccountName: eso-preflight
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: preflight
          image: {{ .Values.eso.webhookWait.image.repository }}:{{ .Values.eso.webhookWait.image.tag }}
          imagePullPolicy: {{ .Values.eso.webhookWait.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - /bin/sh
            - -ec
            - |
              adopt={{ .Values.eso.clusterOwnership.adoptExisting | default false | quote }}
              release={{ .Release.Name | quote }}
              namespace={{ .Release.Namespace | quote }}
              eso_namespace={{ .Values.eso.namespace | quote }}
              if kubectl get clustersecretstore openbao-backend >/dev/null 2>&1; then
                owner="$(kubectl get clustersecretstore openbao-backend -o jsonpath='{.metadata.annotations.meta\.helm\.sh/release-name}' 2>/dev/null || true)"
                owner_ns="$(kubectl get clustersecretstore openbao-backend -o jsonpath='{.metadata.annotations.meta\.helm\.sh/release-namespace}' 2>/dev/null || true)"
                if [ -n "$owner" ] && { [ "$owner" != "$release" ] || [ "$owner_ns" != "$namespace" ]; }; then
                  if [ "$adopt" != "true" ]; then
                    echo "ClusterSecretStore/openbao-backend is owned by ${owner}/${owner_ns}; set eso.eso.clusterOwnership.adoptExisting=true only during an explicit adoption rollout" >&2
                    exit 1
                  fi
                fi
              fi
              conflicts="$(kubectl get deploy -A -l app.kubernetes.io/name=external-secrets -o go-template='{{ "{{" }} range .items {{ "}}" }}{{ "{{" }} .metadata.namespace {{ "}}" }}/{{ "{{" }} .metadata.name {{ "}}" }} {{ "{{" }} end {{ "}}" }}' 2>/dev/null || true)"
              for item in $conflicts; do
                case "$item" in
                  ${namespace}/*) ;;
                  ${eso_namespace}/*) ;;
                  *)
                    if [ "$adopt" != "true" ]; then
                      echo "external-secrets controller already exists outside ${eso_namespace}: ${item}; coordinate ownership or set eso.eso.clusterOwnership.adoptExisting=true for an adoption rollout" >&2
                      exit 1
                    fi
                    ;;
                esac
              done
              echo "ESO ownership preflight passed"
