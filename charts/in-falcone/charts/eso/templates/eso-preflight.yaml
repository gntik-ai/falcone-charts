apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-preflight
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eso-preflight
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["external-secrets.io"]
    resources: ["clustersecretstores"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eso-preflight
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: eso-preflight
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: eso-preflight
---
apiVersion: batch/v1
kind: Job
metadata:
  name: eso-preflight
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-19"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/component: eso-preflight
    spec:
      restartPolicy: Never
      serviceAccountName: eso-preflight
      {{- include "eso.imagePullSecrets" . | nindent 6 }}
      securityContext: {{- toYaml .Values.eso.podSecurityContext | nindent 8 }}
      containers:
        - name: preflight
          image: {{ include "eso.image" (dict "root" . "image" .Values.eso.webhookWait.image) | quote }}
          imagePullPolicy: {{ .Values.eso.webhookWait.image.pullPolicy }}
          securityContext: {{- toYaml .Values.eso.securityContext | nindent 12 }}
          command:
            - /bin/sh
            - -ec
            - |
              adopt={{ .Values.eso.clusterOwnership.adoptExisting | default false | quote }}
              release={{ .Release.Name | quote }}
              namespace={{ .Release.Namespace | quote }}
              eso_namespace={{ .Values.eso.namespace | quote }}
              openbao_namespace={{ .Values.eso.caProvider.namespace | default "secret-store" | quote }}
              require_adoption() {
                if [ "$adopt" != "true" ]; then
                  echo "$1; set eso.eso.clusterOwnership.adoptExisting=true only during an explicit adoption rollout" >&2
                  exit 1
                fi
              }
              if store_json="$(kubectl get clustersecretstore openbao-backend -o json 2>/dev/null)"; then
                if ! printf '%s' "$store_json" | jq -e \
                  --arg release "$release" \
                  --arg namespace "$namespace" \
                  --arg openbao_namespace "$openbao_namespace" '
                    .metadata.annotations["meta.helm.sh/release-name"] == $release
                    and .metadata.annotations["meta.helm.sh/release-namespace"] == $namespace
                    and .metadata.labels["app.kubernetes.io/instance"] == $release
                    and .metadata.labels["app.kubernetes.io/part-of"] == "in-falcone"
                    and ((.spec.provider.vault.server // "") | startswith("https://openbao." + $openbao_namespace + ".svc"))
                  ' >/dev/null; then
                  owner="$(printf '%s' "$store_json" | jq -r '.metadata.annotations["meta.helm.sh/release-name"] // "<missing>"')"
                  owner_ns="$(printf '%s' "$store_json" | jq -r '.metadata.annotations["meta.helm.sh/release-namespace"] // "<missing>"')"
                  require_adoption "ClusterSecretStore/openbao-backend is not owned by ${release}/${namespace} (found ${owner}/${owner_ns})"
                fi
              fi
              deployments_json="$(kubectl get deploy -A -l app.kubernetes.io/name=external-secrets -o json)"
              conflict="$(printf '%s' "$deployments_json" \
                | jq -r --arg release "$release" --arg namespace "$namespace" '
                  .items[]?
                  | select(
                      .metadata.annotations["meta.helm.sh/release-name"] != $release
                      or .metadata.annotations["meta.helm.sh/release-namespace"] != $namespace
                      or .metadata.labels["app.kubernetes.io/managed-by"] != "Helm"
                      or .metadata.labels["app.kubernetes.io/instance"] != $release
                    )
                  | "\(.metadata.namespace)/\(.metadata.name)"
                ' | head -n1)"
              if [ -n "$conflict" ]; then
                require_adoption "external-secrets controller is not owned by ${release}/${namespace}: ${conflict}"
              fi
              echo "ESO ownership preflight passed"
