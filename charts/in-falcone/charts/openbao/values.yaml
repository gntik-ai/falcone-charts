eso:
  namespace: "eso-system"
  serviceAccountName: "eso-openbao-auth"
  tokenTTL: "24h"

openbao:
  namespace: secret-store
  replicas: 1
  podSecurityContext:
    fsGroup: 1000
  jobPodSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    runAsNonRoot: true
    runAsUser: 100
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
  image:
    repository: openbao/openbao
    tag: "2.3.1"
    pullPolicy: IfNotPresent
  storage:
    size: 10Gi
    storageClassName: ""
  tls:
    enabled: true
    secretName: openbao-server-tls
    # finding D7/C.6: how the server TLS Secret (<secretName>) is provisioned.
    #   cert-manager -> render a cert-manager.io/v1 Certificate (needs cert-manager CRDs; the
    #                   default, for clusters that run cert-manager).
    #   self-signed  -> a pre-install/pre-upgrade hook Job generates a self-signed CA + server
    #                   cert with openssl and writes <secretName> directly. KIND-COMPATIBLE: no
    #                   cert-manager required for the core OpenBao service.
    # The Secret carries tls.crt/tls.key/ca.crt; ESO's caProvider reads its ca.crt to trust OpenBao.
    mode: cert-manager
    issuerRef:
      name: selfsigned-issuer
      kind: ClusterIssuer
    # Runtime namespace CA bundle Secret. In self-signed mode the bootstrap hook copies the
    # server CA here; in cert-manager mode a Certificate creates the Secret in the release namespace.
    clientCaSecretName: in-falcone-openbao-client-ca
    bootstrap:
      image:
        # The bootstrap scripts require bash/curl/jq/kubectl/openssl; alpine/k8s carries the full set.
        repository: docker.io/alpine/k8s
        tag: "1.32.2"
        pullPolicy: IfNotPresent
      days: 3650
  service:
    type: ClusterIP
    port: 8200
    clusterPort: 8201
  credentialSync:
    image:
      repository: docker.io/alpine/k8s
      tag: "1.32.2"
      pullPolicy: IfNotPresent
  recovery:
    secretName: openbao-recovery
  authIdentitiesConfigMapName: openbao-auth-identities
  unsealMethod: shamir
  initShares: 5
  initThreshold: 3
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  auditSidecar:
    # The sidecar runs the secret-audit-handler service (node /opt/secret-audit-handler/src/index.mjs)
    # from the secret-audit-handler-bundle ConfigMap. That handler imports kafkajs at runtime and
    # requires KAFKA_BROKERS + a reachable Kafka; it cannot run from bare ConfigMap source in a vanilla
    # node:20-alpine image (no node_modules) and exits 1 with no Kafka, which would make the OpenBao pod
    # NotReady and block bootstrap. The OpenBao server still runs `audit enable file` regardless, so the
    # JSON audit log is always written (and Vault-schema-compatible). Enabling the live Kafka tailer
    # needs a purpose-built secret-audit-handler image + bundle ConfigMap; default OFF until then.
    enabled: false
    image:
      repository: node
      tag: 20-alpine
      pullPolicy: IfNotPresent
    kafkaTopic: console.secrets.audit
    kafkaBrokers: "kafka.kafka.svc.cluster.local:9092"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  networkPolicy:
    enabled: true
    allowedNamespaceLabel: openbao-access
  metrics:
    enabled: true
  migration:
    enabled: false
