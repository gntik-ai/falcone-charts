apiVersion: v1
kind: Service
metadata:
  name: openbao
  namespace: {{ .Values.openbao.namespace }}
spec:
  type: {{ .Values.openbao.service.type }}
  selector:
    app.kubernetes.io/name: openbao
  ports:
    - name: http
      port: {{ .Values.openbao.service.port }}
      targetPort: 8200
    - name: cluster
      port: {{ .Values.openbao.service.clusterPort }}
      targetPort: 8201
---
apiVersion: v1
kind: Service
metadata:
  name: openbao-internal
  namespace: {{ .Values.openbao.namespace }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: openbao
  ports:
    - name: http
      port: 8200
      targetPort: 8200
    - name: cluster
      port: 8201
      targetPort: 8201
