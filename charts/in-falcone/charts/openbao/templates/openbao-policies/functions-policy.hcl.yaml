apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-policy-functions
  namespace: {{ .Values.openbao.namespace }}
data:
  functions.hcl: |
    path "secret/data/functions/*" {
      capabilities = ["read"]
    }
    path "secret/metadata/functions/*" {
      capabilities = ["list", "read"]
    }
    path "secret/data/falcone/workspace-secrets/*" {
      capabilities = ["create", "update", "read", "delete"]
    }
    path "secret/metadata/falcone/workspace-secrets/*" {
      capabilities = ["list", "read", "delete"]
    }
