apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-config
  namespace: {{ .Values.openbao.namespace }}
data:
  openbao.hcl: |
    storage "file" {
      path = "/openbao/data"
    }

    listener "tcp" {
      address       = "0.0.0.0:8200"
      tls_disable   = 0
      tls_cert_file = "/openbao/tls/tls.crt"
      tls_key_file  = "/openbao/tls/tls.key"
    }

    ui                = true
    default_lease_ttl = "24h"
    max_lease_ttl     = "768h"
    log_level         = "info"

    api_addr     = "https://openbao.secret-store.svc.cluster.local:8200"
    cluster_addr = "https://$(HOSTNAME).openbao-internal.secret-store.svc.cluster.local:8201"
