{{- /*
  OpenBao server TLS bootstrap — self-signed path (finding D7/C.6).

  SAFE DEFAULT for clusters WITHOUT cert-manager (e.g. kind): a Helm pre-install/pre-upgrade hook
  Job that generates a self-signed CA + server cert with openssl and writes them into the
  `openbao.tls.secretName` Secret (tls.crt/tls.key/ca.crt). The OpenBao StatefulSet mounts it at
  /openbao/tls; ESO's caProvider reads its ca.crt to trust the OpenBao server — so enabling OpenBao
  no longer aborts the release on the missing cert-manager Certificate CRD, and the ESO ->
  ClusterSecretStore -> ExternalSecret path resolves end-to-end against the bootstrapped CA.

  Rendered only when openbao.tls.mode=self-signed (mirrors templates/seaweedfs-tls-bootstrap.yaml).
  Runs BEFORE the OpenBao pod so the cert Secret exists when the pod mounts it. Idempotent: skips if
  the Secret already carries a server cert.
*/ -}}
{{- if and .Values.openbao.tls.enabled (eq (.Values.openbao.tls.mode | default "cert-manager") "self-signed") }}
{{- $ns := .Values.openbao.namespace -}}
{{- $secret := .Values.openbao.tls.secretName -}}
{{- $b := .Values.openbao.tls.bootstrap -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openbao-tls-bootstrap
  namespace: {{ $ns }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openbao-tls-bootstrap
  namespace: {{ $ns }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openbao-tls-bootstrap
  namespace: {{ $ns }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openbao-tls-bootstrap
subjects:
  - kind: ServiceAccount
    name: openbao-tls-bootstrap
    namespace: {{ $ns }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: openbao-tls-bootstrap
  namespace: {{ $ns }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/component: openbao-tls
    spec:
      restartPolicy: Never
      serviceAccountName: openbao-tls-bootstrap
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tls-bootstrap
          image: {{ $b.image.repository }}:{{ $b.image.tag }}
          imagePullPolicy: {{ $b.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: NS
              value: {{ $ns | quote }}
            - name: SECRET
              value: {{ $secret | quote }}
            - name: DAYS
              value: {{ $b.days | quote }}
          command:
            - /bin/sh
            - -ec
            - |
              command -v openssl >/dev/null || { echo "openssl required in the bootstrap image"; exit 1; }
              # Idempotent: skip if the server cert Secret already carries a tls.crt.
              if kubectl -n "$NS" get secret "$SECRET" -o jsonpath='{.data.tls\.crt}' 2>/dev/null | grep -q .; then
                echo "$SECRET already present; skipping OpenBao TLS bootstrap"; exit 0
              fi
              D=$(mktemp -d)
              # One self-signed cert carrying the OpenBao Service SANs (must match the ESO
              # vaultAddress host). -addext keeps the SANs inline (no config file / heredoc). The cert
              # is its own trust anchor, so ca.crt == tls.crt — ESO's caProvider reads ca.crt to trust
              # OpenBao.
              SAN="subjectAltName=DNS:openbao,DNS:openbao.${NS},DNS:openbao.${NS}.svc,DNS:openbao.${NS}.svc.cluster.local,DNS:openbao-internal.${NS}.svc.cluster.local"
              openssl req -x509 -nodes -newkey rsa:2048 -days "$DAYS" \
                -keyout "$D/tls.key" -out "$D/tls.crt" \
                -subj "/CN=openbao.${NS}.svc.cluster.local" \
                -addext "$SAN"
              cp "$D/tls.crt" "$D/ca.crt"
              kubectl -n "$NS" create secret generic "$SECRET" \
                --from-file=tls.crt="$D/tls.crt" \
                --from-file=tls.key="$D/tls.key" \
                --from-file=ca.crt="$D/ca.crt" \
                --dry-run=client -o yaml | kubectl apply -f -
              echo "OpenBao server TLS secret $SECRET created (self-signed) in $NS"
{{- end }}
