# Kind overlay — compatibility layer for dedicated pgvector Postgres for vector/KNN search
# (add-pgvector-image-for-vector-search, #602).
#
# The base chart now deploys the dedicated pgvector Postgres as a core service. This overlay is kept
# for old commands and no longer enables anything.
#
# Usage: helm install falcone charts/in-falcone -f deploy/kind/values-kind.yaml \
#          -f deploy/kind/values-kind-vector.yaml
#
# A dedicated-DB workspace routed to this instance (the connection registry's resolveConnection DSN ->
# falcone-postgresql-vector.<ns>.svc:5432/in_falcone_vector) then gets working CREATE EXTENSION vector
# + KNN. The shared-instance default `postgresql` is untouched.
