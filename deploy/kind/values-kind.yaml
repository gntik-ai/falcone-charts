# Kind test-cluster-b install values.
# - Replaces chart-pinned images that no longer exist on public registries
#   (Bitnami purged public tags -> bitnamilegacy; apisix/prometheus/seaweedfs tag
#   conventions; functions execute on Knative Services, not a standalone runtime).
# - Points the two placeholder app images (ghcr.io/example/...) at the
#   in-cluster registry (NodePort 30500; containerd allows plain-HTTP localhost).
# - Installs into namespace `falcone` (shared cluster; musematic untouched).
global:
  namespace: falcone
  createNamespace: false
  imagePullSecrets: []
bootstrap:
  # The one-shot Keycloak provisioning (realm in-falcone-platform + roles +
  # client scopes + in-falcone-console/in-falcone-gateway clients + superadmin)
  # already completed successfully on an earlier revision and is live in Keycloak.
  # The hook's *reconcile* phase is structurally incompatible with this profile
  # (it PUTs routes to an APISIX Admin API that does not exist under
  # APISIX_STAND_ALONE=true), so it can never complete. Disable the hook so Helm
  # converges; the keycloak state it created persists.
  enabled: false
  job:
    image:
      # needs kubectl AND curl AND bash (the bootstrap script drives the
      # Keycloak/APISIX admin APIs with curl); bitnami(legacy)/kubectl has no curl
      repository: docker.io/alpine/k8s
      tag: 1.32.2
    securityContext:
      runAsUser: 1000  # alpine/k8s image defaults to root
      runAsGroup: 1000
  oneShot:
    keycloak:
      realm:
        # CHART FIX: the default values nest these flags under `login`, which is
        # not a field of Keycloak's RealmRepresentation -> KC 26 rejects the
        # whole payload (400 "unable to read contents from stream"). Delete the
        # nested map (null) and set the real top-level fields instead.
        login: null
        loginWithEmailAllowed: true
        registrationAllowed: true
        rememberMe: true
        verifyEmail: true
        resetPasswordAllowed: true
  reconcile:
    apisix:
      # CHART MISMATCH: APISIX runs with APISIX_STAND_ALONE=true (no Admin API on
      # :9180); routes are loaded from config, not pushed via the admin API. The
      # post-install bootstrap's reconciliation phase POSTs each route to the
      # (absent) admin API and fails ("Could not connect to :9180"). The schema
      # forbids an empty list (minItems:1), and the script template only emits an
      # ensure_apisix_route call for a route whose `enabledInModes` includes the
      # active gatewayPolicy.passthrough.mode (`enabled`). So we keep ONE
      # placeholder route gated to a non-active mode -> zero admin-API calls ->
      # the Job completes. (The one-shot Keycloak phase still runs in full.)
      routes:
        - routeId: "0000"
          name: noop-standalone-placeholder
          uri: /__noop__
          priority: 1
          enabledInModes:
            - disabled
          upstream:
            component: controlPlane
            port: 8080
apisix:
  image:
    repository: docker.io/apache/apisix
    tag: 3.10.0-debian
  securityContext:
    runAsUser: 636   # apache/apisix image USER is the non-numeric "apisix" (uid 636)
  # Mount the standalone route table at the path apache/apisix reads when
  # APISIX_STAND_ALONE=true. Without it APISIX starts with zero routes (every
  # request 404s). The ConfigMap `falcone-apisix-standalone` is created from
  # deploy/kind/apisix/apisix.yaml (apply-apisix-routes.sh). subPath keeps the
  # rest of /usr/local/apisix/conf intact.
  extraVolumes:
    - name: standalone-config
      configMap:
        name: falcone-apisix-standalone
  extraVolumeMounts:
    - name: standalone-config
      mountPath: /usr/local/apisix/conf/apisix.yaml
      subPath: apisix.yaml
postgresql:
  image:
    repository: docker.io/bitnamilegacy/postgresql
    tag: 17.2.0
kafka:
  # single-broker KRaft (the in-falcone-kafka secret pins NODE_ID=0 with a
  # localhost quorum; >1 replica would yield independent brokers, not a cluster)
  replicas: 1
  image:
    repository: docker.io/bitnamilegacy/kafka
    tag: 3.9.0
observability:
  image:
    repository: docker.io/prom/prometheus
    tag: v3.2.1
  securityContext:
    runAsUser: 65534  # prom image USER is the non-numeric "nobody" (uid 65534)
  # Opt into the SA token mount on the kind/campaign profile so the widened Prometheus scrape
  # (add-deploy-completeness-cluster, #562) can do Kubernetes pod service-discovery — it reads pods
  # in the release namespace (granted by templates/observability-prometheus-rbac.yaml) and scrapes
  # any pod annotated prometheus.io/scrape=true, covering metrics-exposing components beyond the 3
  # hardcoded static targets. The base chart keeps automountToken=false (hardened default).
  serviceAccount:
    automountToken: true
controlPlane:
  # Real control-plane runtime (server.mjs): validates the Keycloak JWT and
  # dispatches /v1/* to the repo's action modules (was a health-only stub).
  # Mount the SA token: the function executor calls the k8s API (create Jobs) with
  # the falcone-control-plane SA (granted jobs/pods RBAC via executor-rbac.yaml).
  serviceAccount:
    automountToken: true
  image:
    repository: localhost:30500/in-falcone-control-plane
    tag: "0.6.2"
  env:
    # Postgres via PG* vars; password from the postgres Secret (no plaintext).
    - name: PGHOST
      value: falcone-postgresql
    - name: PGPORT
      value: "5432"
    - name: PGUSER
      value: falcone
    - name: PGDATABASE
      value: in_falcone
    - name: PGPASSWORD
      valueFrom:
        secretKeyRef:
          name: in-falcone-postgresql
          key: POSTGRESQL_PASSWORD
    - name: KEYCLOAK_JWKS_URL
      value: http://falcone-keycloak:8080/realms/in-falcone-platform/protocol/openid-connect/certs
    - name: ROUTE_MAP_FILE
      value: /app/route-map.runtime.json
    # Domain B: Keycloak admin client (create tenant realms + users). Admin creds
    # from the in-falcone-keycloak-admin Secret (no plaintext).
    - name: KEYCLOAK_BASE_URL
      value: http://falcone-keycloak:8080
    - name: KEYCLOAK_ADMIN_USERNAME
      valueFrom:
        secretKeyRef:
          name: in-falcone-keycloak-admin
          key: username
    - name: KEYCLOAK_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: in-falcone-keycloak-admin
          key: password
    # Per-tenant OIDC app-client redirect allow-list (#670). Each provisioned tenant realm gets a
    # public `<slug>-app` client; its redirect_uri/web-origin allow-list MUST NOT be a wildcard, or
    # the authorization endpoint would accept an arbitrary attacker-controlled redirect_uri
    # (auth-code interception). These comma-separated allow-lists are applied to new app clients
    # (PKCE S256 is always enabled). `+` web-origin = "origins of the registered redirect URIs"
    # (a Keycloak idiom, explicitly NOT `*`).
    - { name: TENANT_APP_REDIRECT_URIS, value: "https://app.dev.in-falcone.example.com/*,http://localhost:8088/*" }
    - { name: TENANT_APP_WEB_ORIGINS, value: "+" }
    # Object storage: provider-neutral S3 endpoint + credentials (no plaintext).
    # STORAGE_S3_* are authoritative, pointed at the SeaweedFS S3 gateway (port 8333,
    # path-style). SeaweedFS replaced MinIO (ADR-13). NOTE: the in-falcone-storage
    # Secret key names below are a legacy convention retained for the existing secret;
    # repoint to the SeaweedFS credentials Secret when cutting the kind storage backend over.
    - name: STORAGE_S3_ENDPOINT
      value: http://falcone-seaweedfs-s3:8333
    - name: STORAGE_S3_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: in-falcone-storage
          key: s3_access_key
    - name: STORAGE_S3_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: in-falcone-storage
          key: s3_secret_key
    # Per-workspace SeaweedFS identities (#553). With the s3 gateway in filer-mode
    # (seaweedfs.s3.enableAuth=false), provisioning a workspace bucket also issues a
    # bucket-scoped SeaweedFS identity (one-shot seed Job -> weed shell s3.configure)
    # so tenants get a credential that can't cross to another tenant's bucket. The
    # admin/service key (STORAGE_S3_*) stays broad for the backend REST API.
    - { name: STORAGE_TENANT_IDENTITIES, value: "1" }
    - { name: SEAWEEDFS_MASTER, value: "falcone-seaweedfs-master:9333" }
    - { name: SEAWEEDFS_IMAGE, value: "chrislusf/seaweedfs:4.33" }
    # Document store: FerretDB gateway over the DocumentDB engine (MongoDB-wire, no plaintext).
    # The gateway passes the DocumentDB Postgres credentials through to the engine.
    - name: MONGO_HOST
      value: falcone-ferretdb:27017
    - name: MONGO_BACKEND
      value: ferretdb
    # FerretDB v2 delegates auth to the DocumentDB Postgres backend, so the Mongo client
    # identity MUST be a real Postgres login role. Source the username from the SAME secret
    # as the password (in-falcone-documentdb POSTGRES_USER, the documentdb admin role that the
    # FerretDB postgresql-url also uses) — a hardcoded `falcone` did not match the admin role
    # (`falcone_doc_admin`), so the handshake failed and all /v1/mongo/* 500'd (finding F2).
    - name: MONGO_USER
      valueFrom:
        secretKeyRef:
          name: in-falcone-documentdb
          key: POSTGRES_USER
    - name: MONGO_PASSWORD
      valueFrom:
        secretKeyRef:
          name: in-falcone-documentdb
          key: POSTGRES_PASSWORD
    # Realtime SSE over Postgres logical replication (add-ferretdb-realtime-cdc-remediation #460):
    # FerretDB v2 has no change streams, so the realtime executor consumes a pgoutput slot on the
    # DocumentDB engine. REALTIME_DOCUMENTDB_URL is the full REPLICATION-privileged connection URL
    # (role falcone_cdc_repl), provided out-of-band in the replication Secret. `optional: true` keeps
    # the pod starting (and realtime gracefully OFF in main.mjs) until the secret exists. The per-
    # replica slot name defaults to falcone_rt_<pod-name> via HOSTNAME (no extra env needed).
    - name: REALTIME_DOCUMENTDB_URL
      valueFrom:
        secretKeyRef:
          name: in-falcone-documentdb-replication
          key: realtime-url
          optional: true
    # Event store: Kafka broker (PLAINTEXT listener, no auth).
    - name: KAFKA_BROKERS
      value: falcone-kafka:9092
    # Functions: the nodejs runtime image each function's Knative Service runs
    # (Harbor path in prod). Each function = a ksvc; invoke = HTTP, scale-to-zero.
    - name: FN_RUNTIME_IMAGE
      value: localhost:30500/in-falcone-fn-runtime:0.1.0
    # Webhooks (#643): the management plane (/v1/webhooks/*) encrypts each subscription's
    # HMAC signing secret at rest with WEBHOOK_SIGNING_KEY (AES-256-GCM). This is a dev value
    # for the kind profile ONLY — in production source it from a Secret via secretKeyRef and
    # rotate it. WEBHOOK_MAX_SUBSCRIPTIONS_PER_WORKSPACE caps subscriptions per workspace (409).
    - name: WEBHOOK_SIGNING_KEY
      value: kind-dev-webhook-signing-key-do-not-use-in-prod
    - name: WEBHOOK_MAX_SUBSCRIPTIONS_PER_WORKSPACE
      value: "25"
webConsole:
  image:
    repository: localhost:30500/in-falcone-web-console
    tag: "0.2.11"
deployment:
  upgrade:
    # required by the chart's validate.yaml on every in-place upgrade
    currentVersion: "0.2.0"
keycloak:
  # KC 26 re-augments the server on every start; 1Gi gets OOM-killed (exit 137).
  # NOTE: the root cause of the exit-137 OOM was the in-memory H2 store growing with
  # every realm/user/session; fix-keycloak-persistent-store moves persistence to the
  # bundled postgresql, so 2Gi now holds. The chart default also raises this to 2Gi.
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  # Keep the DB-init initContainer image (fix-keycloak-persistent-store) in lock-step
  # with the postgresql image: Bitnami relocated its free images to `bitnamilegacy`, so
  # the chart-default `docker.io/bitnami/postgresql` 404s on public docker.io.
  database:
    initImage:
      repository: docker.io/bitnamilegacy/postgresql
      tag: 17.2.0
