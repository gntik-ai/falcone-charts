# Kind overlay — enable Vault as the secrets backend WITHOUT cert-manager (finding C.6 / D7).
#
# The base chart leaves Vault + ESO disabled. Enabling `vault.enabled=true` on a cluster that runs
# cert-manager works out of the box (the cert-manager.io/v1 Certificate provisions the server TLS).
# On kind there is no cert-manager, so this overlay selects the self-signed TLS path: a pre-install
# hook Job generates the vault-server-tls Secret with openssl, and the cert-manager Certificate is
# NOT rendered — so the release installs cleanly instead of aborting on the missing CRD.
#
# With Vault up, ESO's `vault-backend` ClusterSecretStore + the platform ExternalSecrets
# (apisix/keycloak/documentdb/kafka/postgresql/s3) resolve those app secrets FROM Vault.
#
# Usage: helm install falcone charts/in-falcone -f deploy/kind/values-kind.yaml \
#          -f deploy/kind/values-kind-vault.yaml
#
# Note the subchart double-key nesting: the Vault subchart reads `.Values.vault.*`, so umbrella
# overrides for it live under `vault.vault.*`.
vault:
  enabled: true
  vault:
    tls:
      mode: self-signed

eso:
  enabled: true
