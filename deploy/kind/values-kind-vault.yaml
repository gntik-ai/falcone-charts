# Kind overlay — compatibility settings for OpenBao WITHOUT cert-manager (finding C.6 / D7).
#
# OpenBao and ESO are core in the base chart. On kind, keep the self-signed TLS path selected so a
# fresh install does not require cert-manager.
#
# With OpenBao up, ESO's `openbao-backend` ClusterSecretStore + the platform ExternalSecrets
# (apisix/keycloak/documentdb/kafka/postgresql/s3) resolve those app secrets FROM OpenBao.
#
# Usage: helm install falcone charts/in-falcone -f deploy/kind/values-kind.yaml \
#          -f deploy/kind/values-kind-vault.yaml
#
# Note the subchart double-key nesting: the OpenBao subchart reads `.Values.openbao.*`, so umbrella
# overrides for it live under `openbao.openbao.*`.
openbao:
  openbao:
    tls:
      mode: self-signed
