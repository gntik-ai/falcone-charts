# Falcone — OpenShift + Harbor (restricted network) install values.
#
# SKELETON / starting point (see ../OPENSHIFT-HARBOR-REVIEW.md). This drives the
# product chart's existing knobs instead of the kind-only hacks in
# deploy/kind/values-kind.yaml. Fill in the <PLACEHOLDERS>.
#
#   helm install falcone charts/in-falcone -n falcone-prod -f deploy/openshift/values-openshift.yaml
#
# Prereqs on the cluster:
#   - OpenShift Serverless Operator installed + a KnativeServing CR (provides Knative + Kourier).
#   - Harbor pull secret(s) created in the namespace; optionally Harbor CA in a ConfigMap.
#   - All images mirrored into Harbor (see the review's mirror list).
#   - ESO/OpenBao providing the data-plane secrets (or pre-create the *-credentials Secrets).

global:
  namespace: falcone-prod
  createNamespace: false            # let cluster-admin/GitOps own the namespace + SCC
  # Harbor: every image's registry host is rewritten to this prefix automatically.
  imageRegistry: "harbor.example.com/falcone"
  imagePullSecrets:
    - name: harbor-pull             # robot account pull secret (pre-created)
  privateRegistry:
    enabled: true
    registry: "harbor.example.com"
    # Strings (per values.schema.json). The chart's workload template was fixed to
    # normalize imagePullSecrets({name}) + pullSecretNames(strings) into one list
    # (previously it crashed on strings — see the review).
    pullSecretNames:
      - harbor-pull
    caBundleConfigMap: "harbor-ca"  # ConfigMap with the Harbor CA (restricted TLS)
  airgap:
    enabled: true
  defaultStorageClass: "<OCP_DEFAULT_CSI_STORAGECLASS>"
  # OpenShift restricted-v2 assigns uid + fsGroup from the namespace range.
  # Do NOT pin fsGroup/runAsUser; only assert non-root + seccomp.
  podSecurity:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
    fsGroup: null                   # <- unset: let the SCC inject it (was 1001)

mcp:
  runtimeImage:
    repository: ghcr.io/gntik-ai/in-falcone-mcp-runtime
    tag: "0.3.0"

# The vendored external-secrets chart templates its own images and does not use the
# umbrella chart's global.imageRegistry helper, so the Harbor overlay sets those
# operator image refs directly. Keep these aligned with the vendored chart appVersion.
eso:
  external-secrets:
    image:
      repository: "harbor.example.com/falcone/external-secrets/external-secrets"
      tag: "v0.9.0"
    imagePullSecrets:
      - name: harbor-pull
    webhook:
      image:
        repository: "harbor.example.com/falcone/external-secrets/external-secrets"
        tag: "v0.9.0"
      imagePullSecrets:
        - name: harbor-pull
    certController:
      image:
        repository: "harbor.example.com/falcone/external-secrets/external-secrets"
        tag: "v0.9.0"
      imagePullSecrets:
        - name: harbor-pull

# Functions run on Knative (provided by OpenShift Serverless): the control-plane
# executor creates a Knative Service per function (scale-to-zero, HTTP invoke).
# There is no in-chart functions datastore component to toggle — the former bundled
# OpenWhisk component was removed in the OpenWhisk -> Knative migration.

# SCC: stateless components also pin podSecurityContext.fsGroup: 1001 (inherited
# from global.podSecurity in the chart defaults). global.podSecurity.fsGroup:null
# does NOT override it — Helm drops nil entries during the global-table coalesce,
# so it must be nulled per-component. (Data-plane components are nulled below.)
apisix:
  podSecurityContext:
    fsGroup: null
    fsGroupChangePolicy: null
keycloak:
  podSecurityContext:
    fsGroup: null
    fsGroupChangePolicy: null

# Control-plane runtime. The chart ships the executor RBAC as core infrastructure;
# this overlay enables the SA token for Kubernetes/OpenBao calls + sets the env. NOTE: the
# *HOST values below are <release>-<component> service DNS — they assume
# `helm install <RELEASE>` with RELEASE matching the prefix (here: falcone). Adjust if
# you use a different release name. Core Secret refs are materialized by the chart's
# OpenBao/ESO lifecycle; pre-create only external inputs such as Harbor pull secrets
# or bring-your-own certificates.
controlPlane:
  image:
    repository: ghcr.io/gntik-ai/in-falcone-control-plane   # global.imageRegistry => harbor.example.com/falcone/gntik-ai/in-falcone-control-plane
    tag: "0.3.0"
  serviceAccount:
    # Function executor calls the k8s API (create/patch Knative Services), so the SA
    # token MUST be mounted here. The chart default is false (least-privilege baseline,
    # enforced by validate-deployment-chart.mjs); enable it in this functions overlay.
    automountToken: true
  podSecurityContext:                                       # SCC: let the namespace range set fsGroup
    fsGroup: null
    fsGroupChangePolicy: null
  env:
    - { name: NODE_ENV, value: production }
    - { name: ROUTE_MAP_FILE, value: /app/route-map.runtime.json }
    - { name: TEMPORAL_ADDRESS, value: "falcone-temporal-frontend:7233" }
    - { name: TEMPORAL_NAMESPACE, value: falcone-flows }
    - { name: MCP_ENABLED, value: "true" }
    - { name: BAO_KV_MOUNT, value: secret }
    - { name: BAO_KUBERNETES_AUTH_ROLE, value: workspace-secrets-role }
    - { name: NODE_EXTRA_CA_CERTS, value: /openbao/tls/ca.crt }
    - { name: PGHOST, value: falcone-postgresql }
    - { name: PGPORT, value: "5432" }
    - { name: PGUSER, value: falcone }
    - { name: PGDATABASE, value: in_falcone }
    - { name: PGPASSWORD, valueFrom: { secretKeyRef: { name: in-falcone-postgresql, key: POSTGRESQL_PASSWORD } } }
    - { name: KEYCLOAK_JWKS_URL, value: "http://falcone-keycloak:8080/realms/in-falcone-platform/protocol/openid-connect/certs" }
    - { name: KEYCLOAK_BASE_URL, value: "http://falcone-keycloak:8080" }
    - { name: KEYCLOAK_ADMIN_USERNAME, valueFrom: { secretKeyRef: { name: in-falcone-keycloak-admin, key: username } } }
    - { name: KEYCLOAK_ADMIN_PASSWORD, valueFrom: { secretKeyRef: { name: in-falcone-keycloak-admin, key: password } } }
    # Provider-neutral S3 endpoint (STORAGE_S3_* authoritative), pointed at the
    # SeaweedFS S3 gateway (path-style; HTTPS port 8334 per the SCC overlay below).
    # SeaweedFS replaced MinIO (ADR-13); enable the `seaweedfs` component below. The
    # in-falcone-storage Secret key names are the SeaweedFS S3 access/secret keys.
    - { name: STORAGE_S3_ENDPOINT, value: "https://falcone-seaweedfs-s3:8334" }
    - { name: STORAGE_S3_ACCESS_KEY, valueFrom: { secretKeyRef: { name: in-falcone-storage, key: s3_access_key } } }
    - { name: STORAGE_S3_SECRET_KEY, valueFrom: { secretKeyRef: { name: in-falcone-storage, key: s3_secret_key } } }
    # Document store: FerretDB gateway over the DocumentDB (PostgreSQL) engine — MongoDB
    # wire-protocol. The gateway passes the DocumentDB Postgres credentials to the engine.
    - { name: MONGO_HOST, value: "falcone-ferretdb:27017" }
    - { name: MONGO_BACKEND, value: ferretdb }
    # FerretDB v2 delegates auth to Postgres: MONGO_USER must be the documentdb admin role,
    # sourced from the same secret as the password (not a hardcoded `falcone`, which mismatched
    # the admin role and failed the handshake — finding F2).
    - { name: MONGO_USER, valueFrom: { secretKeyRef: { name: in-falcone-documentdb, key: POSTGRES_USER } } }
    - { name: MONGO_PASSWORD, valueFrom: { secretKeyRef: { name: in-falcone-documentdb, key: POSTGRES_PASSWORD } } }
    - { name: KAFKA_BROKERS, value: "falcone-kafka:9092" }
    - { name: GATEWAY_SHARED_SECRET, valueFrom: { secretKeyRef: { name: in-falcone-gateway-shared-secret, key: secret } } }
    # Functions: the executor reads this to template each function's Knative Service.
    - { name: FN_RUNTIME_IMAGE, value: "harbor.example.com/falcone/gntik-ai/in-falcone-fn-runtime:0.3.0" }

webConsole:
  image:
    repository: ghcr.io/gntik-ai/in-falcone-web-console
    tag: "0.3.0"
  podSecurityContext:                                       # SCC: let the namespace range set fsGroup
    fsGroup: null
    fsGroupChangePolicy: null

# Stateful data plane: prefer Red Hat-certified operators already on the cluster
# (Strimzi for Kafka, CloudNativePG for Postgres) OR grant the data-plane SAs a
# suitable SCC. If keeping the in-chart Bitnami images, mirror to Harbor and verify
# arbitrary-uid behavior. Keep volumePermissions DISABLED (restricted SCC).
#
# SCC: every stateful component pins podSecurityContext.fsGroup: 1001 in the chart
# defaults, which restricted-v2 REJECTS (fsGroup must come from the namespace's
# assigned range). Null it per-component so the SCC injects a valid fsGroup — the
# Bitnami/SeaweedFS/Prometheus images all support an arbitrary uid+fsGroup. (Setting
# only global.podSecurity.fsGroup:null is not enough: the per-component value wins
# via mergeOverwrite.) Drop fsGroupChangePolicy too (irrelevant once fsGroup is SCC-set).
postgresql:
  volumePermissions: { enabled: false }
  podSecurityContext:
    fsGroup: null
    fsGroupChangePolicy: null
# DocumentDB engine (add-ferretdb-documentdb-engine). Same SCC treatment as the other
# stateful datastores: null the per-component fsGroup so restricted-v2 injects it from
# the namespace range. runAsNonRoot + seccompProfile RuntimeDefault come from
# global.podSecurity. The extension init Job also pins runAsUser/fsGroup in the base
# values (for vanilla k8s); null them here so the SCC governs the Job too.
documentdb:
  volumePermissions: { enabled: false }
  podSecurityContext:
    fsGroup: null
    fsGroupChangePolicy: null
    runAsUser: null                 # base pins 999 (official postgres uid); SCC injects here
  initJob:
    podSecurityContext:
      runAsUser: null
      fsGroup: null
    securityContext:
      runAsUser: null
# FerretDB gateway (add-ferretdb-gateway). Stateless Deployment, no PVC — null the
# inherited fsGroup so restricted-v2 injects it; runAsNonRoot + seccompProfile
# RuntimeDefault come from global.podSecurity. The FerretDB image is non-root by
# default, so no runAsUser override is needed. The main-container image is registry-
# rewritten to Harbor automatically (global.imageRegistry); the engine-gate
# initContainer image is NOT auto-rewritten — mirror it alongside the engine image.
ferretdb:
  volumePermissions: { enabled: false }
  podSecurityContext:
    fsGroup: null
    fsGroupChangePolicy: null
  securityContext:
    runAsUser: null                 # base pins 1000 (FerretDB image uid); SCC injects here
kafka:
  volumePermissions: { enabled: false }
  podSecurityContext:
    fsGroup: null
    fsGroupChangePolicy: null
observability:
  volumePermissions: { enabled: false }
  podSecurityContext:
    fsGroup: null
    fsGroupChangePolicy: null

# SeaweedFS (core object-storage tier, ADR-13) — OpenShift restricted-v2 SCC +
# Harbor/airgap overlay. The master/volume/filer/S3 roles are always rendered by
# the umbrella chart; this overlay only supplies SCC, TLS, sizing, and registry
# settings. The base values carry NO SCC/fsGroup fields (those live only in THIS
# overlay) so plain-Kubernetes/kind installs are unaffected.
#
# SCC: restricted-v2 injects uid + fsGroup from the namespace's assigned range,
# so we must NOT pin fsGroup. The upstream sub-chart only emits a
# podSecurityContext when podSecurityContext.enabled is true (it then omits the
# `enabled` key), so we set enabled: true and assert ONLY runAsNonRoot +
# seccompProfile (NO fsGroup key -> absent -> SCC-injected). Same pattern as the
# null-fsGroup data-plane components above (storage/postgresql/...).
#
# Harbor + airgap: global.imageRegistry rewrites the SeaweedFS image registry to
# Harbor and global.seaweedfs.image.repository rewrites the namespace part; the
# pull secret is taken from global.imagePullSecrets. The image is pinned to the
# spike-validated 4.33 digest for reproducibility.
seaweedfs:
  global:
    # Rewrite chrislusf/seaweedfs -> harbor.example.com/falcone/<...>/seaweedfs.
    imageRegistry: "harbor.example.com/falcone"
    # The sub-chart accepts a string or {name} list; use the Harbor robot secret.
    imagePullSecrets: harbor-pull
    seaweedfs:
      image:
        # Mirror chrislusf/seaweedfs into Harbor under this namespace path.
        repository: "chrislusf"
        name: "chrislusf/seaweedfs"
      # Reproducible pin: SeaweedFS 4.33 (digest from spike evidence/00-version-pin.txt:
      # chrislusf/seaweedfs@sha256:f0b358973e81f884304737645dd3b278c590c2c9d47d60089729d46324f70495).
      # Mirror that exact digest into Harbor before install.
      # Inter-component mutual TLS (master<->volume<->filer<->s3). Certs come from
      # the self-signed-CA bootstrap hook (seaweedfsTls.bootstrap, below) unless
      # cert-manager is present — set certificates.externalCertificates.enabled
      # accordingly. (task 8.1)
      enableSecurity: true
  certificates:
    externalCertificates:
      # Consume the bootstrap-hook-provided cert Secrets instead of cert-manager.
      # Flip to false where cert-manager is installed so the sub-chart's Issuer
      # path provisions the certs.
      enabled: true
  master:
    podSecurityContext:
      enabled: true
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      enabled: true
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop: ["ALL"]
  volume:
    podSecurityContext:
      enabled: true
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      enabled: true
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop: ["ALL"]
  filer:
    podSecurityContext:
      enabled: true
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      enabled: true
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop: ["ALL"]
  s3:
    # Disable plaintext on the S3 gateway: expose the HTTPS port (8334) backed by
    # the in-cluster cert; consumers use https://<release>-seaweedfs-s3:8334. (task 8.3)
    httpsPort: 8334
    podSecurityContext:
      enabled: true
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      enabled: true
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop: ["ALL"]

# SeaweedFS TLS bootstrap (self-signed CA hook). Enabled here as the safe default
# for clusters without cert-manager; the hook image must be mirrored to Harbor
# (rewrite it explicitly — the hook bypasses the component-wrapper image helper).
seaweedfsTls:
  bootstrap:
    enabled: true
    image:
      repository: "harbor.example.com/falcone/alpine/k8s"
      tag: "1.32.2"

# Temporal (flows engine) — INTERNAL-ONLY and core. Temporal server pods are STATELESS
# (durable state lives in PostgreSQL), so
# the chart defaults already leave fsGroup unset — but we null it explicitly here to
# mirror the per-component SCC pattern and stay safe if defaults change. Restricted-v2
# injects uid + fsGroup from the namespace's assigned range; do NOT pin them. The
# temporal-sql-tool / admin-tools images must be mirrored into Harbor (rewritten by
# global.imageRegistry). No Route/Ingress is rendered for Temporal — operator UI access
# is via `kubectl port-forward` only.
temporal:
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
    # restricted-v2 injects uid/gid/fsGroup from the namespace's assigned range — do NOT
    # pin them (the chart default pins runAsUser/runAsGroup 1000 for plain Kubernetes /
    # kind verification; null them here so the SCC takes over).
    runAsUser: null
    runAsGroup: null
    fsGroup: null
    fsGroupChangePolicy: null

# Exposure: OpenShift Routes. The Route templates render only when
# platform.network.exposureKind == "Route" (default is "Ingress").
platform:
  openshift:
    enabled: true                  # required: gates Route exposure + OCP behaviors
  network:
    exposureKind: Route
publicSurface:
  hostnames:
    api: "api.apps.<ocp-cluster-domain>"
    console: "console.apps.<ocp-cluster-domain>"
    identity: "iam.apps.<ocp-cluster-domain>"
    realtime: "realtime.apps.<ocp-cluster-domain>"
  route:
    tls:
      termination: edge            # or reencrypt
  # align Keycloak KC_HOSTNAME with the identity/console Route hostname for browser OIDC.

# Bootstrap: fix the realm payload so the install validates without
# --skip-schema-validation, and reconcile the APISIX reconcile-vs-standalone choice
# (use the Admin API on OpenShift, or keep routes config-driven + reconcile off).
# AIRGAP: the bootstrap job image is NOT rewritten by global.imageRegistry (it
# bypasses the component-wrapper image helper), so pin it to Harbor explicitly.
bootstrap:
  job:
    image:
      repository: "harbor.example.com/falcone/alpine/k8s"
      tag: "1.32.2"
